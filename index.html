                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Name</label>
                             <input type="text" value={bankAccountNameInput} onChange={(e) => setBankAccountNameInput(e.target.value)} required className={uiInput} />
                           </div>
                           <div className="grid grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Number</label>
                                 <input type="text" value={bankAccountNumberInput} onChange={(e) => setBankAccountNumberInput(e.target.value)} required className={uiInput + " font-mono"} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">1 USD to NGN Rate</label>
                                 <input type="number" step="0.01" value={nairaRateInput} onChange={(e) => setNairaRateInput(e.target.value)} required className={uiInput} />
                               </div>
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Flutterwave (Card Payment)</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-black/40 border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={flutterwaveActiveInput} onChange={(e) => setFlutterwaveActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Flutterwave Gateway</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Flutterwave Public Key</label>
                             <input type="text" value={flutterwaveKeyInput} onChange={(e) => setFlutterwaveKeyInput(e.target.value)} placeholder="FLWPUBK_TEST-..." className={uiInput + " font-mono"} />
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">SMS Settings</h3>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Added Profit per SMS ($)</label>
                             <input type="number" step="0.01" value={smsMarkupInput} onChange={(e) => setSmsMarkupInput(e.target.value)} placeholder="1.00" className={uiInput} />
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-black/40 border border-white/5 p-4 rounded-xl transition-colors hover:border-white/20">
                             <input type="checkbox" checked={smsActiveInput} onChange={(e) => setSmsActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable SMS Service Module</span>
                           </label>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Promotions & Features</h3>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Promo Code</label>
                                 <input type="text" value={promoInput} onChange={(e) => setPromoInput(e.target.value)} placeholder="DISCOUNT20" className={uiInput + " uppercase"} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Discount (%)</label>
                                 <input type="number" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="10" className={uiInput} />
                               </div>
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-black/40 border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={promoActive} onChange={(e) => setPromoActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Promo Code</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-black/40 border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={dailyRewardActive} onChange={(e) => setDailyRewardActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Daily Reward</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-black/40 border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={referralActive} onChange={(e) => setReferralActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Referral System</span>
                           </label>
                        </div>
                        
                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Global Notice</h3>
                           <div>
                             <textarea value={noticeInput} onChange={(e) => setNoticeInput(e.target.value)} placeholder="Write a notice for all users..." rows="3" className={uiInput + " resize-none"} />
                           </div>
                        </div>

                        <div className="pt-6 border-t border-white/10"><button type="submit" className={uiBtnPrimary}>Save All Settings</button></div>
                      </form>
                    </div>

                    <div className="space-y-6 sm:space-y-8 w-full">
                        {/* 🟢 CUSTOM PAYMENT METHODS MODULE 🟢 */}
                        <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 h-fit animate-slide-in-right" style={{animationDelay: '0.1s', opacity: 0, animationFillMode: 'forwards'}}>
                          <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                             <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Custom Payment Methods</h2>
                          </div>
                          
                          <form onSubmit={handleAddCustomPayment} className="space-y-4 mb-8 bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner">
                              <p className="text-[9px] font-bold text-brand-primary uppercase tracking-widest mb-2">Add New Method (e.g. bKash/Nagad)</p>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Method Name</label>
                                  <input type="text" required value={newCustomPayment.name} onChange={e => setNewCustomPayment({...newCustomPayment, name: e.target.value})} placeholder="bKash Personal" className="glass-input text-xs" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Wallet Number / Details</label>
                                  <input type="text" required value={newCustomPayment.details} onChange={e => setNewCustomPayment({...newCustomPayment, details: e.target.value})} placeholder="017XXXXXXXX" className="glass-input text-xs font-mono" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Instructions for User</label>
                                  <input type="text" value={newCustomPayment.instruction} onChange={e => setNewCustomPayment({...newCustomPayment, instruction: e.target.value})} placeholder="Send money and enter TRX ID below." className="glass-input text-xs" />
                              </div>
                              <button type="submit" className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl shadow-md text-[10px] uppercase tracking-widest mt-2 flex items-center justify-center gap-2"><Plus className="w-3 h-3"/> Add Method</button>
                          </form>

                          <div className="space-y-3">
                              {(!customPayments || customPayments.length === 0) ? (
                                  <p className="text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest py-4">No custom methods added.</p>
                              ) : (
                                  customPayments.map((p, idx) => (
                                      <div key={p.id || idx} className="bg-black/40 border border-white/5 p-4 rounded-xl flex justify-between items-center animate-slide-up-smooth backdrop-blur-sm">
                                          <div>
                                              <p className="text-[11px] font-bold text-white uppercase tracking-wider">{p.name}</p>
                                              <p className="text-[9px] font-mono text-gray-400 mt-1">{p.details}</p>
                                          </div>
                                          <button onClick={() => handleRemoveCustomPayment(p.id)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/30 rounded-lg">
                                              <Trash2 className="w-3.5 h-3.5"/>
                                          </button>
                                      </div>
                                  ))
                              )}
                          </div>
                        </div>

                        {/* 🟢 NEW PRODUCT MANAGEMENT SECTION 🟢 */}
                        <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 h-fit animate-slide-in-right" style={{animationDelay: '0.2s', opacity: 0, animationFillMode: 'forwards'}}>
                          <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                             <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Manage Accounts Cards</h2>
                             <button onClick={() => setNewProductModal(true)} className="btn-animate bg-white text-black px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold flex items-center gap-1 shadow-[0_0_15px_rgba(255,255,255,0.2)]"><Plus className="w-3 h-3"/> New</button>
                          </div>
                          
                          <div className="space-y-4">
                              {categories.map((cat, idx) => (
                                  <div key={idx} className="bg-black/40 border border-white/5 p-4 rounded-2xl flex justify-between items-center animate-slide-up-smooth backdrop-blur-sm" style={{animationDelay: `${idx * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                      <div>
                                          <p className="text-xs font-bold text-white uppercase tracking-wider">{cat.name}</p>
                                          <p className="text-[10px] font-mono text-gray-400 mt-1">${Number(cat.price).toFixed(2)}</p>
                                      </div>
                                      <button onClick={() => handleRemoveProduct(cat.id)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/30 rounded-lg">
                                          <Trash2 className="w-4 h-4"/>
                                      </button>
                                  </div>
                              ))}
                          </div>
                        </div>
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
