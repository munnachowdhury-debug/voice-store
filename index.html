             <div className="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-brand-primary/5 rounded-full blur-[120px] animate-float pointer-events-none"></div>

        const SplashScreen = () => {

               <div className="relative z-10 flex flex-col items-center justify-center px-4 w-full h-full animate-scale-up text-center">

                      <div className="relative w-24 h-24 bg-[#121212] border border-[#2a2a2a] shadow-[inset_0_0_30px_rgba(212,175,55,0.1)] rounded-full flex items-center justify-center mx-auto hover:rotate-180 transition-transform duration-1000">

                      </div>
                  </div>

                  <h1 className="text-4xl sm:text-6xl font-light tracking-[0.2em] mb-4 gold-text uppercase text-center w-full">
                      Verify<span className="font-bold">Hub</span> Elite
                  </h1>
                  
                  <div className="flex items-center gap-4 w-full max-w-[280px] sm:max-w-md justify-center opacity-70 mt-4 mx-auto">
                      <div className="h-[1px] flex-grow bg-gradient-to-r from-transparent to-brand-primary/50"></div>
                      <p className="text-brand-primary font-mono text-[10px] uppercase tracking-[0.5em] animate-pulse whitespace-nowrap text-center">
                         Loading...
                      </p>
                      <div className="h-[1px] flex-grow bg-gradient-to-l from-transparent to-brand-primary/50"></div>
                  </div>

                  <div className="w-48 h-[2px] bg-[#1a1a1a] mt-12 overflow-hidden relative mx-auto rounded-full">
                      <div className="absolute top-0 left-0 h-full bg-brand-primary w-full animate-[loading_2.5s_ease-in-out_infinite]"></div>
                  </div>
               </div>
            </div>
          );
        };

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [user, setUser] = useState(null); 
          const [isAuthChecking, setIsAuthChecking] = useState(true);
          const [activeTab, setActiveTab] = useState('sms');
          const [usersDB, setUsersDB] = useState({});
          
          const [inventory, setInventory] = useState({ new: [], old: [], textplus: [], gv_bulk: [] });
          const [allOrders, setAllOrders] = useState([]);
          const [deposits, setDeposits] = useState([]);
          const [purchases, setPurchases] = useState([]);
          const [tickets, setTickets] = useState([]);
          const [activeChats, setActiveChats] = useState([]);
          const initialChatsLoadRef = useRef(true);
          
          const [promoSettings, setPromoSettings] = useState({ code: '', discount: 0, isActive: false });
          const [globalNotice, setGlobalNotice] = useState('');
          const [featureSettings, setFeatureSettings] = useState({ dailyReward: false, referral: false });
          const [bankSettings, setBankSettings] = useState({ nairaRate: 1500, flutterwaveKey: '', flutterwaveActive: false });
          
          const [smsSettings, setSmsSettings] = useState({ active: true, markup: 1.00 });
          const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
          
          const [cart, setCart] = useState([]);
          const [showCart, setShowCart] = useState(false);
          const [notifications, setNotifications] = useState([]);
          const [toastData, setToastData] = useState({ show: false, msg: '', id: 0 });

          const [authMethod, setAuthMethod] = useState('login');
          const [authError, setAuthError] = useState('');
          const [authSuccessMsg, setAuthSuccessMsg] = useState('');
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [isLoading, setIsLoading] = useState(false);

          useEffect(() => { setTimeout(() => setShowSplash(false), 2500); }, []);

          const triggerToast = (msg) => { const id = Date.now(); setToastData({ show: true, msg, id }); setTimeout(() => { setToastData(prev => prev.id === id ? { ...prev, show: false } : prev); }, 3500); };
          const addNotification = (title, text) => { setNotifications(prev => [{ id: Date.now(), title, text, time: 'Just now' }, ...prev].slice(0, 5)); };

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (firebaseUser) => {
              if (firebaseUser && firebaseUser.email) {
                 let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com';
                 try {
                     const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'AdminConfig');
                     const adminDoc = await getDoc(adminDocRef);
                     if (adminDoc.exists()) currentAdminEmail = adminDoc.data().adminEmail || currentAdminEmail;
                     else await setDoc(adminDocRef, { adminEmail: currentAdminEmail }, { merge: true });
                 } catch (err) {}

                 const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', firebaseUser.email);
                 try {
                    const userDocSnap = await getDoc(userDocRef);
                    if (!userDocSnap.exists() && firebaseUser.email.toLowerCase() !== currentAdminEmail.toLowerCase()) {
                        await setDoc(userDocRef, { password: '', balance: 0, totalSpent: 0, joined: new Date().toISOString(), lastBonusDate: '' });
                    }
                 } catch(e) {}

                 if (firebaseUser.email.toLowerCase() === currentAdminEmail.toLowerCase()) {
                    setUser({ email: firebaseUser.email, role: 'admin' }); setActiveTab('inventory');
                 } else if (firebaseUser.emailVerified) { 
                    setUser({ email: firebaseUser.email, role: 'customer' }); setActiveTab('sms');
                 } else { setUser(null); }
              } else { setUser(null); }
              setIsAuthChecking(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const errLog = (e) => { if (e.code !== 'permission-denied') console.error(e); };
            const unsubs = [];
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), (snap) => { if (snap.exists()) setInventory(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'PromoCode'), (snap) => { if (snap.exists()) setPromoSettings(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Notice'), (snap) => { if (snap.exists()) setGlobalNotice(snap.data().text); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Features'), (snap) => { if (snap.exists()) setFeatureSettings(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Bank'), (snap) => { if (snap.exists()) setBankSettings(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'SMS'), (snap) => { if (snap.exists()) setSmsSettings(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), (snap) => { if (snap.exists() && snap.data().list) { setCategories(snap.data().list); } else { setCategories(DEFAULT_CATEGORIES); } }, errLog));

            if (user.role === 'admin') {
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Users'), (snap) => { const u = {}; snap.forEach(d => u[d.id] = d.data()); setUsersDB(u); }, errLog));
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats'), (snap) => { 
                    const chats = []; 
                    snap.forEach(d => chats.push({ id: d.id, ...d.data() })); 
                    
                    // Admin Notification for incoming messages
                    if (!initialChatsLoadRef.current) {
                        snap.docChanges().forEach(change => {
                            if (change.type === 'modified' || change.type === 'added') {
                                const data = change.doc.data();
                                if (data.unreadByAdmin) {
                                    triggerToast(`New message from ${String(data.userEmail).split('@')[0]}`);
                                }
                            }
                        });
                    }

                    setActiveChats(chats.sort((a,b) => b.lastMessageTime - a.lastMessageTime)); 
                    initialChatsLoadRef.current = false;
                }, errLog));
            } else {
                unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', user.email), (docSnap) => { if (docSnap.exists()) setUsersDB(prev => ({...prev, [user.email]: docSnap.data()})); }, errLog));
            }

            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Orders'), (snap) => { const o = []; snap.forEach(d => o.push({ id: d.id, ...d.data() })); setAllOrders(o.sort((a,b) => new Date(b.date) - new Date(a.date))); }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits'), (snap) => { const dep = []; snap.forEach(d => dep.push({ id: d.id, ...d.data() })); setDeposits(dep.sort((a,b) => new Date(b.date) - new Date(a.date))); }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Purchases'), (snap) => { const p = []; snap.forEach(d => p.push({ id: d.id, ...d.data() })); setPurchases(p.sort((a,b) => new Date(b.date) - new Date(a.date))); }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets'), (snap) => { const t = []; snap.forEach(d => t.push({ id: d.id, ...d.data() })); setTickets(t.sort((a,b) => new Date(b.date) - new Date(a.date))); }, errLog));
            
            return () => unsubs.forEach(unsub => unsub());
          }, [user]);

          const handleAuthSubmit = async (e) => {
            e.preventDefault(); setAuthError(''); setAuthSuccessMsg(''); setIsLoading(true);
            let email = emailInput.trim(); let pwd = passwordInput.trim();
            if (!email || !pwd) { setAuthError('Email and Password are required.'); setIsLoading(false); return; }
            
            if (authMethod === 'admin') {
              const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'AdminConfig');
              let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com'; 
              try { const adminDoc = await getDoc(adminDocRef); if (adminDoc.exists()) currentAdminEmail = adminDoc.data().adminEmail || currentAdminEmail; } catch (e) {}

              if (email.toLowerCase() !== currentAdminEmail.toLowerCase()) { setAuthError('Access Denied: Invalid Admin Email.'); setIsLoading(false); return; }
              try { await signInWithEmailAndPassword(auth, email, pwd); setAuthSuccessMsg('Admin Login Successful.'); } 
              catch (error) { setAuthError('Incorrect Password.'); }
              setIsLoading(false); return;
            }

            try {
              if (authMethod === 'signup') {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', userCredential.user.email);
                await setDoc(userRef, { password: pwd, balance: 0, totalSpent: 0, joined: new Date().toISOString(), lastBonusDate: '' });
                
                await sendEmailVerification(userCredential.user);
                await auth.signOut(); 
                
                setAuthSuccessMsg('Account created! Please verify your email.'); 
                setAuthMethod('login'); 
              } else {
                const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
                if (!userCredential.user.emailVerified) {
                   await auth.signOut(); 
                   setAuthError('Please verify your email first.');
                   setIsLoading(false); 
                   return;
                }
                setAuthSuccessMsg('Login Successful.');
              }
            } catch (error) { setAuthError("Error: " + error.message); } finally { setIsLoading(false); }
          };

          const handleForgotPassword = async () => {
            if (!emailInput.trim()) { setAuthError('Please enter your email address to reset password.'); return; }
            setIsLoading(true);
            try {
              await sendPasswordResetEmail(auth, emailInput.trim());
              setAuthError(''); setAuthSuccessMsg('Password reset link sent to your email.');
            } catch (error) { setAuthError(error.message); } 
            finally { setIsLoading(false); }
          };

          const handleLogout = () => { signOut(auth).then(() => { setUser(null); setCart([]); setShowCart(false); setEmailInput(''); setPasswordInput(''); }); };

          if (showSplash) return <SplashScreen />;

          if (isAuthChecking) return <div className="min-h-screen flex items-center justify-center bg-[#0a0a0a]"><RefreshCw className="w-8 h-8 text-brand-primary animate-spin"/></div>;

          if (!user) {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 relative font-sans w-full bg-[#0a0a0a] text-white">
                <PremiumBackground />
                <div className="w-full max-w-[400px] animate-scale-up z-10">
                  <div className="flex flex-col items-center mb-10">
                    <div className="w-16 h-16 rounded-2xl bg-[#121212] border border-[#2a2a2a] flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(212,175,55,0.1)]">
                      <Lock className="w-6 h-6 text-brand-primary" strokeWidth={1.5}/>
                    </div>
                    <h2 className="text-3xl font-light tracking-[0.2em] gold-text uppercase text-center">Verify<span className="font-bold">Hub</span></h2>
                  </div>
                  <div className={uiCard + " p-8 border-t-[1px] border-t-brand-primary/50"}>
                    {authMethod !== 'admin' && (
                        <div className="flex bg-[#0a0a0a] p-1 rounded-xl mb-8 border border-[#1a1a1a]">
                             <button type="button" onClick={() => { setAuthMethod('login'); setAuthError(''); setAuthSuccessMsg(''); }} className={`flex-1 flex items-center justify-center py-2.5 rounded-lg text-xs font-bold transition-all duration-300 uppercase tracking-wider ${authMethod === 'login' ? 'bg-[#121212] text-brand-primary border border-brand-primary/20 shadow-sm' : 'text-gray-500 hover:text-gray-300'}`}>Login</button>
                             <button type="button" onClick={() => { setAuthMethod('signup'); setAuthError(''); setAuthSuccessMsg(''); }} className={`flex-1 flex items-center justify-center py-2.5 rounded-lg text-xs font-bold transition-all duration-300 uppercase tracking-wider ${authMethod === 'signup' ? 'bg-[#121212] text-brand-primary border border-brand-primary/20 shadow-sm' : 'text-gray-500 hover:text-gray-300'}`}>Sign Up</button>
                        </div>
                    )}
                    {authMethod === 'admin' && <div className="text-center mb-8 pb-4 border-b border-[#1a1a1a]"><span className="text-[10px] font-black text-brand-primary uppercase tracking-[0.2em] flex items-center justify-center gap-2"><ShieldAlert className="w-4 h-4"/> Admin Portal</span></div>}
                    
                    <form onSubmit={handleAuthSubmit} className="space-y-6">
                      {authError && <div className="text-red-400 text-xs font-bold bg-red-900/10 border border-red-900/20 p-3 rounded-xl flex items-center gap-2 animate-pop-in"><AlertTriangle className="w-4 h-4"/>{authError}</div>}
                      {authSuccessMsg && <div className="text-brand-primary text-xs font-bold bg-brand-primary/5 border border-brand-primary/20 p-3 rounded-xl flex items-center gap-2 animate-pop-in"><CheckCircle className="w-4 h-4"/>{authSuccessMsg}</div>}
                      
                      <div className="space-y-2">
                        <label className="text-[10px] font-bold text-gray-500 pl-1 uppercase tracking-widest">Email Address</label>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="name@example.com" required className={uiInput} />
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center px-1">
                           <label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Password</label>
                           {(authMethod === 'login' || authMethod === 'admin') && <button type="button" onClick={handleForgotPassword} className="text-[10px] font-bold text-brand-primary hover:text-brand-primaryHover transition-colors uppercase tracking-wider">Forgot?</button>}
                        </div>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••••••" required className={uiInput} />
                      </div>
                      <div className="pt-4">
                        <button type="submit" disabled={isLoading} className={uiBtnPrimary}>
                            {isLoading ? 'Processing...' : (authMethod === 'signup' ? 'Create Account' : authMethod === 'login' ? 'Login' : 'Admin Login')}
                            {!isLoading && <ArrowRight className="w-4 h-4" />}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          const currentUserBalance = user.role === 'customer' ? (usersDB[user.email]?.balance || 0) : 0;
          const currentUserTier = user.role === 'customer' ? getTier(usersDB[user.email]?.totalSpent || 0) : null;

          return (
            <div className="min-h-screen w-full relative overflow-x-hidden font-sans pb-24 flex flex-col bg-[#0a0a0a] text-white">
              <PremiumBackground />
              
              {toastData.show && (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] animate-slide-down w-[90%] sm:w-auto max-w-sm">
                  <div className="bg-[#121212]/95 backdrop-blur-3xl border border-brand-primary/30 p-4 rounded-xl shadow-[0_10px_40px_rgba(212,175,55,0.15)] flex items-center gap-3">
                    <CheckCircle className="w-5 h-5 text-brand-primary" />
                    <span className="font-medium text-xs tracking-wide text-gray-200 uppercase">{toastData.msg}</span>
                  </div>
                </div>
              )}

              <header className="sticky top-0 z-40 w-full bg-[#0a0a0a]/90 backdrop-blur-xl border-b border-[#1a1a1a] shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-4 animate-slide-in-right">
                      <div className="w-10 h-10 rounded-full bg-[#121212] border border-[#2a2a2a] flex items-center justify-center shadow-[inset_0_0_15px_rgba(212,175,55,0.05)]">
                        <Lock className="w-4 h-4 text-brand-primary" strokeWidth={1.5} />
                      </div>
                      <span className="text-xl font-light tracking-[0.2em] gold-text hidden sm:block uppercase">Verify<span className="font-bold">Hub</span></span>
                  </div>
                  <div className="flex items-center gap-4">
                    {user.role === 'customer' && (
                        <button onClick={() => setShowCart(true)} className="btn-animate relative p-2.5 rounded-full bg-[#121212] border border-[#2a2a2a] text-gray-400 hover:text-brand-primary transition-colors hover:border-brand-primary/50">
                            <ShoppingCart className="w-4 h-4" />
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full animate-pop-in">{cart.length}</span>}
                        </button>
                    )}
                    {user.role === 'customer' && (
                        <div className="bg-[#121212] px-4 py-2 rounded-full flex items-center gap-2 border border-[#2a2a2a]">
                            <Wallet className="w-3.5 h-3.5 text-brand-primary" />
                            <span className="font-mono font-semibold text-xs tracking-wider text-gray-200">${Number(currentUserBalance).toFixed(2)}</span>
                        </div>
                    )}
                    <button onClick={handleLogout} className="btn-animate p-2.5 bg-[#121212] text-gray-400 hover:text-red-400 rounded-full border border-[#2a2a2a] transition-colors"><LogOut className="w-4 h-4" /></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-5 relative z-10 w-full flex-grow flex flex-col items-center">
                {globalNotice && (
                  <div className="w-full mb-4 bg-brand-primary/10 border border-brand-primary/30 p-3 rounded-xl flex items-center gap-3 shadow-inner animate-pop-in">
                     <Megaphone className="w-5 h-5 text-brand-primary shrink-0" />
                     <p className="text-xs font-medium text-gray-200">{globalNotice}</p>
                  </div>
                )}

                <div className="w-full relative z-30 mb-6 animate-fade-in-up">
                  {/* 🟢 ULTRA COMPACT PREMIUM MENU 🟢 */}
                  <div className="bg-[#0a0a0a] rounded-2xl p-1.5 flex justify-between gap-1 w-full overflow-x-auto custom-scrollbar border border-[#2a2a2a] shadow-[0_4px_20px_rgba(0,0,0,0.4)]">
                    {(user.role === 'admin' ? ADMIN_TABS : CUSTOMER_TABS).map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`relative flex-1 flex flex-col items-center justify-center gap-1.5 py-2.5 px-2 rounded-xl transition-all duration-300 min-w-[70px] sm:min-w-[100px] overflow-hidden group ${activeTab === tab.id ? 'text-black font-extrabold shadow-[0_0_15px_rgba(212,175,55,0.4)] transform scale-[1.02]' : 'text-gray-400 hover:text-white hover:bg-[#1a1a1a]'}`}>
                          {activeTab === tab.id && <div className="absolute inset-0 bg-gold-gradient opacity-90"></div>}
                          <div className="relative z-10 flex flex-col items-center">
                              <tab.icon className={`w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-300 ${activeTab === tab.id ? 'scale-110 drop-shadow-md' : 'group-hover:scale-110'}`} strokeWidth={activeTab === tab.id ? 2.5 : 1.5} /> 
                              <span className="text-[9px] sm:text-[11px] text-center uppercase tracking-widest mt-1 whitespace-nowrap">{tab.label}</span>
                          </div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="w-full relative tab-transition-enter" key={activeTab}>
                    {user.role === 'admin' ? (
                      <AdminDashboard inventory={inventory} orders={allOrders} deposits={deposits} categories={categories} usersDB={usersDB} triggerToast={triggerToast} db={db} appId={appId} promoSettings={promoSettings} tickets={tickets} featureSettings={featureSettings} bankSettings={bankSettings} smsSettings={smsSettings} activeChats={activeChats} auth={auth} user={user} activeTab={activeTab} setActiveTab={setActiveTab} globalNotice={globalNotice} uiCard={uiCard} uiInput={uiInput} uiBtnPrimary={uiBtnPrimary} uiBtnSecondary={uiBtnSecondary} uiBtnAction={uiBtnAction} uiInnerPanel={uiInnerPanel} />
                    ) : (
                      <>
                          {activeTab === 'sms' && <CustomerDashboardSMS user={user} balance={currentUserBalance} triggerToast={triggerToast} smsSettings={smsSettings} uiCard={uiCard} uiInput={uiInput} uiBtnPrimary={uiBtnPrimary} uiInnerPanel={uiInnerPanel} />}
                          {activeTab === 'store' && <CustomerDashboardStore inventory={inventory} categories={categories} cart={cart} setCart={setCart} allOrders={allOrders} uiCard={uiCard} uiInput={uiInput} uiBtnPrimary={uiBtnPrimary} uiInnerPanel={uiInnerPanel} triggerToast={triggerToast} />}
                          {activeTab === 'add_funds' && <CustomerDashboardFunds user={user} db={db} appId={appId} triggerToast={triggerToast} addNotification={addNotification} bankSettings={bankSettings} uiCard={uiCard} uiInput={uiInput} uiBtnPrimary={uiBtnPrimary} uiBtnSecondary={uiBtnSecondary} uiInnerPanel={uiInnerPanel} />}
                          {activeTab === 'my_accounts' && <CustomerDashboardVault user={user} purchases={purchases} db={db} appId={appId} uiCard={uiCard} uiBtnPrimary={uiBtnPrimary} uiInnerPanel={uiInnerPanel} triggerToast={triggerToast} />}
                          {activeTab === 'profile' && <CustomerDashboardProfile user={user} balance={currentUserBalance} tier={currentUserTier} userInfo={usersDB[user.email]} allOrders={allOrders} deposits={deposits} purchases={purchases} tickets={tickets.filter(t => t.email === user.email)} db={db} appId={appId} featureSettings={featureSettings} triggerToast={triggerToast} uiCard={uiCard} uiInput={uiInput} uiBtnPrimary={uiBtnPrimary} uiBtnSecondary={uiBtnSecondary} uiInnerPanel={uiInnerPanel} />}
                      </>
                    )}
                </div>
              </main>

              {showCart && user.role === 'customer' && <CartModal cart={cart} setCart={setCart} setShowCart={setShowCart} balance={currentUserBalance} user={user} promoSettings={promoSettings} triggerToast={triggerToast} addNotification={addNotification} db={db} appId={appId} uiCard={uiCard} uiBtnPrimary={uiBtnPrimary} uiInnerPanel={uiInnerPanel} />}
              
              {/* LIVE CHAT WIDGET FOR CUSTOMERS */}
              {user && user.role === 'customer' && <LiveChatWidget user={user} db={db} appId={appId} triggerToast={triggerToast} />}
            </div>
          );
        }

        // ==========================================
        // 💬 LIVE CHAT WIDGET (Customer Side) - FIXED NOTIFICATIONS
        // ==========================================
        function LiveChatWidget({ user, db, appId, triggerToast }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);
            const initialLoadRef = useRef(true);

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), orderBy('timestamp', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const allMsgs = [];
                    snapshot.forEach(doc => allMsgs.push({ id: doc.id, ...doc.data() }));
                    setChatMessages(allMsgs);
                    
                    // Trigger notification logic for new messages
                    if (!initialLoadRef.current) {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const newMsg = change.doc.data();
                                if (newMsg.sender === 'admin' && !isOpen) {
                                    triggerToast(`Message from Admin: ${newMsg.text.substring(0, 20)}...`);
                                    setUnreadCount(prev => prev + 1);
                                }
                            }
                        });
                    }

                    if (isOpen) {
                        setTimeout(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, 100);
                        setUnreadCount(0);
                    }
                    initialLoadRef.current = false;
                });
                return () => unsubscribe();
            }, [isOpen, db, appId, user.email]);

            useEffect(() => {
                if (isOpen) setUnreadCount(0);
            }, [isOpen]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), { text: msgText, sender: 'user', timestamp: serverTimestamp(), email: user.email });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', user.email), { lastMessage: msgText, lastMessageTime: serverTimestamp(), userEmail: user.email, unreadByAdmin: true }, { merge: true });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-brand-primary rounded-full shadow-[0_0_20px_rgba(212,175,55,0.4)] flex items-center justify-center text-black">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#0a0a0a] animate-pulse">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[320px] h-[400px] bg-[#121212] border border-[#2a2a2a] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden animate-pop-in origin-bottom-right">
                            <div className="bg-[#0a0a0a] border-b border-[#2a2a2a] p-4 flex items-center gap-3">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
                                <h3 className="text-white font-bold text-sm tracking-widest uppercase">Live Support</h3>
                            </div>
                            <div className="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[#0a0a0a]">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-30 animate-pulse">
                                        <MessageSquare className="w-8 h-8 mb-2 text-brand-primary" />
                                        <p className="text-xs text-gray-400 font-mono text-center">Send a message to connect with an admin.</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-fade-in-up ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className={`px-4 py-2.5 rounded-2xl max-w-[85%] text-xs font-medium leading-relaxed shadow-md ${msg.sender === 'user' ? 'bg-gold-gradient text-black rounded-tr-none' : 'bg-[#1a1a1a] text-gray-200 border border-[#2a2a2a] rounded-tl-none'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-600 mt-1 font-mono">
                                                {msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-[#121212] border-t border-[#2a2a2a] p-3 flex gap-2">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="flex-grow bg-[#0a0a0a] border border-[#2a2a2a] rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-brand-primary"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-brand-primary text-black p-2.5 rounded-lg disabled:opacity-50 transition-colors"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        // ==========================================
        // 🌟 SMS MODULE
        // ==========================================
        function CustomerDashboardSMS({ user, balance, triggerToast, smsSettings, uiCard, uiInput, uiBtnPrimary, uiInnerPanel }) {
          const [isSmsLoading, setIsSmsLoading] = useState(false);
          const [selectedSmsService, setSelectedSmsService] = useState(''); 
          const [availableServices, setAvailableServices] = useState([]); 
          const [isAppDropdownOpen, setIsAppDropdownOpen] = useState(false);
          const [appSearch, setAppSearch] = useState('');
          const [isFetchingServices, setIsFetchingServices] = useState(false);
          const [smsCountry, setSmsCountry] = useState('USA'); 
          
          const [priceTiers, setPriceTiers] = useState([]);
          const [selectedTier, setSelectedTier] = useState(null);
          const [isTiersLoading, setIsTiersLoading] = useState(false);

          const [confirmAction, setConfirmAction] = useState({ show: false, type: '', orderId: null, price: 0 });

          const latestOrderRef = useRef(null);
          const [activeOrders, setActiveOrders] = useState(() => {
              try { const saved = localStorage.getItem(`smsOrders_${user?.email}`); if (saved) { const parsed = JSON.parse(saved); if(Array.isArray(parsed)) return parsed.filter(o => o && o.status === 'ACTIVE'); } } catch(e) {} return [];
          });
          const [now, setNow] = useState(Date.now());

          useEffect(() => { if (user?.email) localStorage.setItem(`smsOrders_${user.email}`, JSON.stringify(activeOrders)); }, [activeOrders, user]);
          useEffect(() => { const int = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(int); }, []);

          useEffect(() => {
              if (smsSettings?.active) {
                  setIsFetchingServices(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getPrices?country=${smsCountry}`)
                  .then(r => r.json()).then(json => { 
                      const srvs = json?.success && Array.isArray(json.data) ? json.data : [];
                      setAvailableServices(srvs); 
                      // If only finding few services or none, log it.
                      if(srvs.length === 0) console.log("No services fetched for", smsCountry);
                      setIsFetchingServices(false); 
                  }).catch(() => { 
                      setIsFetchingServices(false); 
                      setAvailableServices([]); 
                  });
              }
          }, [smsSettings, smsCountry]);

          useEffect(() => {
              if (selectedSmsService && smsCountry) {
                  setIsTiersLoading(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getServiceTiers?country=${smsCountry}&service=${selectedSmsService}`)
                  .then(res => res.json()).then(data => { if (data?.success && Array.isArray(data?.tiers) && data.tiers.length > 0) { setPriceTiers(data.tiers); setSelectedTier(data.tiers[0]); } else { setPriceTiers([]); setSelectedTier(null); } setIsTiersLoading(false); }).catch(() => { setPriceTiers([]); setSelectedTier(null); setIsTiersLoading(false); });
              }
          }, [selectedSmsService, smsCountry]);

          const filteredApps = Array.isArray(availableServices) ? availableServices.filter(app => (app?.name || '').toLowerCase().includes((appSearch || '').toLowerCase())) : [];
          useEffect(() => { if (filteredApps.length > 0 && !selectedSmsService) setSelectedSmsService(filteredApps[0].code); }, [filteredApps, selectedSmsService]);

          const currentService = availableServices.find(s => s?.code === selectedSmsService) || null;
          const fallbackPrice = currentService?.finalPrice ? parseFloat(currentService.finalPrice) : 0;
          const finalBuyPrice = selectedTier?.priceWithMarkup ? parseFloat(selectedTier.priceWithMarkup) : fallbackPrice;
          const exactMaxPrice = selectedTier?.originalPrice ? parseFloat(selectedTier.originalPrice) : null;
          const exactProviderId = selectedTier?.providerId || null;

          const buySmsNumber = async () => {
              if (!currentService) return;
              if (activeOrders.length > 0) { triggerToast("Please complete your current order first."); return; }
              if (balance < finalBuyPrice) { triggerToast("Insufficient balance."); return; }
              
              setIsSmsLoading(true);
              try {
                  const token = await getAuthToken(); 
                  const deductRes = await fetch('https://voicestore-backend.onrender.com/api/sms-deduct', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ email: user.email, price: finalBuyPrice })
                  });
                  const deductData = await deductRes.json();
                  if (!deductData.success) { triggerToast(deductData.message || "Balance deduction failed."); setIsSmsLoading(false); return; }

                  const res = await fetch('https://voicestore-backend.onrender.com/api/juicy/getNumber', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ serviceId: currentService.code, countryId: smsCountry, maxPrice: exactMaxPrice, exactProviderId: exactProviderId }) 
                  });
                  const data = await res.json();
                  
                  if (data?.success && data?.phone) {
                      let finalOrderPrice = finalBuyPrice;
                      if (data.exactCost !== undefined && data.exactCost !== null) {
                          const markup = parseFloat(smsSettings?.markup || 1.00);
                          const actualTotalCost = parseFloat(data.exactCost) + markup;
                          const diff = parseFloat((finalBuyPrice - actualTotalCost).toFixed(2));
                          if (diff > 0) {
                              fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: diff }) }).catch(()=>{});
                              finalOrderPrice = actualTotalCost; 
                          }
                      }
                      const cleanName = (currentService.name || '').split(' [')[0];
                      const newOrder = { id: data.orderId, phone: data.phone, service: cleanName, countryId: smsCountry, price: finalOrderPrice, status: 'ACTIVE', codes: [], expiresAt: Date.now() + 240 * 1000, isCancelling: false, isNew: true };
                      setActiveOrders(prev => [newOrder, ...prev]); 
                      triggerToast("Number purchased successfully!");
                  } else {
                      await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: finalBuyPrice }) });
                      triggerToast(data?.message || "Failed to buy number.");
                  }
              } catch (e) { triggerToast("Network Error."); } finally { setIsSmsLoading(false); }
          };

          const performSkip = async (orderId, priceToRefund) => {
              try {
                  const token = await getAuthToken();
                  const skipRes = await fetch(`https://voicestore-backend.onrender.com/api/juicy/skip`, { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`}, body: JSON.stringify({orderId}) }); 
                  const skipData = await skipRes.json();
                  if (!skipData.success && !String(skipData.message).includes('already')) { triggerToast(skipData.message); return; }
                  await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: priceToRefund }) });
                  triggerToast(`Skipped. $${priceToRefund.toFixed(2)} refunded.`); 
                  setActiveOrders(prev => prev.filter(o => o.id !== orderId));
              } catch (e) {} 
          };

          const executeConfirmAction = () => {
              if(confirmAction.type === 'skip') performSkip(confirmAction.orderId, confirmAction.price);
              setConfirmAction({ show: false, type: '', orderId: null, price: 0 });
          };

          useEffect(() => {
              if(activeOrders.length === 0) return;
              const interval = setInterval(() => {
                  activeOrders.forEach(async (order) => {
                      if (order.codes.length > 0) return; 
                      if (Date.now() >= order.expiresAt) {
                          if (!order.isCancelling) {
                              order.isCancelling = true;
                              setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                              triggerToast(`Time expired. Refunded.`);
                              performSkip(order.id, order.price); // Auto skip when time ends
                          }
                          return;
                      }
                      try {
                          const res = await fetch(`https://voicestore-backend.onrender.com/api/juicy/getStatus?orderId=${order.id}`);
                          const data = await res.json();
                          if (data.success && data.status === 'OK' && data.code) {
                              setActiveOrders(prev => prev.map(o => {
                                  if (o.id === order.id && !o.codes.includes(data.code)) {
                                      triggerToast(`New SMS Received!`);
                                      getAuthToken().then(token => { fetch('https://voicestore-backend.onrender.com/api/sms-save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, type: `Live SMS (${o.service})`, data: `Phone: ${o.phone}\nSMS Code: ${data.code}` }) }); });
                                      return { ...o, codes: [...o.codes, data.code], lastMsg: 'SMS Received' };
                                  } return o;
                              }));
                          } else if (String(data.status).includes('CANCEL')) { setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                          } else { setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, lastMsg: data.status} : o)); }
                      } catch(e) {}
                  });
              }, 5000); 
              return () => clearInterval(interval);
          }, [activeOrders, user]);

          const copyText = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const formatPhoneDisplay = (phone) => { return `+${String(phone).replace(/\D/g, '')}`; };
          const copyNumberOnly = (phone) => { copyText(String(phone).replace(/\D/g, '')); };

          if(!smsSettings?.active) return <div className={uiCard + " text-center py-20 text-gray-500 font-medium w-full"}><Smartphone className="w-12 h-12 mx-auto mb-4 opacity-20"/> Service is currently disabled.</div>;

          return (
            <div className="w-full max-w-2xl mx-auto space-y-6 sm:space-y-8 relative">
                
                {confirmAction.show && (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-[#0a0a0a]/90 backdrop-blur-md animate-pop-in">
                        <div className="bg-[#121212] border border-[#2a2a2a] w-full max-w-sm rounded-2xl p-6 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-primary to-brand-primaryHover"></div>
                            <div className="flex items-center gap-3 mb-6">
                                <div className="p-3 rounded-full bg-red-900/20 text-red-500">
                                    <Ban className="w-5 h-5"/>
                                </div>
                                <h3 className="text-lg font-bold text-white tracking-wide">Skip Number?</h3>
                            </div>
                            <p className="text-xs text-gray-400 leading-relaxed font-medium mb-8">
                                Are you sure you want to skip this number? It will be banned and balance refunded.
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setConfirmAction({ show: false, type: '', orderId: null, price: 0 })} className="btn-animate flex-1 py-3 rounded-xl font-bold text-gray-400 bg-[#1a1a1a] hover:bg-[#2a2a2a] transition-colors text-xs uppercase tracking-wider">No</button>
                                <button onClick={executeConfirmAction} className="btn-animate flex-1 py-3 rounded-xl font-bold text-black transition-all text-xs uppercase tracking-wider shadow-lg bg-red-500 hover:bg-red-400 shadow-red-500/20">Yes</button>
                            </div>
                        </div>
                    </div>
                )}

                <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/30"}>
                    <div className="mb-6">
                        <label className="block text-[10px] font-bold text-brand-primary mb-2.5 uppercase tracking-[0.2em]">Select Country</label>
                        <div className="relative">
                            <select value={smsCountry} onChange={e => setSmsCountry(e.target.value)} className={uiInput + " appearance-none cursor-pointer pr-10 text-white bg-[#121212]"}>
                                {NETWORK_REGIONS.map(c => <option key={c.id} value={c.id} className="bg-[#121212]">{c.name}</option>)}
                            </select>
                            <ChevronDown className="w-4 h-4 text-brand-primary absolute right-4 top-4 pointer-events-none" />
                        </div>
                    </div>

                    <div className="bg-[#121212] p-5 rounded-2xl border border-[#2a2a2a] mb-8 shadow-inner">
                       <label className="block text-[10px] font-bold text-brand-primary mb-3 uppercase tracking-[0.2em]">Select Service</label>
                       <div className="flex flex-col sm:flex-row gap-4 items-center">
                           <div className="relative w-full">
                               <div onClick={() => setIsAppDropdownOpen(!isAppDropdownOpen)} className={uiInput + " h-14 pl-12 pr-10 flex items-center justify-between cursor-pointer border-[#2a2a2a] hover:border-brand-primary/50 bg-[#0a0a0a]"}>
                                   <span className="truncate text-white font-medium">{isFetchingServices ? 'Loading Apps...' : (currentService ? `${currentService.name}` : (availableServices.length > 0 ? 'Select App' : 'No services found'))}</span>
                                   {isFetchingServices ? <RefreshCw className="w-4 h-4 text-brand-primary absolute left-4 animate-spin"/> : <Smartphone className="w-4 h-4 text-brand-primary absolute left-4"/>}
                                   <ChevronDown className={`w-4 h-4 text-gray-500 absolute right-4 transition-transform ${isAppDropdownOpen ? 'rotate-180' : ''}`}/>
                               </div>
                               {isAppDropdownOpen && (
                                   <>
                                       <div className="fixed inset-0 z-30" onClick={() => setIsAppDropdownOpen(false)}></div>
                                       <div className="absolute top-full left-0 mt-2 w-full bg-[#121212] border border-[#2a2a2a] rounded-xl shadow-2xl z-40 overflow-hidden animate-pop-in">
                                           <div className="p-3 border-b border-[#2a2a2a] bg-[#0a0a0a]">
                                               <input type="text" autoFocus placeholder="Search service..." value={appSearch} onChange={(e) => setAppSearch(e.target.value)} className="w-full bg-[#121212] text-white text-xs font-medium rounded-lg px-4 py-3 outline-none border border-[#2a2a2a] focus:border-brand-primary/50"/>
                                           </div>
                                           <div className="max-h-60 overflow-y-auto custom-scrollbar">
                                               {filteredApps.length === 0 ? (<p className="text-center text-gray-500 py-6 text-xs">{isFetchingServices ? 'Fetching...' : 'No services found.'}</p>) : 
                                                   filteredApps.map(s => {
                                                       if(!s) return null;
                                                       return (
                                                           <div key={s.code} onClick={() => { setSelectedSmsService(s.code); setIsAppDropdownOpen(false); setAppSearch(''); }} className={`px-5 py-3.5 cursor-pointer text-xs font-medium transition-colors border-b border-[#2a2a2a]/50 ${selectedSmsService === s.code ? 'bg-brand-primary/10 text-brand-primary' : 'text-gray-300 hover:text-white hover:bg-[#1a1a1a]'}`}>
                                                               {s.name}
                                                           </div>
                                                       );
                                                   })
                                               }
                                           </div>
                                       </div>
                                   </>
                               )}
                           </div>
                           
                           <div className="relative w-full sm:w-auto shrink-0 min-w-[140px]">
                               <select 
                                   value={selectedTier?.originalPrice ? String(selectedTier.originalPrice) : ''}
                                   onChange={(e) => { const tier = Array.isArray(priceTiers) ? priceTiers.find(t => String(t?.originalPrice) === e.target.value) : null; if(tier) setSelectedTier(tier); }}
                                   disabled={isTiersLoading || (!Array.isArray(priceTiers)) || priceTiers.length === 0}
                                   className={uiInput + " h-14 pl-10 appearance-none cursor-pointer text-lg font-mono text-brand-primary border-[#2a2a2a] bg-[#0a0a0a] disabled:opacity-50"}
                               >
                                   {isTiersLoading ? (
                                       <option value="" className="text-sm bg-[#121212] text-gray-400">...</option>
                                   ) : (Array.isArray(priceTiers) && priceTiers.length > 0) ? (
                                       priceTiers.map((tier, idx) => (
                                           <option key={idx} value={String(tier.originalPrice)} className="bg-[#121212] text-white text-base">${Number(tier.priceWithMarkup || 0).toFixed(2)}</option>
                                       ))
                                   ) : (
                                       <option value="" className="bg-[#121212] text-white text-base">$0.00</option>
                                   )}
                               </select>
                               <DollarSign className="w-4 h-4 text-brand-primary/70 absolute left-4 top-5 pointer-events-none"/>
                               <ChevronDown className="w-4 h-4 text-gray-500 absolute right-4 top-5 pointer-events-none"/>
                           </div>
                       </div>
                    </div>

                    <button onClick={buySmsNumber} disabled={isSmsLoading || !currentService || activeOrders.length > 0 || (!priceTiers || priceTiers.length === 0)} className={uiBtnPrimary + " h-14 text-sm mt-4"}>
                        {activeOrders.length > 0 ? <span className="flex items-center gap-2"><StopCircle className="w-4 h-4"/> Please Wait</span> : isSmsLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Loading...</span> : 'Buy Number'}
                    </button>
                </div>

                {activeOrders.map((order, index) => {
                    const timeLeft = Math.max(0, Math.floor((order.expiresAt - now) / 1000));
                    return (
                        <div key={order.id} ref={index === 0 ? latestOrderRef : null} className={uiCard + " border-brand-primary/30 bg-[#121212] flex flex-col items-center py-10 px-6 shadow-[0_0_40px_rgba(212,175,55,0.08)] animate-pop-in"}>
                            <div className="absolute top-0 left-0 w-full h-1 bg-[#0a0a0a]"><div className="bg-brand-primary h-full transition-all ease-linear shadow-[0_0_15px_rgba(212,175,55,0.8)]" style={{width: `${(timeLeft / 240) * 100}%`}}></div></div>
                            
                            <div className="flex items-center gap-2 mb-6">
                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_currentColor]"></span>
                                <p className="text-gray-300 font-medium uppercase tracking-[0.3em] text-[10px]">Service: <span className="text-brand-primary font-bold">{order.service}</span></p>
                            </div>

                            <div className="flex items-center gap-3 w-full max-w-md mb-10">
                                <div className="text-3xl sm:text-5xl font-mono font-light text-white bg-[#0a0a0a] px-6 py-5 rounded-2xl border border-[#2a2a2a] shadow-inner flex-grow text-center whitespace-nowrap overflow-hidden text-ellipsis tracking-wider">
                                    +{String(order.phone).replace(/\D/g, '')}
                                </div>
                                <button onClick={() => copyNumberOnly(order.phone)} className="btn-animate p-5 bg-[#0a0a0a] hover:bg-[#1a1a1a] rounded-2xl text-brand-primary border border-[#2a2a2a] shadow-sm transition-colors shrink-0">
                                    <Copy className="w-6 h-6"/>
                                </button>
                            </div>
                            
                            {order.codes.length === 0 ? (
                                <div className="w-full max-w-md">
                                    <p className="text-gray-400 font-mono text-[10px] uppercase tracking-widest mb-4 flex justify-center items-center gap-2"><RefreshCw className="w-3 h-3 animate-spin text-brand-primary"/> {order.lastMsg === 'WAITING' || !order.lastMsg ? 'Waiting for SMS...' : `Status: ${order.lastMsg}`}</p>
                                    <div className="flex justify-between items-center bg-[#0a0a0a] p-3 sm:p-4 rounded-xl border border-[#2a2a2a] shadow-inner">
                                        <div className="flex items-center gap-2">
                                            <Clock className="w-3.5 h-3.5 text-brand-primary hidden sm:block"/>
                                            <span className="font-mono text-lg font-light text-gray-200 tracking-widest ml-1 sm:ml-0">{Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}</span>
                                        </div>
                                        
                                        {/* 🟢 ONLY SKIP BUTTON REMAINS HERE */}
                                        <button onClick={() => setConfirmAction({show: true, type: 'skip', orderId: order.id, price: order.price})} className="btn-animate bg-red-900/10 hover:bg-red-900/20 border border-red-900/30 text-red-500 px-6 py-2.5 rounded-lg text-[10px] uppercase tracking-wider font-bold transition-all flex items-center gap-1.5"><Ban className="w-3 h-3"/> Skip Number</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-md space-y-4 animate-pop-in">
                                    <p className="text-[10px] text-brand-primary font-bold uppercase tracking-[0.3em] text-center mb-3">SMS Received</p>
                                    {order.codes.map((c, i) => (
                                        <div key={i} className="flex items-center justify-between gap-3 sm:gap-4 bg-brand-primary/5 border border-brand-primary/20 p-4 sm:p-5 rounded-2xl shadow-[inset_0_0_15px_rgba(212,175,55,0.05)] animate-scale-up" style={{animationDelay: `${i * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className="text-2xl sm:text-3xl font-mono font-light text-brand-primary tracking-[0.2em] flex-grow drop-shadow-md text-center">{c}</div>
                                            <button onClick={() => copyText(c)} className="btn-animate p-3.5 bg-brand-primary/10 hover:bg-brand-primary/20 rounded-xl text-brand-primary transition-colors border border-brand-primary/30 shrink-0"><Copy className="w-5 h-5"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setActiveOrders([])} className={uiBtnSecondary + " mt-8 !bg-[#0a0a0a]"}>Close Order</button>
                                </div>
                            )}
                        </div>
                    )
                })}
            </div>
          );
        }

        // ==========================================
        // ASSET STORE MODULE (COMPACT)
        // ==========================================
        function CustomerDashboardStore({ inventory, categories, cart, setCart, allOrders, uiCard, uiInput, uiBtnPrimary, uiInnerPanel, triggerToast }) {
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedStates, setSelectedStates] = useState({}); // New state for dropdown
          const filteredCategories = categories.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
          const recentActivity = allOrders.slice(0, 5);

          const handleAddToCart = (product) => {
              const selectedState = selectedStates[product.id];
              // Check if specific state is required but not selected
              if (!selectedState && getAvailableStates(product.id).length > 0) {
                  triggerToast("Please select a State/Location first.");
                  return;
              }
              const cartItem = { ...product, selectedState: selectedState || 'Random' };
              setCart([...cart, cartItem]); 
              triggerToast(`Added to cart.`);
          };

          const handleStateChange = (productId, stateStr) => {
              setSelectedStates(prev => ({...prev, [productId]: stateStr}));
          };

          // Function to parse available states from inventory
          const getAvailableStates = (productId) => {
              const stock = inventory[productId] || [];
              if (stock.length === 0) return [];
              
              const states = new Set();
              stock.forEach(accData => {
                  const match = String(accData).match(/📍 STATE:\s*\n?([^\n]+)/i);
                  if (match && match[1]) {
                      states.add(match[1].trim());
                  }
              });
              return Array.from(states).sort();
          };

          return (
            <div className="space-y-6 w-full">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 w-full bg-[#121212] p-4 rounded-xl border border-[#2a2a2a] shadow-lg animate-slide-in-right">
                <div className="text-center sm:text-left w-full">
                  <h1 className="text-lg font-bold text-white tracking-wider uppercase mb-1">Buy <span className="text-brand-primary">Accounts</span></h1>
                </div>
                <div className="w-full sm:w-64 relative">
                     <Search className="w-4 h-4 text-brand-primary absolute left-3 top-2.5" />
                     <input type="text" placeholder="Search..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className={uiInput + " !pl-9 !py-2 !text-xs bg-[#0a0a0a] border-[#2a2a2a] h-9"} />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 w-full">
                  {filteredCategories.map((product, idx) => {
                      const Icon = product.icon || Package;
                      const availableStates = getAvailableStates(product.id);
                      const stockCount = inventory[product.id] ? inventory[product.id].length : 0;
                      const isOutOfStock = stockCount === 0;

                      return (
                          <div key={product.id} className={uiCard + " animate-scale-up p-4 flex flex-col group transition-all duration-300 border border-[#2a2a2a] hover:border-brand-primary/50 " + (isOutOfStock ? "opacity-60 grayscale" : "")} style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                              
                              {/* 🟢 COMPACT OUT OF STOCK OVERLAY 🟢 */}
                              {isOutOfStock && (
                                  <div className="absolute inset-0 z-20 flex items-center justify-center bg-[#0a0a0a]/70 backdrop-blur-sm rounded-2xl pointer-events-none">
                                      <div className="bg-red-900/90 text-white font-bold px-3 py-1.5 rounded border border-red-500/50 shadow-lg tracking-widest text-[10px] transform -rotate-6">
                                          OUT OF STOCK
                                      </div>
                                  </div>
                              )}

                              <div className="flex justify-between items-center mb-3">
                                  <div className="bg-[#0a0a0a] p-2.5 rounded-lg border border-[#1a1a1a] shadow-inner group-hover:scale-110 transition-transform">
                                      <Icon className={`w-5 h-5 text-brand-primary drop-shadow-[0_0_8px_currentColor]`} strokeWidth={1.5} />
                                  </div>
                                  <div className="text-right">
                                      <div className="text-brand-primary text-sm font-mono font-bold">${Number(product.price).toFixed(2)}</div>
                                      <div className="text-[9px] text-gray-500 uppercase tracking-widest mt-0.5">{stockCount} in stock</div>
                                  </div>
                              </div>
                              
                              <h3 className="text-sm font-bold text-white mb-1 truncate">{product.name}</h3>
                              <p className="text-gray-500 text-[10px] leading-tight mb-4 flex-grow line-clamp-2">{product.description}</p>
                              
                              {!isOutOfStock && availableStates.length > 0 && (
                                  <div className="mb-4 relative">
                                      <select 
                                          value={selectedStates[product.id] || ''} 
                                          onChange={(e) => handleStateChange(product.id, e.target.value)}
                                          className="w-full bg-[#0a0a0a] border border-[#2a2a2a] text-gray-300 text-[10px] rounded-lg px-3 py-2 appearance-none outline-none focus:border-brand-primary/50"
                                      >
                                          <option value="">Select State / Location</option>
                                          {availableStates.map(state => <option key={state} value={state}>{state}</option>)}
                                      </select>
                                      <ChevronDown className="w-3 h-3 text-gray-500 absolute right-3 top-2.5 pointer-events-none"/>
                                  </div>
                              )}

                              <button onClick={() => handleAddToCart(product)} disabled={isOutOfStock} className={uiBtnSecondary + " !w-full !py-2.5 !text-[10px] !rounded-lg"}>
                                  {isOutOfStock ? 'Unavailable' : 'Add to Cart'} <ShoppingCart className="w-3 h-3" />
                              </button>
                          </div>
                      );
                  })}
                  {filteredCategories.length === 0 && <div className="col-span-full py-10 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest"><Search className="w-6 h-6 mx-auto mb-2 opacity-20"/>No accounts match.</div>}
              </div>
            </div>
          );
        }

        // ==========================================
        // FUNDS MODULE
        // ==========================================
        function CustomerDashboardFunds({ user, db, appId, triggerToast, addNotification, bankSettings, uiCard, uiInput, uiBtnPrimary, uiBtnSecondary, uiInnerPanel }) {
          const [autoPay, setAutoPay] = useState({ active: false, amount: 0, time: 900, checking: false, invoiceId: '' });
          const TRON_ADDRESS = 'TELRyMwDmdKzBRb7Uaw3zNvphrc8V3D5Mj';
          const BTC_ADDRESS = '1EgVdWyoCsWepg3TAowifuhoR81Lm1xEUd';
          const [depositAmountUsd, setDepositAmountUsd] = useState('');
          const [cryptoAmountInput, setCryptoAmountInput] = useState(''); 
          const [cryptoMethod, setCryptoMethod] = useState('USDT TRC20');

          const startAutoDeposit = async (e) => {
              e.preventDefault();
              const form = e.target;
              const inputValue = cryptoAmountInput || (form.amount ? form.amount.value : 0);
              const baseAmount = parseFloat(inputValue);
              if (isNaN(baseAmount) || baseAmount < 1) { triggerToast('Minimum deposit is $1.00'); return; }
              
              // FIX: Generate a very small extra cent amount (0.01 to 0.09) to avoid high charges
              const uniqueCents = (Math.floor(Math.random() * 9) + 1) / 100; 
              const finalAmount = +(baseAmount + uniqueCents).toFixed(2);
              
              const newInvoiceId = 'DEP-' + Date.now();
              let cryptoAmount = finalAmount;
              if (cryptoMethod === 'BTC') {
                 try {
                     const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                     const btcData = await btcRes.json();
                     cryptoAmount = parseFloat((finalAmount / btcData.bitcoin.usd).toFixed(8));
                 } catch(e) { triggerToast("Failed to fetch BTC price."); return; }
              }
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', newInvoiceId), { 
                      email: user.email, amount: finalAmount, cryptoAmount: cryptoAmount,
                      method: `${cryptoMethod} (Auto)`, status: 'Awaiting Payment', date: new Date().toISOString(), txId: 'Pending'
                  });
                  setAutoPay({ active: true, amount: finalAmount, cryptoAmount: cryptoAmount, method: cryptoMethod, time: 1800, checking: true, invoiceId: newInvoiceId });
                  triggerToast(`Invoice created for ` + cryptoMethod);
              } catch (err) { triggerToast("Request failed."); }
          };

          const handleFlutterwavePayment = async () => {
              if(!bankSettings?.flutterwaveActive || !bankSettings?.flutterwaveKey) { triggerToast("Payment gateway disabled."); return; }
              const usdAmt = parseFloat(depositAmountUsd);
              if(isNaN(usdAmt) || usdAmt < 1) { triggerToast("Minimum deposit is $1.00"); return; }
              const nairaRate = bankSettings?.nairaRate || 1500;
              const nairaAmount = usdAmt * nairaRate;
              if (typeof window.FlutterwaveCheckout !== 'undefined') {
                  window.FlutterwaveCheckout({
                      public_key: bankSettings.flutterwaveKey, tx_ref: 'FLW-' + Math.floor((Math.random() * 1000000000) + 1), amount: nairaAmount, currency: "NGN",
                      payment_options: "card, banktransfer, ussd", customer: { email: user.email },
                      customizations: { title: "VoiceStore Deposit", description: "Account Deposit ($" + usdAmt + ")" },
                      callback: async function (data) {
                          if(data.status === "successful" || data.status === "completed") {
                              try {
                                  const token = await getAuthToken();
                                  const response = await fetch('https://voicestore-backend.onrender.com/api/flutterwave-success', {
                                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                      body: JSON.stringify({ email: user.email, amount: Number(usdAmt), transactionId: String(data.transaction_id || data.tx_ref) })
                                  });
                                  const result = await response.json();
                                  if(result.success) {
                                      triggerToast(`Successfully added $${usdAmt.toFixed(2)}!`); 
                                      setDepositAmountUsd('');
                                  } else {
                                      triggerToast(result.message || 'Payment verification failed');
                                  }
                              } catch(e) {}
                          }
                      },
                      onclose: function() { triggerToast('Payment window closed.'); }
                  });
              } else { triggerToast("Payment module loading... please try again."); }
          };

          // FIX: Separate API Checker logic so the countdown timer doesn't cancel it out.
          useEffect(() => {
              if (!autoPay.active || !autoPay.checking) return;
              
              const checkInterval = setInterval(async () => {
                  try {
                      const token = await getAuthToken();
                      const response = await fetch('https://voicestore-backend.onrender.com/api/verify-deposit', {
                          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                          body: JSON.stringify({ invoiceId: autoPay.invoiceId, amount: autoPay.amount, method: `${autoPay.method} (Auto)`, cryptoAmount: autoPay.cryptoAmount })
                      });
                      const result = await response.json();
                      if (result.success) {
                          setAutoPay({ active: false, amount: 0, cryptoAmount: 0, time: 0, checking: false, invoiceId: '' }); 
                          triggerToast(`Payment Verified! $${autoPay.amount} added.`);
                          addNotification('Deposit Successful', `$${autoPay.amount} added to balance.`);
                      }
                  } catch (err) {}
              }, 15000); 
              
              return () => clearInterval(checkInterval);
          }, [autoPay.active, autoPay.checking, autoPay.invoiceId, autoPay.amount, autoPay.method, autoPay.cryptoAmount, addNotification]);

          // Separate Countdown Timer logic
          useEffect(() => {
              if (!autoPay.active) return;
              const timer = setInterval(() => {
                  setAutoPay(prev => {
                      if (prev.time > 0) return { ...prev, time: prev.time - 1 };
                      if (prev.time <= 0 && prev.checking) {
                          try { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', autoPay.invoiceId), { status: 'Expired' }); } catch (e) {}
                          triggerToast('Payment session expired.');
                          return { active: false, amount: 0, cryptoAmount: 0, time: 0, checking: false, invoiceId: '' };
                      }
                      return prev;
                  });
              }, 1000);
              return () => clearInterval(timer);
          }, [autoPay.active, db, appId]);

          const copyToClipboard = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied to clipboard."));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied to clipboard."); }
          };

          return (
            <div className="animate-fade-in-up grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
              <div className="space-y-6 sm:space-y-8 w-full">
                <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/30 h-fit"}>
                  <h2 className="text-lg font-light tracking-[0.1em] mb-2 text-white flex items-center gap-2 uppercase">
                     <Zap className="w-5 h-5 text-brand-primary drop-shadow-[0_0_5px_currentColor]"/> Crypto Deposit
                  </h2>
                  
                  {!autoPay.active ? (
                      <div className="mt-8">
                        <p className="text-xs text-gray-500 mb-8 font-light leading-relaxed tracking-wide">Enter amount and select crypto. Payment is verified automatically.</p>
                        <form onSubmit={startAutoDeposit} className="space-y-6 w-full">
                          <div>
                            <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                            <div className="relative">
                               <DollarSign className="w-4 h-4 text-brand-primary/70 absolute left-4 top-3.5" />
                               <input type="number" step="1" min="1" name="amount" value={cryptoAmountInput} onChange={e => setCryptoAmountInput(e.target.value)} required placeholder="10" className={uiInput + " pl-12 text-base font-mono"} />
                            </div>
                          </div>
                          <div>
                              <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Select Crypto</label>
                              <select value={cryptoMethod} onChange={e => setCryptoMethod(e.target.value)} className={uiInput + " h-12 cursor-pointer font-mono text-sm"}>
                                  <option value="USDT TRC20" className="bg-[#121212]">USDT (TRC20)</option>
                                  <option value="BTC" className="bg-[#121212]">Bitcoin (BTC)</option>
                              </select>
                          </div>
                          <button type="submit" className={uiBtnPrimary + " h-12 mt-4"}>Pay with Crypto</button>
                        </form>
                      </div>
                  ) : (
                      <div className="bg-[#0a0a0a] border border-[#2a2a2a] rounded-2xl p-6 text-center space-y-6 relative overflow-hidden mt-6 shadow-inner">
                          <div className="absolute top-0 left-0 w-full h-1 bg-[#121212]">
                              <div className="h-full bg-brand-primary transition-all duration-1000 shadow-[0_0_10px_currentColor]" style={{ width: `${(autoPay.time / 1800) * 100}%` }}></div>
                          </div>
                          
                          <p className="text-[10px] font-mono font-bold text-brand-primary flex items-center justify-center gap-2.5 pt-4 uppercase tracking-[0.2em]">
                              <span className="w-2 h-2 bg-brand-primary rounded-full animate-pulse shadow-[0_0_5px_currentColor]"></span> Waiting for payment: {autoPay.method}
                          </p>
                          
                          <div className="text-3xl sm:text-4xl font-light font-mono text-white tracking-widest">
