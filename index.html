            constructor(props) {

                if (this.state.hasError) {

            useEffect(() => {
                try {
                    const rawData = String(acc?.data || '');
                    const match = rawData.match(/🔐 2FA INFO:\s*\n?([a-zA-Z0-9\s]+)/i);
                    if (match && match[1]) {
                        setTwoFaSecret(match[1].replace(/\s+/g, '').toUpperCase());

                } catch(e) {}
            }, [acc]);

            useEffect(() => {
                if (!twoFaSecret) return;
                const updateTotp = () => {
                    if (typeof window.OTPAuth !== 'undefined') {
                        try {
                            let totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(twoFaSecret) });
                            setTotpCode(totp.generate());
                            setTimeLeft(30 - (Math.floor(Date.now() / 1000) % 30));

                    {twoFaSecret && (
                        <div className="mb-5 bg-black/60 border border-white/5 p-4 rounded-xl flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
                            <div className="absolute bottom-0 left-0 w-full h-[1px] bg-white/10">
                                <div className="bg-brand-primary h-full transition-all duration-1000 ease-linear" style={{width: `${(timeLeft/30)*100}%`}}></div>
                            </div>
                            <p className="text-[8px] text-gray-400 font-bold mb-1 uppercase tracking-[0.3em]">Auth Code</p>
                            <div className="text-2xl font-bold text-white tracking-[0.2em] font-mono">{totpCode || '------'}</div>
                        </div>
                    )}

                    <div className="w-full bg-black/60 border border-white/5 p-4 rounded-xl mb-5 overflow-x-auto flex-grow shadow-inner custom-scrollbar">
                        <pre className="font-mono text-[10px] text-gray-300 whitespace-pre-wrap break-words leading-relaxed">{String(acc.data || '')}</pre>
                    </div>
                    
                    <div className="flex justify-between mt-auto items-center pt-2">
                        <button onClick={() => {
                           const id = 'REP-' + Date.now();
                           if(db && appId && acc.customer) {
                               try {
                                   setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', id), { email: acc.customer, subject: `Reported Account`, message: `I have an issue with this account.`, status: 'Open', date: new Date().toISOString() });
                                   triggerToast('Report sent to admin.');
                               } catch(e) {}
                           }
                        }} className="text-[9px] font-mono text-gray-500 hover:text-red-400 uppercase tracking-widest transition-colors">Report Issue</button>
                        <button onClick={() => {
                           if (navigator.clipboard) navigator.clipboard.writeText(String(acc.data || '')).then(() => triggerToast("Copied!"));
                           else { const t = document.createElement("textarea"); t.value = String(acc.data || ''); document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
                        }} className="btn-animate bg-white text-black px-5 py-2.5 rounded-lg text-[9px] uppercase tracking-widest font-bold flex items-center gap-2">
                            <Copy className="w-3 h-3"/> Copy Data
                        </button>
                    </div>
                </div>
            );
        };

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [user, setUser] = useState(null); 
          const [isAuthChecking, setIsAuthChecking] = useState(true);
          const [activeTab, setActiveTab] = useState('sms');
          const [usersDB, setUsersDB] = useState({});
          
          const [inventory, setInventory] = useState({ new: [], old: [], textplus: [], gv_bulk: [] });
          const [allOrders, setAllOrders] = useState([]);
          const [deposits, setDeposits] = useState([]);
          const [purchases, setPurchases] = useState([]);
          const [tickets, setTickets] = useState([]);
          const [activeChats, setActiveChats] = useState([]);
          const initialChatsLoadRef = useRef(true);
          
          const [promoSettings, setPromoSettings] = useState({ code: '', discount: 0, isActive: false });
          const [globalNotice, setGlobalNotice] = useState('');
          const [featureSettings, setFeatureSettings] = useState({ dailyReward: false, referral: false });
          const [bankSettings, setBankSettings] = useState({ bankName: 'Parallex', accountName: 'Samuel Osita Emmanuel', accountNumber: '1120927346', nairaRate: 1500, flutterwaveKey: '', flutterwaveActive: false });
          const [cryptoSettings, setCryptoSettings] = useState([]);
          const [smsSettings, setSmsSettings] = useState({ active: true, markup: 1.00 });
          const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
          const [customPayments, setCustomPayments] = useState([]);
          
          const [cart, setCart] = useState([]);
          const [showCart, setShowCart] = useState(false);
          const [notifications, setNotifications] = useState([]);
          const [toastData, setToastData] = useState({ show: false, msg: '', id: 0 });
          
          const [incomingMsg, setIncomingMsg] = useState(null); 

          const [authMethod, setAuthMethod] = useState('login');
          const [authError, setAuthError] = useState('');
          const [authSuccessMsg, setAuthSuccessMsg] = useState('');
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [isLoading, setIsLoading] = useState(false);

          useEffect(() => { setTimeout(() => setShowSplash(false), 2000); }, []);

          const triggerToast = (msg) => { const id = Date.now(); setToastData({ show: true, msg, id }); setTimeout(() => { setToastData(prev => prev.id === id ? { ...prev, show: false } : prev); }, 3000); };
          const addNotification = (title, text) => { setNotifications(prev => [{ id: Date.now(), title, text, time: 'Just now' }, ...prev].slice(0, 5)); };

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (firebaseUser) => {
              if (firebaseUser && firebaseUser.email) {
                 let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com';
                 try {
                     const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'AdminConfig');
                     const adminDoc = await getDoc(adminDocRef);
                     if (adminDoc.exists()) currentAdminEmail = adminDoc.data().adminEmail || currentAdminEmail;
                     else await setDoc(adminDocRef, { adminEmail: currentAdminEmail }, { merge: true });
                 } catch (err) {}

                 const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', firebaseUser.email);
                 try {
                    const userDocSnap = await getDoc(userDocRef);
                    if (!userDocSnap.exists() && firebaseUser.email.toLowerCase() !== currentAdminEmail.toLowerCase()) {
                        await setDoc(userDocRef, { password: '', balance: 0, totalSpent: 0, joined: new Date().toISOString(), lastBonusDate: '' });
                    }
                 } catch(e) {}

                 if (firebaseUser.email.toLowerCase() === currentAdminEmail.toLowerCase()) {
                    setUser({ email: firebaseUser.email, role: 'admin' }); setActiveTab('inventory');
                 } else if (firebaseUser.emailVerified) { 
                    setUser({ email: firebaseUser.email, role: 'customer' }); setActiveTab('sms');
                 } else { 
                    setUser(null); 
                 }
              } else { setUser(null); }
              setIsAuthChecking(false);
            });
            return () => unsubscribe();
          }, []);

          // Data Fetching 
          useEffect(() => {
            if (!user) return;
            const errLog = (e) => { if (e.code !== 'permission-denied') console.error(e); };
            const unsubs = [];
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), (snap) => { if (snap.exists()) setInventory(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'PromoCode'), (snap) => { if (snap.exists()) setPromoSettings(snap.data()); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Notice'), (snap) => { if (snap.exists()) setGlobalNotice(snap.data().text || ''); }, errLog));
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Features'), (snap) => { if (snap.exists()) setFeatureSettings(snap.data()); }, errLog));
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Bank'), (snap) => { if (snap.exists()) setBankSettings(prev => ({...prev, ...snap.data()})); }, errLog));
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CryptoMethods'), (snap) => { 
                if (snap.exists() && Array.isArray(snap.data().list)) { setCryptoSettings(snap.data().list); }
                else { setCryptoSettings([]); } 
            }, errLog));

            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CustomPayments'), (snap) => { 
                if (snap.exists() && Array.isArray(snap.data().list)) { setCustomPayments(snap.data().list); }
                else { setCustomPayments([]); }
            }, errLog));
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'SMS'), (snap) => { if (snap.exists()) setSmsSettings(snap.data()); }, errLog));
            
            unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), (snap) => { 
                if (snap.exists() && Array.isArray(snap.data().list)) { setCategories(snap.data().list); } 
                else { setCategories(DEFAULT_CATEGORIES); } 
            }, errLog));

            if (user.role === 'admin') {
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Users'), (snap) => { 
                    const u = {}; 
                    snap.forEach((d) => { u[d.id] = d.data(); }); 
                    setUsersDB(u); 
                }, errLog));
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats'), (snap) => { 
                    const chats = []; 
                    snap.forEach((d) => { chats.push({ id: d.id, ...d.data() }); }); 
                    
                    if (!initialChatsLoadRef.current) {
                        snap.docChanges().forEach((change) => {
                            if (change.type === 'modified' || change.type === 'added') {
                                const data = change.doc.data();
                                if (data.unreadByAdmin) { triggerToast(`New message from ${String(data.userEmail).split('@')[0]}`); }
                            }
                        });
                    }
                    setActiveChats(chats.sort((a,b) => {
                        const timeA = a.lastMessageTime?.toMillis ? a.lastMessageTime.toMillis() : 0;
                        const timeB = b.lastMessageTime?.toMillis ? b.lastMessageTime.toMillis() : 0;
                        return timeB - timeA;
                    })); 
                    initialChatsLoadRef.current = false;
                }, errLog));
            } else {
                unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', user.email), (docSnap) => { if (docSnap.exists()) setUsersDB(prev => ({...prev, [user.email]: docSnap.data()})); }, errLog));
            }

            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Orders'), (snap) => { 
                const o = []; 
                snap.forEach((d) => { o.push({ id: d.id, ...d.data() }); }); 
                setAllOrders(o.sort((a,b) => {
                    const timeA = a.date ? new Date(a.date).getTime() : 0;
                    const timeB = b.date ? new Date(b.date).getTime() : 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                })); 
            }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits'), (snap) => { 
                const dep = []; 
                snap.forEach((d) => { dep.push({ id: d.id, ...d.data() }); }); 
                setDeposits(dep.sort((a,b) => {
                    const timeA = a.date ? new Date(a.date).getTime() : 0;
                    const timeB = b.date ? new Date(b.date).getTime() : 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                })); 
            }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Purchases'), (snap) => { 
                const p = []; 
                snap.forEach((d) => { p.push({ id: d.id, ...d.data() }); }); 
                setPurchases(p.sort((a,b) => {
                    const timeA = a.date ? new Date(a.date).getTime() : 0;
                    const timeB = b.date ? new Date(b.date).getTime() : 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                })); 
            }, errLog));
            unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets'), (snap) => { 
                const t = []; 
                snap.forEach((d) => { t.push({ id: d.id, ...d.data() }); }); 
                setTickets(t.sort((a,b) => {
                    const timeA = a.date ? new Date(a.date).getTime() : 0;
                    const timeB = b.date ? new Date(b.date).getTime() : 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                })); 
            }, errLog));
            
            return () => unsubs.forEach(unsub => { if(typeof unsub === 'function') unsub(); });
          }, [user]);

          const handleAuthSubmit = async (e) => {
            e.preventDefault(); setAuthError(''); setAuthSuccessMsg(''); setIsLoading(true);
            let email = emailInput.trim(); let pwd = passwordInput.trim();
            if (!email || !pwd) { setAuthError('Email and Password are required.'); setIsLoading(false); return; }
            
            if (authMethod === 'admin') {
              const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'AdminConfig');
              let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com'; 
              try { const adminDoc = await getDoc(adminDocRef); if (adminDoc.exists()) currentAdminEmail = adminDoc.data().adminEmail || currentAdminEmail; } catch (e) {}

              if (email.toLowerCase() !== currentAdminEmail.toLowerCase()) { setAuthError('Access Denied: Invalid Admin Clearance.'); setIsLoading(false); return; }
              try { await signInWithEmailAndPassword(auth, email, pwd); setAuthSuccessMsg('Admin Login Successful.'); } 
              catch (error) { setAuthError('Incorrect Password.'); }
              setIsLoading(false); return;
            }

            try {
              if (authMethod === 'signup') {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', userCredential.user.email);
                await setDoc(userRef, { password: pwd, balance: 0, totalSpent: 0, joined: new Date().toISOString(), lastBonusDate: '' });
                
                await sendEmailVerification(userCredential.user);
                await auth.signOut(); 
                setAuthSuccessMsg('Account created! Please verify your email inbox before logging in.'); 
                setAuthMethod('login'); 
              } else {
                const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
                if (!userCredential.user.emailVerified) {
                   await auth.signOut(); 
                   setAuthError('Please verify your email inbox first!');
                   setIsLoading(false); 
                   return;
                }
                setAuthSuccessMsg('Login Successful.');
              }
            } catch (error) { setAuthError("Error: " + error.message); } finally { setIsLoading(false); }
          };

          const handleForgotPassword = async () => {
            if (!emailInput.trim()) { setAuthError('Enter your email to receive reset link.'); return; }
            setIsLoading(true);
            try {
              await sendPasswordResetEmail(auth, emailInput.trim());
              setAuthError(''); setAuthSuccessMsg('Recovery link sent to email.');
            } catch (error) { setAuthError(error.message); } 
            finally { setIsLoading(false); }
          };

          const handleLogout = () => { signOut(auth).then(() => { setUser(null); setCart([]); setShowCart(false); setEmailInput(''); setPasswordInput(''); }); };

          if (showSplash) return <SplashScreen />;

          if (isAuthChecking) return <div className="min-h-screen flex items-center justify-center bg-[#030712]"><RefreshCw className="w-8 h-8 text-brand-primary animate-spin"/></div>;

          if (!user) {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 relative font-sans w-full bg-transparent text-white">
                <PremiumBackground />
                <FloatingLogos />
                <div className="w-full max-w-[400px] animate-slide-up-smooth z-10">
                  <div className="flex flex-col items-center mb-8">
                    <h2 className="text-4xl sm:text-5xl font-bold tracking-[0.2em] text-white uppercase text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">Verify<span className="font-light text-brand-primary">Hub</span></h2>
                  </div>
                  
                  <div className="glass-effect rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/10">
                    {authMethod !== 'admin' && (
                        <div className="grid grid-cols-2 gap-2 glass-panel p-1 rounded-xl mb-8 border border-white/5">
                             <button type="button" onClick={() => { setAuthMethod('login'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'login' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Login</button>
                             <button type="button" onClick={() => { setAuthMethod('signup'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'signup' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Sign Up</button>
                        </div>
                    )}
                    {authMethod === 'admin' && <div className="text-center mb-8 pb-4 border-b border-white/10"><span className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center justify-center gap-2"><ShieldCheck className="w-4 h-4"/> Admin Portal</span></div>}
                    
                    <form onSubmit={handleAuthSubmit} className="space-y-5">
                      {authError && <div className="text-red-400 text-xs font-bold glass-panel border-red-500/30 p-4 rounded-xl flex items-center gap-3 animate-zoom-fade"><AlertTriangle className="w-5 h-5 shrink-0"/>{authError}</div>}
                      {authSuccessMsg && <div className="text-green-400 text-xs font-bold glass-panel border-green-500/30 p-4 rounded-xl flex items-center gap-3 animate-zoom-fade"><CheckCircle className="w-5 h-5 shrink-0"/>{authSuccessMsg}</div>}
                      
                      <div className="space-y-2">
                        <label className="text-[9px] font-bold text-gray-400 pl-1 uppercase tracking-widest">Email Address</label>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="name@example.com" required className="glass-input" />
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center px-1">
                           <label className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                           {(authMethod === 'login' || authMethod === 'admin') && <button type="button" onClick={handleForgotPassword} className="text-[9px] font-bold text-brand-primary hover:text-white transition-colors uppercase tracking-widest">Forgot?</button>}
                        </div>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••••••" required className="glass-input" />
                      </div>
                      <div className="pt-6">
                        <button type="submit" disabled={isLoading} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black border border-white/20 font-bold py-4 rounded-2xl transition-all text-xs tracking-widest uppercase flex items-center justify-center gap-2">
                            {isLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : (authMethod === 'signup' ? 'Create Account' : authMethod === 'login' ? 'Access Terminal' : 'Admin Login')}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          const currentUserBalance = user.role === 'customer' ? (usersDB[user.email]?.balance || 0) : 0;
          const currentUserTier = user.role === 'customer' ? getTier(usersDB[user.email]?.totalSpent || 0) : null;

          return (
            <div className="min-h-screen w-full relative overflow-x-hidden font-sans pb-24 flex flex-col bg-transparent text-white">
              <PremiumBackground />
              <FloatingLogos />
              <MessageNotification msg={incomingMsg} onClose={() => setIncomingMsg(null)} />
              
              {toastData.show && (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[400] animate-zoom-fade w-[90%] sm:w-auto max-w-sm">
                  <div className="glass-effect p-3.5 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/20">
                    <CheckCircle className="w-4 h-4 text-brand-primary shrink-0" />
                    <span className="font-bold text-[10px] sm:text-xs tracking-widest text-white uppercase">{toastData.msg}</span>
                  </div>
                </div>
              )}

              <header className="sticky top-0 z-40 w-full glass-effect rounded-none border-t-0 border-x-0 border-b border-white/10 shadow-lg">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3 sm:gap-4 animate-slide-in-right">
                      <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center shadow-lg border border-white/20 cursor-pointer">
                        <ShieldCheck className="w-5 h-5 text-brand-primary" strokeWidth={1.5} />
                      </div>
                      <span className="text-xl font-light tracking-[0.25em] text-white hidden sm:block uppercase drop-shadow-md">Verify<span className="font-bold text-brand-primary">Hub</span></span>
                  </div>
                  <div className="flex items-center gap-3 sm:gap-4">
                    {user.role === 'customer' && (
                        <button onClick={() => setShowCart(true)} className="btn-animate relative p-3 rounded-xl glass-panel text-white hover:bg-white/10 transition-colors border border-white/10">
                            <ShoppingCart className="w-4 h-4" strokeWidth={1.5}/>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full animate-zoom-fade">{cart.length}</span>}
                        </button>
                    )}
                    {user.role === 'customer' && (
                        <div className="glass-panel px-4 py-2.5 rounded-xl flex items-center gap-2 border border-white/10 cursor-default">
                            <Wallet className="w-4 h-4 text-brand-primary opacity-90" />
                            <span className="font-mono font-bold text-xs sm:text-sm tracking-wider text-white drop-shadow-sm">${Number(currentUserBalance).toFixed(2)}</span>
                        </div>
                    )}
                    <button onClick={handleLogout} className="btn-animate p-3 glass-panel text-white hover:text-red-400 hover:bg-white/10 transition-colors border border-white/10"><LogOut className="w-4 h-4" strokeWidth={1.5}/></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-8 relative z-10 w-full flex-grow flex flex-col items-center">
                {globalNotice && (
                  <div className="w-full mb-6 glass-panel border-l-4 border-l-brand-primary p-4 rounded-2xl flex items-start sm:items-center gap-4 animate-fade-in-up shadow-xl">
                     <Megaphone className="w-5 h-5 text-brand-primary shrink-0 mt-0.5 sm:mt-0" />
                     <p className="text-xs font-medium text-gray-200 leading-relaxed tracking-wide">{globalNotice}</p>
                  </div>
                )}

                <div className="w-full relative z-30 mb-8 animate-slide-in-down">
                  {/* 🟢 FIXED TABS: Grid Layout to Prevent Any Scrolling or Cut-offs 🟢 */}
                  <div className="glass-effect rounded-[24px] p-1.5 sm:p-2 grid grid-cols-5 gap-1 w-full border border-white/10 shadow-[0_15px_40px_rgba(0,0,0,0.6)] mx-auto max-w-5xl">
                    {(user.role === 'admin' ? ADMIN_TABS : CUSTOMER_TABS).map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`btn-animate relative flex flex-col items-center justify-center py-3 sm:py-3.5 px-0.5 sm:px-2 rounded-xl min-w-0 group ${activeTab === tab.id ? 'bg-white shadow-[0_0_25px_rgba(255,255,255,0.4)]' : 'hover:bg-white/10'}`}>
                          <div className="relative z-10 flex flex-col items-center justify-center w-full">
                              <tab.icon className={`w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-300 ${activeTab === tab.id ? 'scale-110 drop-shadow-md mb-1 text-black' : 'group-hover:scale-110 group-hover:-translate-y-0.5 mb-1 text-gray-400 group-hover:text-white'}`} strokeWidth={activeTab === tab.id ? 2 : 1.5} /> 
                              <span className={`text-[7.5px] sm:text-[9px] min-[400px]:text-[10px] leading-tight mt-0.5 uppercase tracking-wider text-center w-full whitespace-normal break-words px-0.5 ${activeTab === tab.id ? 'font-bold text-black' : 'font-medium text-gray-400 group-hover:text-white'}`}>
                                  {tab.label}
                              </span>
                          </div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="w-full relative tab-transition-enter" key={activeTab}>
                    <ErrorBoundary>
                        {user.role === 'admin' ? (
                          <AdminDashboard inventory={inventory} orders={allOrders} deposits={deposits} categories={categories} usersDB={usersDB} triggerToast={triggerToast} db={db} appId={appId} promoSettings={promoSettings} tickets={tickets} featureSettings={featureSettings} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} smsSettings={smsSettings} activeChats={activeChats} auth={auth} user={user} activeTab={activeTab} setActiveTab={setActiveTab} />
                        ) : (
                          <>
                              {activeTab === 'sms' && <CustomerDashboardSMS user={user} balance={currentUserBalance} triggerToast={triggerToast} smsSettings={smsSettings} />}
                              {activeTab === 'store' && <CustomerDashboardStore inventory={inventory} categories={categories} cart={cart} setCart={setCart} allOrders={allOrders} triggerToast={triggerToast} />}
                              {activeTab === 'add_funds' && <CustomerDashboardFunds user={user} db={db} appId={appId} triggerToast={triggerToast} addNotification={addNotification} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} />}
                              {activeTab === 'my_accounts' && <CustomerDashboardVault user={user} purchases={purchases} db={db} appId={appId} triggerToast={triggerToast} />}
                              {activeTab === 'profile' && <CustomerDashboardProfile user={user} balance={currentUserBalance} tier={currentUserTier} userInfo={usersDB[user.email]} allOrders={allOrders} deposits={deposits} purchases={purchases} tickets={tickets.filter(t => t && t.email === user.email)} db={db} appId={appId} featureSettings={featureSettings} triggerToast={triggerToast} />}
                          </>
                        )}
                    </ErrorBoundary>
                </div>
              </main>

              {showCart && user.role === 'customer' && <CartModal cart={cart} setCart={setCart} setShowCart={setShowCart} balance={currentUserBalance} user={user} promoSettings={promoSettings} triggerToast={triggerToast} addNotification={addNotification} db={db} appId={appId} />}
              
              {/* LIVE CHAT WIDGET FOR CUSTOMERS */}
              {user && user.role === 'customer' && <LiveChatWidget user={user} db={db} appId={appId} setIncomingMsg={setIncomingMsg} />}
            </div>
          );
        }

        function LiveChatWidget({ user, db, appId, setIncomingMsg }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);
            const initialLoadRef = useRef(true);

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), orderBy('timestamp', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const allMsgs = [];
                    snapshot.forEach((doc) => { 
                        allMsgs.push({ id: doc.id, ...doc.data() }); 
                    });
                    setChatMessages(allMsgs);
                    
                    if (!initialLoadRef.current) {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const newMsg = change.doc.data();
                                if (newMsg.sender === 'admin' && !isOpen) {
                                    setIncomingMsg(newMsg.text);
                                    setUnreadCount(prev => prev + 1);
                                }
                            }
                        });
                    }

                    if (isOpen) {
                        setTimeout(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, 100);
                        setUnreadCount(0);
                    }
                    initialLoadRef.current = false;
                });
                return () => unsubscribe();
            }, [isOpen, db, appId, user.email, setIncomingMsg]);

            useEffect(() => { if (isOpen) setUnreadCount(0); }, [isOpen]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), { text: msgText, sender: 'user', timestamp: serverTimestamp(), email: user.email });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', user.email), { lastMessage: msgText, lastMessageTime: serverTimestamp(), userEmail: user.email, unreadByAdmin: true }, { merge: true });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-white rounded-full shadow-[0_10px_25px_rgba(255,255,255,0.4)] flex items-center justify-center text-black hover:scale-105 transition-transform">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse shadow-lg">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[340px] h-[480px] glass-effect rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden animate-zoom-fade origin-bottom-right border border-white/20">
                            <div className="bg-black/40 border-b border-white/10 p-5 flex items-center justify-between backdrop-blur-md">
                                <div className="flex items-center gap-3">
                                   <div className="w-2.5 h-2.5 bg-brand-primary rounded-full animate-pulse shadow-[0_0_10px_#06b6d4]"></div>
                                   <h3 className="text-white font-bold text-[11px] tracking-widest uppercase">Admin Support</h3>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white transition-colors"><X className="w-4 h-4"/></button>
                            </div>
                            <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-transparent">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40 animate-pulse">
                                        <Headset className="w-12 h-12 mb-4 text-white" strokeWidth={1.5} />
                                        <p className="text-[10px] text-gray-300 font-mono text-center uppercase tracking-widest">Encrypted Channel Open</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-fade-in-up ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.03}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-medium leading-relaxed shadow-lg ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-sm' : 'glass-panel text-white rounded-tl-sm'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-500 mt-1.5 font-mono tracking-wider">
                                                {msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-black/40 border-t border-white/10 p-4 flex gap-3 items-center backdrop-blur-md">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="glass-input !py-3"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50 shadow-[0_0_15px_rgba(255,255,255,0.2)]"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        function CustomerDashboardSMS({ user, balance, triggerToast, smsSettings }) {
          const [isSmsLoading, setIsSmsLoading] = useState(false);
          const [selectedSmsService, setSelectedSmsService] = useState(''); 
          const [availableServices, setAvailableServices] = useState([]); 
          const [isAppDropdownOpen, setIsAppDropdownOpen] = useState(false);
          const [appSearch, setAppSearch] = useState('');
          const [isFetchingServices, setIsFetchingServices] = useState(false);
          const [smsCountry, setSmsCountry] = useState('USA'); 
          
          const [priceTiers, setPriceTiers] = useState([]);
          const [selectedTier, setSelectedTier] = useState(null);
          const [isTiersLoading, setIsTiersLoading] = useState(false);

          const [confirmAction, setConfirmAction] = useState({ show: false, type: '', orderId: null, price: 0 });

          const [activeOrders, setActiveOrders] = useState(() => {
              try { const saved = localStorage.getItem(`smsOrders_${user?.email}`); if (saved) { const parsed = JSON.parse(saved); if(Array.isArray(parsed)) return parsed.filter(o => o && o.status === 'ACTIVE'); } } catch(e) {} return [];
          });

          useEffect(() => { if (user?.email) localStorage.setItem(`smsOrders_${user.email}`, JSON.stringify(activeOrders)); }, [activeOrders, user]);

          useEffect(() => {
              if (smsSettings?.active) {
                  setIsFetchingServices(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getPrices?country=${smsCountry}`)
                  .then(r => r.json()).then(json => { 
                      const srvs = json?.success && Array.isArray(json.data) ? json.data : [];
                      setAvailableServices(srvs); 
                      setIsFetchingServices(false); 
                  }).catch(() => { 
                      setIsFetchingServices(false); 
                      setAvailableServices([]); 
                  });
              }
          }, [smsSettings, smsCountry]);

          useEffect(() => {
              if (selectedSmsService && smsCountry) {
                  setIsTiersLoading(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getServiceTiers?country=${smsCountry}&service=${selectedSmsService}`)
                  .then(res => res.json()).then(data => { if (data?.success && Array.isArray(data?.tiers) && data.tiers.length > 0) { setPriceTiers(data.tiers); setSelectedTier(data.tiers[0]); } else { setPriceTiers([]); setSelectedTier(null); } setIsTiersLoading(false); }).catch(() => { setPriceTiers([]); setSelectedTier(null); setIsTiersLoading(false); });
              }
          }, [selectedSmsService, smsCountry]);

          const filteredApps = Array.isArray(availableServices) ? availableServices.filter(app => (app?.name || '').toLowerCase().includes((appSearch || '').toLowerCase())) : [];
          useEffect(() => { if (filteredApps.length > 0 && !selectedSmsService) setSelectedSmsService(filteredApps[0].code); }, [filteredApps, selectedSmsService]);

          const currentService = availableServices.find(s => s?.code === selectedSmsService) || null;
          const fallbackPrice = currentService?.finalPrice ? parseFloat(currentService.finalPrice) : 0;
          const finalBuyPrice = selectedTier?.priceWithMarkup ? parseFloat(selectedTier.priceWithMarkup) : fallbackPrice;
          const exactMaxPrice = selectedTier?.originalPrice ? parseFloat(selectedTier.originalPrice) : null;
          const exactProviderId = selectedTier?.providerId || null;

          const buySmsNumber = async () => {
              if (!currentService) return;
              if (activeOrders.length > 0) { triggerToast("Please complete your current order first."); return; }
              if (balance < finalBuyPrice) { triggerToast("Insufficient balance."); return; }
              
              setIsSmsLoading(true);
              try {
                  const token = await getAuthToken(); 
                  const deductRes = await fetch('https://voicestore-backend.onrender.com/api/sms-deduct', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ email: user.email, price: finalBuyPrice })
                  });
                  const deductData = await deductRes.json();
                  if (!deductData.success) { triggerToast(deductData.message || "Balance deduction failed."); setIsSmsLoading(false); return; }

                  const res = await fetch('https://voicestore-backend.onrender.com/api/juicy/getNumber', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ serviceId: currentService.code, countryId: smsCountry, maxPrice: exactMaxPrice, exactProviderId: exactProviderId }) 
                  });
                  const data = await res.json();
                  
                  if (data?.success && data?.phone) {
                      let finalOrderPrice = finalBuyPrice;
                      if (data.exactCost !== undefined && data.exactCost !== null) {
                          const markup = parseFloat(smsSettings?.markup || 1.00);
                          const actualTotalCost = parseFloat(data.exactCost) + markup;
                          const diff = parseFloat((finalBuyPrice - actualTotalCost).toFixed(2));
                          if (diff > 0) {
                              fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: diff }) }).catch(()=>{});
                              finalOrderPrice = actualTotalCost; 
                          }
                      }
                      const cleanName = (currentService.name || '').split(' [')[0];
                      const newOrder = { id: data.orderId, phone: data.phone, service: cleanName, countryId: smsCountry, price: finalOrderPrice, status: 'ACTIVE', codes: [], expiresAt: Date.now() + 240 * 1000, isCancelling: false, isNew: true };
                      setActiveOrders(prev => [newOrder, ...prev]); 
                      triggerToast("Number assigned!");
                  } else {
                      await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: finalBuyPrice }) });
                      triggerToast(data?.message || "Failed to get number.");
                  }
              } catch (e) { triggerToast("Network Error."); } finally { setIsSmsLoading(false); }
          };

          const performSkip = async (orderId, priceToRefund, isAuto = false) => {
              if (isAuto) { setActiveOrders(prev => prev.filter(o => o.id !== orderId)); triggerToast(`Time expired. Refunded.`); }
              try {
                  const token = await getAuthToken();
                  const skipRes = await fetch(`https://voicestore-backend.onrender.com/api/juicy/skip`, { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`}, body: JSON.stringify({orderId}) }); 
                  const skipData = await skipRes.json();
                  if (!skipData.success && !String(skipData.message).includes('already')) { if(!isAuto) triggerToast(skipData.message); return; }
                  await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: priceToRefund }) });
                  if(!isAuto) triggerToast(`Skipped. $${priceToRefund.toFixed(2)} refunded.`); 
                  setActiveOrders(prev => prev.filter(o => o.id !== orderId));
              } catch (e) {} 
          };

          const executeConfirmAction = () => {
              if(confirmAction.type === 'skip') performSkip(confirmAction.orderId, confirmAction.price);
              setConfirmAction({ show: false, type: '', orderId: null, price: 0 });
          };

          useEffect(() => {
              if(activeOrders.length === 0) return;
              const interval = setInterval(() => {
                  activeOrders.forEach(async (order) => {
                      if (order.codes.length > 0) return; 
                      if (Date.now() >= order.expiresAt) {
                          if (!order.isCancelling) {
                              order.isCancelling = true;
                              setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                              triggerToast(`Time expired. Auto-refunded.`);
                              performSkip(order.id, order.price, true);
                          }
                          return;
                      }
                      try {
                          const res = await fetch(`https://voicestore-backend.onrender.com/api/juicy/getStatus?orderId=${order.id}`);
                          const data = await res.json();
                          if (data.success && data.status === 'OK' && data.code) {
                              setActiveOrders(prev => prev.map(o => {
                                  if (o.id === order.id && !o.codes.includes(data.code)) {
                                      triggerToast(`New SMS Received!`);
                                      getAuthToken().then(token => { fetch('https://voicestore-backend.onrender.com/api/sms-save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, type: `Live SMS (${o.service})`, data: `Phone: ${o.phone}\nSMS Code: ${data.code}` }) }); });
                                      return { ...o, codes: [...o.codes, data.code], lastMsg: 'SMS Received' };
                                  } return o;
                              }));
                          } else if (String(data.status).includes('CANCEL')) { setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                          } else { setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, lastMsg: data.status} : o)); }
                      } catch(e) {}
                  });
              }, 5000); 
              return () => clearInterval(interval);
          }, [activeOrders, user]);

          const copyText = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const formatPhoneDisplay = (phone) => { return `+${String(phone).replace(/\D/g, '')}`; };
          const copyNumberOnly = (phone) => { copyText(String(phone).replace(/\D/g, '')); };

          if(!smsSettings?.active) return <div className="glass-effect rounded-3xl w-full text-center py-32 text-gray-500 font-mono text-sm uppercase tracking-widest border border-white/10 animate-zoom-fade"><Smartphone className="w-12 h-12 mx-auto mb-4 opacity-30" strokeWidth={1.5}/> Service Offline.</div>;

          return (
            <div className="w-full max-w-3xl mx-auto space-y-6 sm:space-y-8 relative animate-zoom-fade">
                
                {confirmAction.show && (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm animate-bouncy-pop">
                        <div className="glass-effect w-full max-w-sm rounded-3xl p-6 sm:p-8 shadow-[0_20px_50px_rgba(0,0,0,0.8)] relative overflow-hidden border border-white/20">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-red-600"></div>
                            <div className="flex items-center gap-4 mb-6">
                                <div className="p-3.5 rounded-2xl glass-panel text-red-500 border border-red-500/30 shadow-inner">
                                    <Ban className="w-6 h-6"/>
                                </div>
                                <h3 className="text-base font-bold text-white tracking-widest uppercase">Skip Number?</h3>
                            </div>
                            <p className="text-xs text-gray-300 leading-relaxed font-light mb-8">
                                Are you sure you want to skip this number? It will be banned and balance refunded.
                            </p>
                            <div className="flex gap-3 w-full">
                                <button onClick={() => setConfirmAction({ show: false, type: '', orderId: null, price: 0 })} className="btn-animate flex-1 py-3.5 rounded-xl font-bold text-gray-300 glass-panel hover:bg-white/10 transition-colors text-xs uppercase tracking-widest">Cancel</button>
                                <button onClick={executeConfirmAction} className="btn-animate flex-1 py-3.5 rounded-xl font-bold text-white transition-all text-xs uppercase tracking-widest shadow-lg bg-red-600 hover:bg-red-500 shadow-[0_0_15px_rgba(220,38,38,0.4)] border border-red-500/50">Yes, Skip</button>
                            </div>
                        </div>
                    </div>
                )}

                <div className={uiCard + " p-6 sm:p-8 border border-white/10"}>
                    <div className="flex items-center justify-between mb-8 pb-5 border-b border-white/10 relative z-10">
                        <h2 className="text-lg sm:text-xl font-light tracking-[0.2em] text-white flex items-center gap-3 uppercase">
                            <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center shadow-inner backdrop-blur-md">
                                <Radar className="w-5 h-5 text-brand-primary animate-spin" style={{ animationDuration: '4s' }}/>
                            </div>
                            Control <span className="font-bold text-brand-primary">Panel</span>
                        </h2>
                        <div className="flex items-center gap-2 glass-panel px-3 py-1.5 rounded-full backdrop-blur-sm border-white/10">
                           <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                           <span className="text-[9px] text-gray-300 font-mono uppercase tracking-widest hidden sm:block pt-0.5">Status: Live</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 relative z-10 mb-8">
                        <div className="glass-panel p-4 rounded-2xl shadow-inner hover:border-brand-primary/30 transition-colors backdrop-blur-sm">
                            <label className="block text-[9px] font-bold text-gray-400 mb-2.5 uppercase tracking-[0.2em] ml-1">Select Region</label>
                            <div className="relative">
                                <select value={smsCountry} onChange={e => setSmsCountry(e.target.value)} className={uiInput + " appearance-none cursor-pointer pr-10 text-white h-12 bg-black/40"}>
                                    {NETWORK_REGIONS.map(c => <option key={c.id} value={c.id} className="bg-[#121212]">{c.name}</option>)}
                                </select>
                                <ChevronDown className="w-4 h-4 text-white absolute right-4 top-4 pointer-events-none" />
                            </div>
                        </div>

                        <div className="glass-panel p-4 rounded-2xl shadow-inner hover:border-brand-primary/30 transition-colors backdrop-blur-sm">
                            <label className="block text-[9px] font-bold text-gray-400 mb-2.5 uppercase tracking-[0.2em] ml-1">Select Price</label>
                            <div className="relative w-full">
                                <select 
                                    value={selectedTier?.originalPrice ? String(selectedTier.originalPrice) : ''}
                                    onChange={(e) => { const tier = Array.isArray(priceTiers) ? priceTiers.find(t => String(t?.originalPrice) === e.target.value) : null; if(tier) setSelectedTier(tier); }}
                                    disabled={isTiersLoading || (!Array.isArray(priceTiers)) || priceTiers.length === 0}
                                    className={uiInput + " h-12 pl-10 appearance-none cursor-pointer text-[13px] font-mono text-white bg-black/40 disabled:opacity-50"}
                                >
                                    {isTiersLoading ? (
                                        <option value="" className="text-xs bg-[#121212] text-gray-500">...</option>
                                    ) : (Array.isArray(priceTiers) && priceTiers.length > 0) ? (
                                        priceTiers.map((tier, idx) => (
                                            <option key={idx} value={String(tier.originalPrice)} className="bg-[#121212] text-gray-200">${Number(tier.priceWithMarkup || 0).toFixed(2)}</option>
                                        ))
                                    ) : (
                                        <option value="" className="bg-[#121212] text-gray-500">$0.00</option>
                                    )}
                                </select>
                                <DollarSign className="w-4 h-4 text-gray-400 absolute left-3.5 top-4 pointer-events-none"/>
                                <ChevronDown className="w-4 h-4 text-gray-600 absolute right-4 top-4 pointer-events-none"/>
                            </div>
                        </div>
                    </div>

                    <div className="glass-panel p-5 sm:p-6 rounded-3xl mb-8 shadow-inner relative z-10 backdrop-blur-sm hover:border-brand-primary/30 transition-all">
                       <label className="block text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-[0.2em] ml-1">Select Application</label>
                       <div className="relative w-full">
                           <div onClick={() => setIsAppDropdownOpen(!isAppDropdownOpen)} className={uiInput + " h-14 pl-12 pr-10 flex items-center justify-between cursor-pointer bg-black/50 shadow-md hover:border-white/40"}>
                               <span className="truncate text-white font-bold text-[13px] tracking-wide">{isFetchingServices ? 'Loading Apps...' : (currentService ? `${currentService.name}` : (availableServices.length > 0 ? 'Select App' : 'No services found'))}</span>
                               {isFetchingServices ? <RefreshCw className="w-4 h-4 text-brand-primary absolute left-4 animate-spin"/> : <Smartphone className="w-4 h-4 text-brand-primary absolute left-4"/>}
                               <ChevronDown className={`w-4 h-4 text-gray-400 absolute right-4 transition-transform ${isAppDropdownOpen ? 'rotate-180' : ''}`}/>
                           </div>
                           
                           {/* 🟢 MODAL INSTEAD OF ABSOLUTE DROPDOWN 🟢 */}
                           {isAppDropdownOpen && (
                               <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-zoom-fade">
                                   <div className="glass-effect border border-white/20 w-full max-w-sm rounded-3xl flex flex-col h-[70vh] shadow-[0_20px_50px_rgba(0,0,0,0.9)] overflow-hidden">
                                       <div className="p-4 border-b border-white/10 flex justify-between items-center bg-black/60 backdrop-blur-md">
                                           <h3 className="font-bold text-white text-xs tracking-widest uppercase">Select Application</h3>
                                           <button onClick={() => setIsAppDropdownOpen(false)} className="btn-animate p-1 text-gray-400 hover:text-white transition-colors"><X className="w-5 h-5"/></button>
                                       </div>
                                       <div className="p-4 bg-black/40 border-b border-white/10">
                                           <input autoFocus type="text" placeholder="Search app..." value={appSearch} onChange={(e) => setAppSearch(e.target.value)} className="glass-input !py-3 w-full"/>
                                       </div>
                                       <div className="flex-grow overflow-y-auto p-3 custom-scrollbar bg-transparent space-y-2">
                                           {filteredApps.length === 0 ? (<p className="text-center text-gray-500 py-10 text-[10px] font-mono uppercase tracking-widest">{isFetchingServices ? 'Fetching...' : 'No apps found.'}</p>) : 
                                               filteredApps.map((s, i) => {
                                                   if(!s) return null;
                                                   return (
                                                       <div key={s.code} onClick={() => { setSelectedSmsService(s.code); setIsAppDropdownOpen(false); setAppSearch(''); }} className={`btn-animate px-4 py-3.5 rounded-xl cursor-pointer text-xs font-bold transition-all duration-300 flex items-center justify-between animate-slide-in-right ${selectedSmsService === s.code ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.4)]' : 'text-gray-300 hover:bg-white/10 glass-panel'}`} style={{animationDelay: `${i * 0.02}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                                           {s.name}
                                                           {selectedSmsService === s.code && <CheckCircle className="w-4 h-4" />}
                                                       </div>
                                                   );
                                               })
                                           }
                                       </div>
                                   </div>
                               </div>
                           )}
                       </div>
                    </div>

                    {/* 🟢 ELASTIC GET NUMBER BUTTON 🟢 */}
                    <button onClick={buySmsNumber} disabled={isSmsLoading || !currentService || activeOrders.length > 0 || (!priceTiers || priceTiers.length === 0)} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black border border-white/30 font-bold py-4 rounded-2xl transition-all duration-300 text-xs tracking-widest uppercase shadow-[0_0_20px_rgba(255,255,255,0.1)] h-14 mt-4 relative z-10 max-w-md mx-auto flex items-center justify-center gap-2">
                        {activeOrders.length > 0 ? <span className="flex items-center gap-2"><StopCircle className="w-4 h-4"/> Finish Order First</span> : isSmsLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : 'Get Number'}
                    </button>
                </div>

                {activeOrders.map((order, index) => {
                    return (
                        <div key={order.id} className="glass-effect rounded-3xl border border-white/20 flex flex-col items-center py-10 px-6 sm:px-10 shadow-[0_20px_50px_rgba(6,182,212,0.15)] animate-bouncy-pop relative overflow-hidden group mt-8">
                            <div className="absolute top-0 left-0 w-full h-[3px] bg-white/10">
                                <OrderProgressBar expiresAt={order.expiresAt} />
                            </div>
                            
                            <div className="flex items-center gap-2.5 mb-8 glass-panel px-5 py-2.5 rounded-full border-white/20 shadow-lg relative z-10 backdrop-blur-md">
                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                                <p className="text-white font-bold uppercase tracking-[0.3em] text-[10px] pt-0.5">{order.service}</p>
                            </div>

                            <div className="flex items-center gap-4 w-full max-w-md mb-10 relative z-10">
                                <div className="text-3xl sm:text-5xl font-mono font-bold text-white bg-black/40 px-6 py-6 rounded-2xl border border-white/10 shadow-inner flex-grow text-center whitespace-nowrap overflow-hidden text-ellipsis tracking-wider backdrop-blur-md drop-shadow-md">
                                    +{String(order.phone).replace(/\D/g, '')}
                                </div>
                                <button onClick={() => copyNumberOnly(order.phone)} className="btn-animate p-6 bg-white hover:bg-gray-200 text-black rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-colors shrink-0">
                                    <Copy className="w-6 h-6"/>
                                </button>
                            </div>
                            
                            {order.codes.length === 0 ? (
                                <div className="w-full max-w-md relative z-10 animate-fade-in-up">
                                    <p className="text-gray-400 font-mono text-[10px] uppercase tracking-widest mb-4 flex justify-center items-center gap-2"><RefreshCw className="w-3 h-3 animate-spin text-white"/> {order.lastMsg === 'WAITING' || !order.lastMsg ? 'Waiting for SMS...' : `Status: ${order.lastMsg}`}</p>
                                    <div className="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/10 shadow-inner backdrop-blur-md">
                                        <div className="flex items-center gap-3 pl-2">
                                            <Clock className="w-4 h-4 text-gray-400 hidden sm:block"/>
                                            <OrderTimerDisplay expiresAt={order.expiresAt} />
                                        </div>
                                        
                                        <button onClick={() => setConfirmAction({show: true, type: 'skip', orderId: order.id, price: order.price})} className="btn-animate bg-red-900/20 hover:bg-red-900/40 border border-red-900/50 text-red-400 px-6 py-3 rounded-xl text-[10px] uppercase tracking-widest font-bold transition-all flex items-center gap-2 shadow-md"><Ban className="w-3.5 h-3.5"/> Skip</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-md space-y-4 animate-bouncy-pop relative z-10">
                                    <p className="text-[11px] text-green-400 font-bold uppercase tracking-[0.3em] text-center mb-5">SMS Received</p>
                                    {order.codes.map((c, i) => (
                                        <div key={i} className="flex items-center justify-between gap-4 glass-panel border-white/20 p-5 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] animate-scale-up backdrop-blur-md" style={{animationDelay: `${i * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className="text-3xl sm:text-4xl font-mono font-bold text-brand-primary tracking-[0.3em] flex-grow text-center drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">{c}</div>
                                            <button onClick={() => copyText(c)} className="btn-animate p-4 bg-white hover:bg-gray-200 rounded-xl text-black transition-colors shadow-[0_0_15px_rgba(255,255,255,0.3)] shrink-0"><Copy className="w-4 h-4"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setActiveOrders([])} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2 uppercase tracking-widest shadow-md mt-8 !text-xs">Close Order</button>
                                </div>
                            )}
                        </div>
                    )
                })}
            </div>
          );
        }

        // ==========================================
        // 🌟 ASSET STORE MODULE
        // ==========================================
        function CustomerDashboardStore({ inventory, categories, cart, setCart, triggerToast }) {
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedStates, setSelectedStates] = useState({}); 
          const filteredCategories = categories.filter(c => (c?.name || '').toLowerCase().includes((searchQuery || '').toLowerCase()));

          const handleAddToCart = (product) => {
              const selectedState = selectedStates[product.id];
              if (!selectedState && getAvailableStates(product.id).length > 0) {
                  triggerToast("Please select a State.");
                  return;
              }
              const cartItem = { ...product, selectedState: selectedState || 'Random' };
              setCart([...cart, cartItem]); 
              triggerToast(`Added to cart.`);
          };

          const handleStateChange = (productId, stateStr) => {
              setSelectedStates(prev => ({...prev, [productId]: stateStr}));
          };

          const getAvailableStates = (productId) => {
              const stock = inventory[productId] || [];
              if (stock.length === 0) return [];
              const states = new Set();
              stock.forEach(accData => {
                  const match = String(accData).match(/📍 STATE:\s*\n?([^\n]+)/i);
                  if (match && match[1]) states.add(match[1].trim());
              });
              return Array.from(states).sort();
          };

          return (
            <div className="space-y-6 w-full relative z-10">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 w-full glass-effect p-5 rounded-3xl border border-white/10 shadow-[0_15px_40px_rgba(0,0,0,0.6)] animate-swoosh-in relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-brand-primary shadow-[0_0_20px_#06b6d4]"></div>
                <div className="text-center sm:text-left w-full pl-4 py-1">
                  <h1 className="text-xl sm:text-2xl font-bold text-white tracking-[0.25em] uppercase mb-1">Buy <span className="font-light text-brand-primary">Accounts</span></h1>
                  <p className="text-gray-400 text-[9px] sm:text-[10px] font-mono tracking-widest uppercase">Verified Static Entities</p>
                </div>
                <div className="w-full sm:w-72 relative">
                     <Search className="w-4 h-4 text-white absolute left-4 top-3.5" />
                     <input type="text" placeholder="Search accounts..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="glass-input !pl-12 !py-3 rounded-2xl" />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full">
                  {filteredCategories.map((product, idx) => {
                      const Icon = product.icon || Package;
                      const availableStates = getAvailableStates(product.id);
                      const stockCount = inventory[product.id] ? inventory[product.id].length : 0;
                      const isOutOfStock = stockCount === 0;

                      return (
                          <div key={product.id} className={`relative glass-panel rounded-3xl p-6 flex flex-col group transition-all duration-300 border border-white/5 animate-slide-up-smooth shadow-xl ${isOutOfStock ? "opacity-50 grayscale" : "hover:border-brand-primary/40 hover:-translate-y-2 hover:shadow-[0_20px_50px_-15px_rgba(6,182,212,0.3)] hover:bg-black/60"}`} style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                              
                              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-brand-primary to-transparent scale-x-0 group-hover:scale-x-100 transition-transform duration-700 ease-out"></div>

                              {isOutOfStock && (
                                  <div className="absolute inset-0 z-20 flex items-center justify-center bg-black/70 backdrop-blur-[2px] rounded-3xl pointer-events-none">
                                      <div className="bg-white/10 backdrop-blur-md text-white font-bold px-4 py-2 rounded-xl border border-white/20 shadow-2xl tracking-[0.3em] text-[10px] uppercase transform -rotate-12 drop-shadow-md">
                                          Out of Stock
                                      </div>
                                  </div>
                              )}

                              <div className="flex justify-between items-start mb-6 relative z-10">
                                  <div className="bg-white/5 p-4 rounded-2xl border border-white/10 group-hover:bg-brand-primary/10 transition-colors duration-500 shadow-inner backdrop-blur-md">
                                      <Icon className={`w-6 h-6 text-brand-primary drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]`} strokeWidth={1.5} />
                                  </div>
                                  <div className="text-right flex flex-col items-end">
                                      <span className="text-white text-xl font-mono font-bold tracking-wider">${Number(product.price).toFixed(2)}</span>
                                      <span className="text-[8px] text-brand-primary uppercase tracking-widest mt-1 font-mono bg-brand-primary/10 px-2.5 py-1 rounded-full border border-brand-primary/20">{stockCount} Units</span>
                                  </div>
                              </div>
                              
                              <h3 className="text-sm font-bold text-white mb-2 tracking-wider uppercase relative z-10 group-hover:text-brand-primary transition-colors duration-300">{product.name}</h3>
                              <p className="text-gray-400 text-[10px] leading-relaxed mb-6 flex-grow line-clamp-2 font-light relative z-10">{product.description}</p>
                              
                              {!isOutOfStock && availableStates.length > 0 && (
                                  <div className="mb-5 relative z-10">
                                      <select 
                                          value={selectedStates[product.id] || ''} 
                                          onChange={(e) => handleStateChange(product.id, e.target.value)}
                                          className="w-full bg-black/50 border border-white/10 text-gray-300 text-[10px] rounded-xl px-4 py-3.5 appearance-none outline-none focus:border-brand-primary/50 tracking-wider font-mono cursor-pointer transition-colors shadow-inner backdrop-blur-md"
                                      >
                                          <option value="">Select State</option>
                                          {availableStates.map(state => <option key={state} value={state}>{state}</option>)}
                                      </select>
                                      <ChevronDown className="w-3 h-3 text-gray-400 absolute right-4 top-3.5 pointer-events-none"/>
                                  </div>
                              )}

                              <button onClick={() => handleAddToCart(product)} disabled={isOutOfStock} className="btn-animate w-full bg-white/5 border border-white/10 hover:bg-brand-primary text-white hover:text-black font-bold py-4 rounded-xl transition-all duration-300 text-[10px] tracking-widest uppercase relative z-10 flex justify-center items-center gap-2 shadow-md backdrop-blur-sm">
                                  {isOutOfStock ? 'Unavailable' : 'Add to Cart'} <ShoppingCart className="w-3.5 h-3.5" />
                              </button>
                          </div>
                      );
                  })}
                  {filteredCategories.length === 0 && <div className="col-span-full py-16 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest"><Search className="w-8 h-8 mx-auto mb-3 opacity-20"/>No accounts found.</div>}
              </div>
            </div>
          );
        }

        // ==========================================
        // FUNDS MODULE
        // ==========================================
        function CustomerDashboardFunds({ user, db, appId, triggerToast, addNotification, bankSettings, cryptoSettings, customPayments }) {
          const [autoPay, setAutoPay] = useState({ active: false, amount: 0, time: 900, checking: false, invoiceId: '' });
          
          const [depositAmountUsd, setDepositAmountUsd] = useState('');
          const [cryptoAmountInput, setCryptoAmountInput] = useState(''); 
          
          const validCryptoOptions = cryptoSettings && cryptoSettings.length > 0 ? cryptoSettings : [{id: 1, name: 'USDT', network: 'TRC20', address: 'TELRyMwDmdKzBRb7Uaw3zNvphrc8V3D5Mj'}];
          const [cryptoMethod, setCryptoMethod] = useState(validCryptoOptions[0].name);
          const activeCryptoObj = validCryptoOptions.find(c => c.name === cryptoMethod) || validCryptoOptions[0];
          
          // 🟢 MANUAL DEPOSIT STATE 🟢
          const [manualAmount, setManualAmount] = useState('');
          const [manualMethod, setManualMethod] = useState('Local Bank Transfer');
          const [manualTxId, setManualTxId] = useState('');

          const startAutoDeposit = async (e) => {
              e.preventDefault();
              const baseAmount = parseFloat(cryptoAmountInput);
              if (isNaN(baseAmount) || baseAmount < 1) { triggerToast('Minimum deposit is $1.00'); return; }
              
              const uniqueCents = (Math.floor(Math.random() * 9) + 1) / 100; 
              const finalAmount = +(baseAmount + uniqueCents).toFixed(2);
              
              const newInvoiceId = 'DEP-' + Date.now();
              let cryptoAmount = finalAmount;
              if (cryptoMethod === 'BTC') {
                 try {
                     const btcRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                     const btcData = await btcRes.json();
                     cryptoAmount = parseFloat((finalAmount / btcData.bitcoin.usd).toFixed(8));
                 } catch(e) { triggerToast("Failed to fetch BTC price."); return; }
              }
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', newInvoiceId), { 
                      email: user.email, amount: finalAmount, cryptoAmount: cryptoAmount,
                      method: `${cryptoMethod} (Auto)`, status: 'Awaiting Payment', date: new Date().toISOString(), txId: 'Pending'
                  });
                  setAutoPay({ active: true, amount: finalAmount, cryptoAmount: cryptoAmount, method: cryptoMethod, time: 1800, checking: true, invoiceId: newInvoiceId });
                  triggerToast(`Invoice created for ` + cryptoMethod);
              } catch (err) { triggerToast("Request failed."); }
          };

          // 🟢 NEW MANUAL DEPOSIT SUBMISSION 🟢
          const submitManualDeposit = async (e) => {
              e.preventDefault();
              const amt = parseFloat(manualAmount);
              if (isNaN(amt) || amt < 1) return triggerToast("Minimum deposit is $1");
              if (!manualTxId.trim()) return triggerToast("Please provide Transaction ID/Sender Details");
              
              const newInvoiceId = 'DEP-MANUAL-' + Date.now();
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', newInvoiceId), {
