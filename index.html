                              {autoPay.cryptoAmount} <span className="text-lg sm:text-xl text-gray-500">{autoPay.method === 'BTC' ? 'BTC' : 'USDT'}</span>
                          </div>
                          <p className="text-gray-500 font-mono text-[10px] uppercase tracking-widest">~ ${autoPay.amount.toFixed(2)} USD</p>

                          <div className="bg-[#121212] border border-[#2a2a2a] p-4 rounded-xl mt-6">
                              <p className="text-[9px] text-gray-600 font-bold uppercase tracking-[0.3em] mb-3">Send To Address</p>
                              <p className="font-mono text-xs sm:text-sm text-brand-primary break-all select-all font-light tracking-wider bg-[#0a0a0a] p-3 rounded-lg border border-[#1a1a1a]">
                                  {autoPay.method === 'BTC' ? BTC_ADDRESS : TRON_ADDRESS}
                              </p>
                              <button onClick={() => copyToClipboard(autoPay.method === 'BTC' ? BTC_ADDRESS : TRON_ADDRESS)} className={uiBtnSecondary + " !w-auto !py-2 !px-5 mt-4 mx-auto !text-[10px]"}><Copy className="w-3.5 h-3.5" /> Copy Address</button>
                          </div>
                          
                          <div className="bg-red-900/10 p-4 rounded-xl border border-red-900/30 text-left">
                             <p className="text-[10px] text-red-500 font-bold mb-2 flex items-center gap-2 uppercase tracking-[0.2em]"><AlertTriangle className="w-3.5 h-3.5"/> Important</p>
                             <p className="text-[11px] text-gray-400 leading-relaxed font-light">
                                  Send exactly <span className="font-mono font-bold text-white">{autoPay.cryptoAmount}</span>. Any other amount will not be added automatically.
                             </p>
                             <p className="text-[11px] text-gray-400 leading-relaxed font-light mt-1">
                                  Please make sure to account for network fees (e.g. Binance fee) so the exact <span className="font-mono font-bold text-white">{autoPay.cryptoAmount}</span> arrives.
                             </p>
                          </div>
                          
                          <div className="flex justify-between items-center pt-6 border-t border-[#1a1a1a] w-full">
                              <p className="text-xs font-mono text-gray-500 flex items-center gap-2">
                                  <Clock className="w-3.5 h-3.5"/> {Math.floor(autoPay.time / 60)}:{(autoPay.time % 60).toString().padStart(2, '0')}
                              </p>
                              <button onClick={() => setAutoPay({active: false, amount: 0, time: 0, checking: false, invoiceId: ''})} className="text-[10px] text-red-500 hover:text-red-400 font-bold uppercase tracking-widest transition-colors">Cancel</button>
                          </div>
                      </div>
                  )}
                </div>
              </div>

              <div className="space-y-6 sm:space-y-8 w-full">
                <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/10"}>
                  <div className="flex justify-between items-start mb-6 pb-4 border-b border-[#2a2a2a]">
                     <h3 className="text-sm font-light tracking-[0.2em] text-white flex items-center gap-2 uppercase">
                       <Building className="w-4 h-4 text-gray-400"/> Bank Transfer
                     </h3>
                     <div className="text-right">
                        <p className="text-[9px] text-gray-600 font-bold uppercase tracking-widest mb-1">Rate</p>
                        <p className="text-xs font-mono text-brand-primary">$1 = ₦{bankSettings?.nairaRate || 1500}</p>
                     </div>
                  </div>
                  
                  <div className="mb-6 p-5 bg-[#0a0a0a] rounded-2xl border border-[#2a2a2a] shadow-inner">
                     <label className="block text-[10px] font-bold text-gray-500 mb-3 uppercase tracking-[0.2em]">Amount to Add (USD)</label>
                     <div className="relative mb-4">
                        <DollarSign className="w-4 h-4 text-brand-primary/50 absolute left-4 top-3.5" />
                        <input type="number" min="1" placeholder="Enter amount..." value={depositAmountUsd} onChange={e => setDepositAmountUsd(e.target.value)} className={uiInput + " !pl-12 !py-3 font-mono"} />
                     </div>
                     <div className="flex items-center justify-between p-4 bg-[#121212] rounded-xl border border-[#2a2a2a]">
                        <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Send Exactly (₦):</span>
                        <span className="text-base font-mono font-light text-brand-primary">₦{depositAmountUsd && !isNaN(parseFloat(depositAmountUsd)) ? (parseFloat(depositAmountUsd) * (bankSettings?.nairaRate || 1500)).toLocaleString() : '0'}</span>
                     </div>
                  </div>

                  <div className="bg-[#0a0a0a] border border-[#2a2a2a] rounded-xl p-5 mb-6 text-xs font-light tracking-wide space-y-4">
                    <div className="flex justify-between items-center border-b border-[#1a1a1a] pb-3"><span className="text-gray-500 uppercase text-[10px] tracking-widest">Bank</span> <span className="font-medium text-white">Parallex</span></div>
                    <div className="flex justify-between items-center border-b border-[#1a1a1a] pb-3 pt-1"><span className="text-gray-500 uppercase text-[10px] tracking-widest">Name</span> <span className="font-medium text-white text-right">Samuel Osita Emmanuel</span></div>
                    <div className="flex justify-between items-center pt-1"><span className="text-gray-500 uppercase text-[10px] tracking-widest">Account No.</span> <span className="font-mono text-brand-primary font-medium text-sm">1120927346</span></div>
                  </div>
                  <button onClick={() => copyToClipboard('1120927346')} className={uiBtnSecondary + " mb-5"}><Copy className="w-3.5 h-3.5" /> Copy Details</button>
                  <div className="flex items-start gap-2 justify-center opacity-50">
                      <Info className="w-3.5 h-3.5 text-gray-400 shrink-0"/>
                      <p className="text-[9px] text-gray-400 font-mono uppercase tracking-widest">Admin must verify payment manually.</p>
                  </div>
                </div>

                {bankSettings?.flutterwaveActive && (
                    <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-emerald-900/30"}>
                        <h2 className="text-sm font-light tracking-[0.2em] mb-4 text-white flex items-center gap-2 uppercase">
                            <CreditCard className="w-4 h-4 text-emerald-500"/> Direct Card Payment
                        </h2>
                        <p className="text-[11px] text-gray-500 mb-6 leading-relaxed font-light tracking-wide">Pay securely via Flutterwave. Funds added instantly.</p>
                        
                        <div className="flex flex-col sm:flex-row gap-4 items-end w-full">
                            <div className="w-full">
                              <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                              <div className="relative">
                                 <DollarSign className="w-4 h-4 text-emerald-500/50 absolute left-4 top-3.5" />
                                 <input type="number" step="1" min="1" value={depositAmountUsd} onChange={e => setDepositAmountUsd(e.target.value)} placeholder="10" className={uiInput + " pl-12 font-mono"} />
                              </div>
                            </div>
                            <button onClick={handleFlutterwavePayment} className="btn-animate w-full sm:w-auto bg-[#0a0a0a] hover:bg-[#121212] text-emerald-500 font-bold px-8 rounded-xl h-[52px] whitespace-nowrap border border-emerald-900/50 hover:border-emerald-500/50 uppercase tracking-widest text-[10px] shadow-lg">
                                Pay ₦{depositAmountUsd && !isNaN(parseFloat(depositAmountUsd)) ? (parseFloat(depositAmountUsd) * (bankSettings?.nairaRate || 1500)).toLocaleString() : '0'}
                            </button>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // VAULT MODULE
        // ==========================================
        function CustomerDashboardVault({ purchases, db, appId, uiCard, uiBtnPrimary, uiInnerPanel, triggerToast, user }) {
          const myPurchases = purchases.filter(p => p.customer === user?.email);

          return (
            <div className="animate-fade-in-up w-full">
              <div className={uiCard + " p-6 sm:p-8 min-h-[600px] border-t-[1px] border-t-brand-primary/20"}>
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-6 border-b border-[#2a2a2a] gap-4">
                    <div>
                        <h2 className="text-xl sm:text-2xl font-light tracking-[0.1em] text-white uppercase mb-1">My <span className="font-bold text-brand-primary">Accounts</span></h2>
                        <p className="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Purchased details</p>
                    </div>
                    <div className="bg-[#0a0a0a] border border-[#2a2a2a] px-4 py-2 rounded-lg flex items-center gap-2">
                        <Lock className="w-3.5 h-3.5 text-brand-primary"/>
                        <span className="text-xs font-mono text-gray-300">{myPurchases.length} Accounts</span>
                    </div>
                </div>

                {myPurchases.length === 0 ? (
                  <div className="text-center py-32 flex flex-col items-center">
                    <Key className="w-12 h-12 mb-6 text-[#2a2a2a]" strokeWidth={1} />
                    <p className="text-xs font-mono text-gray-600 uppercase tracking-[0.2em]">You haven't bought anything yet.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full">
                    {myPurchases.map((acc, idx) => {
                       const [totpCode, setTotpCode] = useState('');
                       const [timeLeft, setTimeLeft] = useState(30);
                       const [twoFaSecret, setTwoFaSecret] = useState(null);

                       useEffect(() => {
                           const rawData = String(acc.data || '');
                           const match = rawData.match(/🔐 2FA INFO:\s*\n?([a-zA-Z0-9\s]+)/i);
                           if (match) setTwoFaSecret(match[1].replace(/\s+/g, '').toUpperCase());
                       }, [acc.data]);

                       useEffect(() => {
                           if (!twoFaSecret) return;
                           const updateTotp = () => {
                               if (typeof window.OTPAuth !== 'undefined') {
                                   try {
                                       let totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(twoFaSecret) });
                                       setTotpCode(totp.generate());
                                       setTimeLeft(30 - (Math.floor(Date.now() / 1000) % 30));
                                   } catch(e) {}
                               }
                           };
                           updateTotp();
                           const interval = setInterval(updateTotp, 1000);
                           return () => clearInterval(interval);
                       }, [twoFaSecret]);

                       return (
                           <div key={idx} className="bg-[#0a0a0a] border border-[#1a1a1a] hover:border-[#2a2a2a] transition-all rounded-2xl p-1 relative group shadow-sm hover:shadow-[0_4px_20px_rgba(0,0,0,0.5)] animate-scale-up" style={{animationDelay: `${idx * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                               <div className="bg-[#121212] rounded-xl p-5 h-full flex flex-col relative overflow-hidden">
                                   <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-brand-primary/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                   
                                   <div className="flex justify-between items-start mb-6">
                                       <span className="text-xs font-bold text-gray-200 uppercase tracking-wider flex items-center gap-2">
                                           <Package className="w-3.5 h-3.5 text-brand-primary"/> {acc.type}
                                       </span>
                                       <span className="text-[9px] font-mono text-gray-600 uppercase tracking-widest">
                                           {acc.date ? new Date(acc.date).toLocaleDateString() : ''}
                                       </span>
                                   </div>

                                   {twoFaSecret && (
                                       <div className="mb-5 bg-[#0a0a0a] border border-[#2a2a2a] p-5 rounded-xl flex flex-col items-center justify-center relative overflow-hidden">
                                           <div className="absolute bottom-0 left-0 w-full h-[2px] bg-[#1a1a1a]">
                                               <div className="bg-brand-primary h-full transition-all duration-1000 ease-linear shadow-[0_0_8px_currentColor]" style={{width: `${(timeLeft/30)*100}%`}}></div>
                                           </div>
                                           <p className="text-[9px] text-gray-500 font-bold mb-2 uppercase tracking-[0.3em]">Auth Code</p>
                                           <div className="text-3xl font-light text-white tracking-[0.2em] font-mono">{totpCode || '------'}</div>
                                       </div>
                                   )}

                                   <div className="w-full bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl mb-6 overflow-x-auto shadow-inner relative">
                                       <div className="absolute left-0 top-0 bottom-0 w-1 bg-brand-primary/20"></div>
                                       <pre className="font-mono text-[11px] text-gray-400 whitespace-pre-wrap break-words leading-relaxed pl-2">{String(acc.data || '')}</pre>
                                   </div>
                                   
                                   <div className="flex justify-between mt-auto items-center pt-4 border-t border-[#1a1a1a]">
                                       <button onClick={() => {
                                          const id = 'REP-' + Date.now();
                                          setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', id), { email: myPurchases[0].customer, subject: `Reported Account`, message: `I have an issue with this account.`, status: 'Open', date: new Date().toISOString() });
                                          triggerToast('Report sent to admin.');
                                       }} className="btn-animate text-[9px] font-mono text-gray-600 hover:text-red-400 uppercase tracking-widest transition-colors">Report Issue</button>
                                       <button onClick={() => {
                                          if (navigator.clipboard) navigator.clipboard.writeText(String(acc.data || '')).then(() => triggerToast("Account details copied!"));
                                          else { const t = document.createElement("textarea"); t.value = String(acc.data || ''); document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
                                       }} className="btn-animate bg-[#1a1a1a] hover:bg-[#2a2a2a] text-brand-primary border border-[#2a2a2a] px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all flex items-center gap-2">
                                           <Copy className="w-3 h-3"/> Copy
                                       </button>
                                   </div>
                               </div>
                           </div>
                       )
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // PROFILE MODULE
        // ==========================================
        function CustomerDashboardProfile({ user, balance, tier, userInfo, allOrders, deposits, purchases, tickets, db, appId, featureSettings, triggerToast, uiCard, uiInput, uiBtnPrimary, uiBtnSecondary, uiInnerPanel }) {
          const [profileSubTab, setProfileSubTab] = useState('overview');
          const [ticketSubject, setTicketSubject] = useState('');
          const [ticketMessage, setTicketMessage] = useState('');

          const claimDailyBonus = async () => {
            const today = new Date().toISOString().split('T')[0];
            if (userInfo?.lastBonusDate === today) { triggerToast('You already claimed your bonus today.'); return; }
            try {
              const token = await getAuthToken();
              const res = await fetch('https://voicestore-backend.onrender.com/api/claim-daily-bonus', {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ email: user.email })
              });
              const data = await res.json();
              triggerToast(data.message);
            } catch(err) { triggerToast('Failed to get bonus.'); }
          };

          const submitTicket = async (e) => {
            e.preventDefault(); if (!ticketSubject.trim() || !ticketMessage.trim()) return;
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', 'TCK-' + Date.now()), { email: user.email, subject: ticketSubject, message: ticketMessage, status: 'Open', date: new Date().toISOString() });
              setTicketSubject(''); setTicketMessage(''); triggerToast('Ticket sent successfully.');
            } catch(err) {}
          };

          const referralCode = `REF-${(user?.email || '').split('@')[0].toUpperCase()}`;
          
          const myDeposits = deposits.filter(d => d.email === user?.email);
          const myOrders = allOrders.filter(o => o.customer === user?.email);
          const myPurchases = purchases.filter(p => p.customer === user?.email);

          const unifiedHistory = [
              ...myDeposits.map(d => ({ id: d.id, type: 'Funds Added', amount: d.amount, date: d.date, status: d.status, method: d.method })),
              ...myOrders.map(o => ({ id: o.id, type: 'Bought Account', amount: o.total, date: o.date, status: o.status, method: 'Account Balance' })),
              ...myPurchases.filter(p => String(p.type).includes('Network') || String(p.type).includes('Protocol')).map(p => ({ id: p.id, type: p.type, amount: 0, date: p.date, status: 'Acquired', method: 'Account Balance' }))
          ].sort((a,b) => new Date(b.date) - new Date(a.date));

          return (
            <div className="animate-fade-in-up w-full">
              <div className="flex space-x-2 mb-8 p-1.5 bg-[#0a0a0a] rounded-xl border border-[#1a1a1a] shadow-inner max-w-fit mx-auto md:mx-0">
                  <button onClick={() => setProfileSubTab('overview')} className={`px-5 py-2.5 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all ${profileSubTab === 'overview' ? 'bg-[#121212] text-brand-primary border border-[#2a2a2a] shadow-sm scale-105' : 'text-gray-600 hover:text-gray-300'}`}>My Profile</button>
                  <button onClick={() => setProfileSubTab('history')} className={`px-5 py-2.5 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all ${profileSubTab === 'history' ? 'bg-[#121212] text-brand-primary border border-[#2a2a2a] shadow-sm scale-105' : 'text-gray-600 hover:text-gray-300'}`}>History</button>

                        {featureSettings?.referral && (

              {profileSubTab === 'support' && (

                          <div className={uiCard + " p-6 sm:p-8 h-fit border-t-[1px] border-t-brand-primary/30"}>

                            <p className="text-xs text-gray-500 font-light mb-8 mt-4 tracking-wide">Send a message directly to support.</p>
                            <form onSubmit={submitTicket} className="space-y-6 w-full">
                              <div>
                                <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Subject</label>

                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Message</label>
                                <textarea value={ticketMessage} onChange={e => setTicketMessage(e.target.value)} required placeholder="Write your message here..." rows="5" className={uiInput + " bg-[#0a0a0a] resize-none"} />

                             <div key={t.id} className="bg-[#0a0a0a] border border-[#1a1a1a] p-5 rounded-xl group hover:border-[#2a2a2a] transition-colors relative overflow-hidden animate-scale-up" style={{animationDelay: `${idx * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                               <div className="absolute top-0 left-0 w-1 h-full bg-[#2a2a2a] group-hover:bg-brand-primary/50 transition-colors"></div>
                               <div className="flex justify-between items-start mb-4 pl-2">
                                 <h4 className="font-bold text-gray-200 text-xs sm:text-sm uppercase tracking-wider break-words w-[70%]">{t.subject}</h4>
                                 <span className={`text-[8px] px-2 py-1 rounded border uppercase tracking-[0.2em] font-bold ${t.status === 'Open' ? 'bg-brand-primary/10 text-brand-primary border-brand-primary/20' : 'bg-gray-900 border-gray-800 text-gray-500'}`}>{t.status}</span>
                               </div>

                               <p className="text-[9px] text-gray-600 font-mono flex items-center gap-1.5 uppercase tracking-widest ml-2"><Clock className="w-3 h-3"/> {t.date ? new Date(t.date).toLocaleString() : ''}</p>
