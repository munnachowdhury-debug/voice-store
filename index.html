                        )
                    })}
                </div>
            </div>
          );
        }

        // ==========================================
        // ADMIN DASHBOARD
        // ==========================================
        function AdminDashboard({ inventory, orders, deposits, categories, usersDB, purchases, tickets, triggerToast, promoSettings, featureSettings, bankSettings, cryptoSettings, customPayments, smsSettings, activeChats, activeTab }) {
          const [uploadCategory, setUploadCategory] = useState('new');
          const [uploadText, setUploadText] = useState('');
          const [customerSearch, setCustomerSearch] = useState('');

          const [promoInput, setPromoInput] = useState('');
          const [discountInput, setDiscountInput] = useState(0);
          const [promoActive, setPromoActive] = useState(false);
          const [noticeInput, setNoticeInput] = useState('');
          const [nairaRateInput, setNairaRateInput] = useState(1500);
          
          const [flutterwaveKeyInput, setFlutterwaveKeyInput] = useState('');
          const [flutterwaveActiveInput, setFlutterwaveActiveInput] = useState(false);
          
          const [dailyRewardActive, setDailyRewardActive] = useState(false);
          const [referralActive, setReferralActive] = useState(false);

          const [smsMarkupInput, setSmsMarkupInput] = useState(1.00);
          const [smsActiveInput, setSmsActiveInput] = useState(true);
          
          const [cryptoMethodsList, setCryptoMethodsList] = useState([]);
          const [newCryptoInput, setNewCryptoInput] = useState({ name: '', network: '', address: '' });
          
          const [bankNameInput, setBankNameInput] = useState('Parallex');
          const [bankAccountNameInput, setBankAccountNameInput] = useState('Samuel Osita Emmanuel');
          const [bankAccountNumberInput, setBankAccountNumberInput] = useState('1120927346');

          const [editUserModal, setEditUserModal] = useState({ show: false, email: '', password: '', balance: 0, totalSpent: 0 });
          
          const [manageStockModal, setManageStockModal] = useState({ show: false, categoryId: null });
          const [newProductModal, setNewProductModal] = useState(false);
          const [newProduct, setNewProduct] = useState({ id: '', name: '', description: '', price: 5.00 });

          const [newCustomPayment, setNewCustomPayment] = useState({ name: '', details: '', instruction: '' });

          const [selectedChatUser, setSelectedChatUser] = useState(null);
          const [adminChatMessage, setAdminChatMessage] = useState('');
          const [adminChatMessages, setAdminChatMessages] = useState([]);
          const adminMessagesEndRef = useRef(null);

          const handleAddProduct = async (e) => {
              e.preventDefault();
              if (!newProduct.id || !newProduct.name) return;
              
              const safeNewProduct = {
                  id: newProduct.id.toLowerCase().replace(/[^a-z0-9]/g, '_'),
                  name: newProduct.name, description: newProduct.description, price: Number(newProduct.price), color: 'text-white'
              };
              const updatedCategories = [...categories, safeNewProduct];
              
              try {
                  await supabase.from('store_settings').upsert({ id: 'Products', data: { list: updatedCategories } });
                  triggerToast('New card added successfully.');
                  setNewProductModal(false);
                  setNewProduct({ id: '', name: '', description: '', price: 5.00 });
              } catch (err) { triggerToast('Failed to add card.'); }
          };

          const handleRemoveProduct = async (productId) => {
              if (!window.confirm("Are you sure you want to permanently remove this card?")) return;
              const updatedCategories = categories.filter(c => c.id !== productId);
              try {
                  await supabase.from('store_settings').upsert({ id: 'Products', data: { list: updatedCategories } });
                  triggerToast('Card removed.');
              } catch (err) { triggerToast('Failed to remove.'); }
          };

          const handleAddCustomPayment = async (e) => {
              e.preventDefault();
              if (!newCustomPayment.name || !newCustomPayment.details) return triggerToast("Fill all required fields.");
              const newItem = { id: Date.now(), name: newCustomPayment.name, details: newCustomPayment.details, instruction: newCustomPayment.instruction };
              const updatedList = [...(customPayments || []), newItem];
              try {
                  await supabase.from('store_settings').upsert({ id: 'CustomPayments', data: { list: updatedList } });
                  triggerToast('Payment Method Added.');
                  setNewCustomPayment({ name: '', details: '', instruction: '' });
              } catch (e) { triggerToast('Error adding method.'); }
          };

          const handleRemoveCustomPayment = async (id) => {
              const updatedList = (customPayments || []).filter(p => p.id !== id);
              try {
                  await supabase.from('store_settings').upsert({ id: 'CustomPayments', data: { list: updatedList } });
                  triggerToast('Payment Method Removed.');
              } catch (e) { triggerToast('Error removing method.'); }
          };

          const handleAddCrypto = async (e) => {
              if(e && e.preventDefault) e.preventDefault();
              if (!newCryptoInput.name || !newCryptoInput.address) return triggerToast("Fill required crypto fields.");
              
              const networkVal = newCryptoInput.network || ""; 
              const newItem = { id: Date.now(), name: newCryptoInput.name, network: networkVal, address: newCryptoInput.address };
              const updatedList = [...(cryptoMethodsList || []), newItem];
              
              try {
                  await supabase.from('store_settings').upsert({ id: 'CryptoMethods', data: { list: updatedList } });
                  triggerToast('Crypto Method Added.');
                  setNewCryptoInput({ name: '', network: '', address: '' }); 
              } catch (e) { triggerToast('Error adding crypto.'); }
          };

          const handleRemoveCrypto = async (id) => {
              const updatedList = (cryptoMethodsList || []).filter(p => p.id !== id);
              try {
                  await supabase.from('store_settings').upsert({ id: 'CryptoMethods', data: { list: updatedList } });
                  triggerToast('Crypto Method Removed.');
              } catch (e) { triggerToast('Error removing crypto.'); }
          };

          const handleDeleteAccount = async (categoryId, accountIndex) => {
            if (!window.confirm("Delete this account?")) return;
            try {
              const newInv = { ...inventory };
              newInv[categoryId].splice(accountIndex, 1);
              await supabase.from('store_inventory').update({ data: newInv }).eq('id', 'Stock');
              triggerToast('Account deleted.');
            } catch (err) { triggerToast('Failed to delete.'); }
          };

          useEffect(() => {
            if (promoSettings) { setPromoInput(promoSettings.code || ''); setDiscountInput(promoSettings.discount || 0); setPromoActive(promoSettings.isActive || false); }
            if (globalNotice !== undefined) setNoticeInput(globalNotice);
            if (featureSettings) { setDailyRewardActive(featureSettings.dailyReward || false); setReferralActive(featureSettings.referral || false); }
            if (bankSettings) { 
                setNairaRateInput(bankSettings.nairaRate || 1500); 
                setFlutterwaveKeyInput(bankSettings.flutterwaveKey || '');
                setFlutterwaveActiveInput(bankSettings.flutterwaveActive || false);
                setBankNameInput(bankSettings.bankName || 'Parallex');
                setBankAccountNameInput(bankSettings.accountName || 'Samuel Osita Emmanuel');
                setBankAccountNumberInput(bankSettings.accountNumber || '1120927346');
            }
            if (cryptoSettings) setCryptoMethodsList(cryptoSettings);
            if (smsSettings) { setSmsMarkupInput(smsSettings.markup !== undefined ? smsSettings.markup : 1.00); setSmsActiveInput(smsSettings.active ?? true); }
          }, [promoSettings, globalNotice, featureSettings, bankSettings, cryptoSettings, smsSettings]);

          useEffect(() => {
              if (!selectedChatUser) return;
              const fetchAdminChat = async () => {
                  const { data } = await supabase.from('store_chats').select('*').eq('user_email', selectedChatUser).order('timestamp', { ascending: true });
                  if (data) {
                      setAdminChatMessages(data.map(d => ({ id: d.id, ...d.data })));
                      await supabase.from('store_active_chats').update({ unreadByAdmin: false }).eq('id', selectedChatUser).catch(()=>{});
                      setTimeout(() => { adminMessagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, 100);
                  }
              };
              fetchAdminChat();
              const intId = setInterval(fetchAdminChat, 3000);
              return () => clearInterval(intId);
          }, [selectedChatUser]);

          const sendAdminMessage = async (e) => {
              e.preventDefault();
              if (!adminChatMessage.trim() || !selectedChatUser) return;
              const msgText = adminChatMessage;
              setAdminChatMessage(''); 
              
              try {
                  await supabase.from('store_chats').insert({ user_email: selectedChatUser, data: { text: msgText, sender: 'admin', email: 'Admin' } });
                  await supabase.from('store_active_chats').upsert({ id: selectedChatUser, data: { lastMessage: msgText, userEmail: selectedChatUser, unreadByAdmin: false }, last_message_time: new Date().toISOString() });
              } catch(err) {}
          };

          const startTicketChat = (userEmail) => { if (userEmail) setSelectedChatUser(userEmail); };

          const pendingDeposits = deposits.filter(d => d.status === 'Pending' || d.status === 'Verifying...' || d.status === 'Pending Review' || d.status === 'Awaiting Payment');
          const totalSales = orders.filter(o => o.status === 'Completed').reduce((sum, order) => sum + Number(order.total || 0), 0);
          const filteredUsers = Object.keys(usersDB).filter(email => email.toLowerCase().includes(customerSearch.toLowerCase()));

          const handleUploadAccounts = async (e) => {
            e.preventDefault(); if (!uploadText.trim()) return;
            const rawText = uploadText.trim(); let validAccounts = [];
            
            if (uploadCategory === 'textplus' || rawText.includes('Email\n') || rawText.includes('Email\r\n')) {
                validAccounts = rawText.split(/(?=^Email\s*\n)/gm).filter(b => b.trim().length > 5).map(b => b.trim());
            } else if (rawText.includes('💌 EMAIL:')) {
                validAccounts = rawText.split(/(?=💌 EMAIL:)/g).filter(b => b.trim().length > 5).map(b => b.trim());
            } else {
                validAccounts = rawText.split(/\n\s*\n/).map(a => a.trim()).filter(a => a.length > 5);
                if(validAccounts.length === 0) validAccounts = rawText.split(/\n/).map(a => a.trim()).filter(a => a.length > 5);
            }

            if (validAccounts.length === 0) { triggerToast("Format error."); return; }

            try {
              const newInv = { ...inventory };
              if (!newInv[uploadCategory]) newInv[uploadCategory] = [];
              newInv[uploadCategory] = [...newInv[uploadCategory], ...validAccounts];
              await supabase.from('store_inventory').upsert({ id: 'Stock', data: newInv });
              setUploadText(''); triggerToast(`Added ${validAccounts.length} accounts.`);
            } catch (err) { triggerToast("Upload failed."); }
          };

          const submitEditUser = async (e) => {
            e.preventDefault();
            try {
              const token = await getAuthToken();
              const res = await fetch('https://voicestore-backend.onrender.com/api/admin/update-user', {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ userEmail: editUserModal.email, newBalance: editUserModal.balance, newTotalSpent: editUserModal.totalSpent, newPassword: editUserModal.password })
              });
              if(res.ok) { triggerToast('User saved.'); setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 }); } 
              else { triggerToast('Update failed.'); }
            } catch (err) { triggerToast('Network error.'); }
          };

          const sendResetLinkToUser = async (userEmail) => {
              try { await supabase.auth.resetPasswordForEmail(userEmail); triggerToast(`Link sent to ${userEmail}`); } 
              catch (err) { triggerToast('Failed to send.'); }
          };

          const handleManualApprove = async (depId) => {
            const dep = deposits.find(d => d.id === depId);
            if(!dep) return;
            try {
              const { data: depDoc } = await supabase.from('store_deposits').select('data').eq('id', depId).single();
              if (depDoc) {
                  depDoc.data.status = 'Approved';
                  await supabase.from('store_deposits').update({ data: depDoc.data }).eq('id', depId);
              }
              const { data: uDoc } = await supabase.from('store_users').select('data').eq('id', dep.email).single();
              if (uDoc) {
                  uDoc.data.balance = Number(uDoc.data.balance || 0) + Number(dep.amount || 0);
                  await supabase.from('store_users').update({ data: uDoc.data }).eq('id', dep.email);
              }
              triggerToast("Approved.");
            } catch (err) { triggerToast("Failed."); }
          };

          const handleResolveTicket = async (ticketId) => {
            try { 
                const { data: tDoc } = await supabase.from('store_tickets').select('data').eq('id', ticketId).single();
                if(tDoc) {
                    tDoc.data.status = 'Resolved';
                    await supabase.from('store_tickets').update({ data: tDoc.data }).eq('id', ticketId);
                    triggerToast('Ticket closed.'); 
                }
            } 
            catch(err) { triggerToast('Failed to close.'); }
          };

          const handleSaveSettings = async (e) => {
            e.preventDefault();
            try {
              await supabase.from('store_settings').upsert([
                  { id: 'PromoCode', data: { code: String(promoInput).toUpperCase(), discount: parseFloat(discountInput), isActive: promoActive } },
                  { id: 'Notice', data: { text: noticeInput } },
                  { id: 'Features', data: { dailyReward: dailyRewardActive, referral: referralActive } },
                  { id: 'SMS', data: { markup: parseFloat(smsMarkupInput), active: smsActiveInput } },
                  { id: 'Bank', data: { bankName: bankNameInput, accountName: bankAccountNameInput, accountNumber: bankAccountNumberInput, nairaRate: parseFloat(nairaRateInput) || 1500, flutterwaveKey: flutterwaveKeyInput, flutterwaveActive: flutterwaveActiveInput } }
              ]);
              triggerToast("Settings saved.");
            } catch (error) { triggerToast("Error saving."); }
          };

          return (
            <>
              {editUserModal.show && createPortal(
                <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/90 animate-fade-in-up">
                  <div className="glass-effect w-full max-w-md p-8 rounded-3xl border border-white/20 bg-[#0f172a]">
                     <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                         <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white flex items-center gap-2"><Edit className="w-4 h-4 text-white"/> Edit User</h3>
                         <button onClick={() => setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 })} className="btn-animate p-2 bg-[#000] rounded-full text-gray-500 hover:text-white border border-white/10"><X className="w-3.5 h-3.5" /></button>
                     </div>
                     <p className="text-[10px] text-gray-400 font-mono mb-6 bg-[#000] border border-white/10 p-3 rounded-lg truncate shadow-inner tracking-widest allow-select">{editUserModal.email}</p>
                     
                     <form onSubmit={submitEditUser} className="space-y-5">
                        <div>
                           <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Password</label>
                           <input type="text" value={editUserModal.password} onChange={e => setEditUserModal({...editUserModal, password: e.target.value})} className="glass-input text-xs allow-select" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Balance ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.balance} onChange={e => setEditUserModal({...editUserModal, balance: e.target.value})} className="glass-input allow-select" />
                            </div>
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Total Spent ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.totalSpent} onChange={e => setEditUserModal({...editUserModal, totalSpent: e.target.value})} className="glass-input allow-select" />
                            </div>
                        </div>
                        <div className="pt-6 mt-4 border-t border-white/10">
                          <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs">Save Changes</button>
                        </div>
                     </form>
                  </div>
                </div>, document.body
              )}

              {newProductModal && createPortal(
                  <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/90 animate-fade-in-up">
                    <div className="glass-effect w-full max-w-md p-8 rounded-3xl border border-white/20 bg-[#0f172a]">
                       <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                           <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white flex items-center gap-2"><Plus className="w-4 h-4"/> Create New Card</h3>
                           <button onClick={() => setNewProductModal(false)} className="btn-animate p-2 bg-[#000] rounded-full text-gray-500 hover:text-white border border-white/10"><X className="w-3.5 h-3.5" /></button>
                       </div>
                       
                       <form onSubmit={handleAddProduct} className="space-y-4">
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Card ID (e.g. facebook_acc)</label>
                             <input type="text" required value={newProduct.id} onChange={e => setNewProduct({...newProduct, id: e.target.value})} className="glass-input text-xs allow-select" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Display Name</label>
                             <input type="text" required value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="glass-input text-xs allow-select" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Description</label>
                             <input type="text" required value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} className="glass-input text-xs allow-select" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Price ($)</label>
                             <input type="number" step="0.01" required value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className="glass-input text-xs font-mono allow-select" />
                          </div>
                          <div className="pt-4 mt-2 border-t border-white/10">
                            <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs">Create Card</button>
                          </div>
                       </form>
                    </div>
                  </div>, document.body
              )}

              <div className="flex-grow w-full min-w-0 mt-2 sm:mt-4 animate-matrix-in">
                {activeTab === 'inventory' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8 w-full">
                    <div className="glass-effect p-6 sm:p-8 rounded-3xl h-fit lg:col-span-1 border border-white/10">
                      <h2 className="text-sm font-bold uppercase tracking-[0.2em] mb-6 text-white border-b border-white/10 pb-4">Add Stock</h2>
                      <form onSubmit={handleUploadAccounts} className="flex flex-col space-y-5">
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Select Type</label>
                          <select value={uploadCategory} onChange={(e) => setUploadCategory(e.target.value)} className="glass-input allow-select">
                            {categories.map(cat => <option key={cat.id} value={cat.id}>{cat.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Accounts Data</label>
                          <textarea value={uploadText} onChange={(e) => setUploadText(e.target.value)} placeholder="Paste accounts here..." className="glass-input min-h-[200px] resize-none font-mono text-[10px] allow-select" required />
                        </div>
                        <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs">Upload</button>
                      </form>
                    </div>

                    <div className="lg:col-span-2 space-y-6 sm:space-y-8 w-full">
                      <div className="glass-effect rounded-3xl border border-white/10 overflow-hidden">
                        <div className="p-5 sm:p-6 border-b border-white/10 bg-[rgba(0,0,0,0.5)]"><h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Available Stock</h2></div>
                        <div className="w-full overflow-x-auto bg-transparent">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/5 text-[10px] uppercase tracking-[0.2em]">
                              <tr><th className="p-4 sm:p-5">Name</th><th className="p-4 sm:p-5 text-center">Amount</th><th className="p-4 sm:p-5 text-right">Action</th></tr>
                            </thead>
                            <tbody className="divide-y divide-white/5">
                              {categories.map((cat, idx) => (
                                <tr key={cat.id} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                  <td className="p-4 sm:p-5">
                                    <p className="text-white font-bold text-xs uppercase tracking-wide">{cat.name}</p>
                                    <p className="text-[10px] font-mono text-gray-400 mt-1">${Number(cat.price).toFixed(2)}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 text-center font-mono font-bold text-xl text-white">{inventory[cat.id] ? inventory[cat.id].length : 0}</td>
                                  <td className="p-4 sm:p-5 text-right">
                                      <button onClick={() => setManageStockModal({ show: true, categoryId: cat.id })} className="btn-animate bg-white/10 hover:bg-white text-white hover:text-black border border-white/20 px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold ml-auto">View</button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {manageStockModal.show && createPortal(
                  <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/90 animate-bouncy-pop">
                    <div className="glass-effect w-full max-w-3xl p-6 sm:p-8 flex flex-col max-h-[85vh] rounded-3xl border border-white/20 bg-[#0f172a]">
                       <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10 shrink-0">
                         <h3 className="text-sm font-bold tracking-[0.2em] uppercase text-white flex items-center gap-2"><Package className="w-4 h-4"/> View Stock</h3>
                         <button onClick={() => setManageStockModal({ show: false, categoryId: null })} className="btn-animate p-2 bg-[#000] rounded-full text-gray-500 hover:text-white border border-white/10"><X className="w-4 h-4" /></button>
                       </div>
                       <div className="overflow-y-auto flex-grow pr-2 custom-scrollbar space-y-3 w-full">
                          {(!inventory[manageStockModal.categoryId] || inventory[manageStockModal.categoryId].length === 0) ? (
                              <p className="text-center text-gray-600 font-mono text-xs uppercase tracking-widest py-20">Stock is empty.</p>
                          ) : (
                              inventory[manageStockModal.categoryId].map((acc, index) => (
                                  <div key={index} className="flex justify-between items-center w-full p-4 bg-[rgba(0,0,0,0.5)] border border-white/10 rounded-xl hover:border-white/30 transition-colors">
                                      <pre className="text-[10px] text-gray-300 font-mono leading-relaxed truncate max-w-[80%] allow-select">{acc}</pre>
                                      <button onClick={() => handleDeleteAccount(manageStockModal.categoryId, index)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/50 rounded-lg shrink-0 transition-colors">
                                          <Trash2 className="w-4 h-4" />
                                      </button>
                                  </div>
                              ))
                          )}
                       </div>
                    </div>
                  </div>, document.body
                )}

                {activeTab === 'users' && (
                  <div className="glass-effect rounded-3xl w-full border border-white/10 overflow-hidden">
                    <div className="p-5 sm:p-6 border-b border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-[rgba(0,0,0,0.5)]">
                      <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">All Users</h2>
                      <div className="flex items-center gap-3 w-full sm:w-auto">
                        <div className="relative flex-grow sm:flex-grow-0 sm:w-64">
                           <Search className="w-4 h-4 text-gray-500 absolute left-3 top-3" />
                           <input type="text" placeholder="Search email..." value={customerSearch} onChange={(e)=>setCustomerSearch(e.target.value)} className="glass-input allow-select !py-2 !pl-9 bg-[#000] border-white/10 text-xs font-mono" />
                        </div>
                        <span className="text-[10px] font-mono font-bold text-white bg-white/10 border border-white/20 px-3 py-2 rounded-lg uppercase tracking-widest">{filteredUsers.length} Users</span>
                      </div>
                    </div>
                    <div className="overflow-x-auto w-full bg-transparent">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/10 text-[10px] uppercase tracking-[0.2em]">
                          <tr><th className="p-4 sm:p-5">User</th><th className="p-4 sm:p-5">Spent</th><th className="p-4 sm:p-5">Balance</th><th className="p-4 sm:p-5 text-right">Action</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {filteredUsers.map((email, idx) => (
                            <tr key={email} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.03}s`}}>
                              <td className="p-4 sm:p-5">
                                  <p className="text-white font-medium text-xs tracking-wide allow-select">{String(email)}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest allow-select">Pass: {usersDB[email].password || 'Hidden'}</p>
                              </td>
                              <td className="p-4 sm:p-5 font-mono text-gray-400">${Number(usersDB[email].totalSpent || 0).toFixed(2)}</td>
                              <td className="p-4 sm:p-5 font-mono font-bold text-white">${Number(usersDB[email].balance || 0).toFixed(2)}</td>
                              <td className="p-4 sm:p-5 text-right">
                                <button onClick={() => setEditUserModal({ show: true, email: email, password: usersDB[email].password || '', balance: usersDB[email].balance || 0, totalSpent: usersDB[email].totalSpent || 0 })} className="btn-animate bg-white/10 hover:bg-white text-white hover:text-black border border-white/20 px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all ml-auto flex items-center gap-2"><Edit className="w-3 h-3"/> Edit</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      {filteredUsers.length === 0 && <p className="text-center py-16 text-gray-600 font-mono text-xs uppercase tracking-widest">No users found.</p>}
                    </div>
                  </div>
                )}

                {activeTab === 'support' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
                    {/* Left Column: Tickets */}
                    <div className="glass-effect rounded-3xl flex flex-col w-full h-[600px] border border-white/10 overflow-hidden">
                      <div className="p-5 sm:p-6 border-b border-white/10 flex items-center justify-between bg-[rgba(0,0,0,0.5)]">
                         <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Support Tickets</h2>
                      </div>
                      <div className="overflow-y-auto w-full bg-transparent flex-grow p-4 space-y-4 custom-scrollbar">
                        {(tickets||[]).map((t, idx) => (
                          <div key={t.id} className="bg-[rgba(0,0,0,0.5)] border border-white/10 p-4 rounded-2xl animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                            <div className="flex justify-between items-start mb-3">
                              <div>
                                <p className="text-gray-300 font-medium text-xs mb-1 allow-select">{String(t.email || 'Unknown')}</p>
                                <span className="font-bold text-[10px] text-white uppercase tracking-wide">{t.subject}</span>
                              </div>
                              <div className="flex flex-col items-end gap-2">
                                  <span className={`text-[8px] px-2 py-1 rounded border uppercase tracking-[0.2em] font-bold ${t.status === 'Open' ? 'bg-red-900/20 text-red-400 border-red-900/50' : 'bg-green-900/20 text-green-400 border-green-900/50'}`}>{t.status}</span>
                                  {t.status === 'Open' && (
                                    <div className="flex gap-2 mt-1">
                                        <button onClick={() => startTicketChat(t.email)} className="btn-animate text-[9px] text-white hover:text-gray-300 transition-colors underline flex items-center gap-1"><MessageCircle className="w-2.5 h-2.5"/> Reply</button>
                                        <button onClick={() => handleResolveTicket(t.id)} className="btn-animate text-[9px] text-gray-500 hover:text-white transition-colors underline ml-2">Resolve</button>
                                    </div>
                                  )}
                              </div>
                            </div>
                            <div className="bg-[#000] p-3 rounded-lg mb-3 shadow-inner ml-3">
                              <p className="text-xs text-gray-300 font-light leading-relaxed break-words allow-select">{t.message}</p>
                            </div>
                            <p className="text-[9px] text-gray-500 font-mono flex items-center gap-1.5 uppercase tracking-widest ml-3"><Clock className="w-3 h-3"/> {safeFormatDate(t.date)}</p>
                          </div>
                        ))}
                        {tickets.length === 0 && <p className="text-center text-gray-600 py-10 text-xs font-mono uppercase tracking-widest">No tickets.</p>}
                      </div>
                    </div>

                    {/* Right Column: Live Chats Dashboard */}
                    <div id="admin-chat-section" className="glass-effect rounded-3xl flex flex-col w-full h-[600px] border border-white/10 overflow-hidden">
                      <div className="p-5 sm:p-6 border-b border-white/10 flex items-center justify-between bg-[rgba(0,0,0,0.5)]">
                         <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white flex items-center gap-2"><MessageSquare className="w-4 h-4"/> Live Chats</h2>
                         {activeChats.filter(c => c.unreadByAdmin).length > 0 && <span className="bg-white text-black px-2 py-1 rounded text-[9px] font-bold animate-pulse uppercase tracking-widest">{activeChats.filter(c => c.unreadByAdmin).length} New</span>}
                      </div>
                      
                      <div className="flex flex-grow overflow-hidden bg-transparent">
                          {/* User List Sidebar */}
                          <div className="w-1/3 border-r border-white/10 overflow-y-auto custom-scrollbar bg-[rgba(0,0,0,0.5)]">
                              {activeChats.length === 0 ? <p className="text-[10px] text-center p-4 text-gray-500 font-mono uppercase tracking-widest">No chats</p> : 
                                  activeChats.map((chat, idx) => (
                                      <div key={chat.id} onClick={() => setSelectedChatUser(chat.userEmail)} className={`p-4 cursor-pointer border-b border-white/5 transition-all hover:bg-[rgba(255,255,255,0.05)] animate-fade-in-up ${selectedChatUser === chat.userEmail ? 'bg-[rgba(255,255,255,0.1)] border-l-2 border-l-white' : ''}`} style={{animationDelay: `${idx * 0.05}s`}}>
                                          <p className="text-[10px] font-bold text-white truncate w-full mb-1 flex items-center gap-1.5">
                                              {chat.unreadByAdmin && <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>}
                                              <span className="allow-select">{String(chat.userEmail || chat.id || 'User').split('@')[0]}</span>
                                          </p>
                                          <p className="text-[9px] text-gray-400 truncate w-full font-light">{chat.lastMessage}</p>
                                      </div>
                                  ))
                              }
                          </div>
                          
                          {/* Chat Area */}
                          <div className="w-2/3 flex flex-col relative bg-[rgba(0,0,0,0.2)]">
                              {selectedChatUser ? (
                                  <>
                                      <div className="bg-[#0f172a] p-3 text-[10px] font-bold text-white border-b border-white/10 flex justify-between items-center">
                                          <span className="truncate tracking-wider allow-select">{selectedChatUser}</span>
                                          <button onClick={() => setSelectedChatUser(null)} className="btn-animate text-gray-500 hover:text-white"><X className="w-3 h-3"/></button>
                                      </div>
                                      <div className="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                          {adminChatMessages.map(msg => (
                                              <div key={msg.id} className={`flex flex-col animate-fade-in-up ${msg.sender === 'admin' ? 'items-end' : 'items-start'}`}>
                                                  <div className={`px-4 py-2.5 rounded-2xl max-w-[90%] text-[11px] font-medium leading-relaxed shadow-lg allow-select ${msg.sender === 'admin' ? 'bg-white text-black rounded-tr-sm' : 'bg-[rgba(0,0,0,0.6)] text-gray-200 border border-white/10 rounded-tl-sm'}`}>
                                                      {msg.text}
                                                  </div>
                                              </div>
                                          ))}
                                          <div ref={adminMessagesEndRef} />
                                      </div>
                                      <form onSubmit={sendAdminMessage} className="bg-[#0f172a] border-t border-white/10 p-3 flex gap-2 items-center">
                                          <input type="text" value={adminChatMessage} onChange={e => setAdminChatMessage(e.target.value)} placeholder="Type reply..." className="glass-input allow-select !py-3"/>
                                          <button type="submit" disabled={!adminChatMessage.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50"><Send className="w-4 h-4"/></button>
                                      </form>
                                  </>
                              ) : (
                                  <div className="flex-grow flex flex-col items-center justify-center text-gray-500 opacity-30 animate-pulse">
                                      <MessageSquare className="w-12 h-12 mb-3 text-white" strokeWidth={1.5}/>
                                      <p className="text-[10px] font-mono uppercase tracking-widest text-white">Select a chat</p>
                                  </div>
                              )}
                          </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'analytics' && (
                  <div className="w-full space-y-8">
                    <div>
                        <h2 className="text-xl font-bold tracking-[0.1em] uppercase mb-6 text-white pl-2 animate-fade-in-up">System Metrics</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 w-full">
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10 animate-fade-in-up" style={{animationDelay: '0.1s'}}>
                            <p className="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Revenue</p>
                            <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">${Number(totalSales || 0).toFixed(2)}</h3>
                          </div>
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10 animate-fade-in-up" style={{animationDelay: '0.2s'}}>
                            <p className="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Users</p>
                            <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{Object.keys(usersDB).length}</h3>
                          </div>
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10 animate-fade-in-up" style={{animationDelay: '0.3s'}}>
                            <p className="text-gray-400 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Orders</p>
                            <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{orders.length}</h3>
                          </div>
                        </div>
                    </div>

                    {/* 🟢 NEW SECTION: ALL CUSTOMER PURCHASES DETAILS 🟢 */}
                    <div className="glass-effect rounded-3xl w-full border border-white/10 overflow-hidden animate-fade-in-up" style={{animationDelay: '0.4s'}}>
                        <div className="p-5 sm:p-6 border-b border-white/10 bg-[rgba(0,0,0,0.5)]">
                          <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">All Customer Purchases</h2>
                          <p className="text-[10px] text-gray-400 font-mono mt-1 uppercase tracking-widest">Accounts, SMS, Phone Numbers & Details</p>
                        </div>
                        <div className="w-full overflow-x-auto bg-transparent">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/5 text-[10px] uppercase tracking-[0.2em]">
                              <tr>
                                  <th className="p-4 sm:p-5">Date</th>
                                  <th className="p-4 sm:p-5">Customer Email</th>
                                  <th className="p-4 sm:p-5">Purchase Type</th>
                                  <th className="p-4 sm:p-5">Item Details (Credentials / Phone)</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-white/5">
                              {purchases.map((p, idx) => (
                                <tr key={p.id || idx} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${(idx % 10) * 0.05}s`}}>
                                  <td className="p-4 sm:p-5 align-top">
                                      <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest mt-1">{safeFormatDate(p.date)}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 align-top">
                                      <p className="text-xs font-bold text-white tracking-wide mt-1 allow-select">{p.customer}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 align-top">
                                      <span className="bg-brand-primary/10 text-brand-primary border border-brand-primary/20 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest inline-block mt-0.5">{p.type}</span>
                                  </td>
                                  <td className="p-4 sm:p-5">
                                      <div className="bg-[rgba(0,0,0,0.4)] border border-white/5 p-3 rounded-xl min-w-[250px] max-w-sm max-h-32 overflow-y-auto custom-scrollbar shadow-inner">
                                          <pre className="text-[11px] font-mono text-white font-medium whitespace-pre-wrap break-words allow-select">{p.data}</pre>
                                      </div>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          {(!purchases || purchases.length === 0) && <p className="text-center py-16 text-gray-600 font-mono text-[10px] uppercase tracking-widest">No purchases yet.</p>}
                        </div>
                    </div>
                  </div>
                )}

                {activeTab === 'deposits' && (
                  <div className="glass-effect rounded-3xl w-full border border-white/10 overflow-hidden">
                    <div className="p-5 sm:p-6 border-b border-white/10 flex items-center justify-between bg-[rgba(0,0,0,0.5)]">
                      <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Deposits</h2>
                      {pendingDeposits.length > 0 && <span className="bg-white text-black px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold animate-pulse">{pendingDeposits.length} Pending</span>}
                    </div>
                    <div className="overflow-x-auto w-full bg-transparent">
                      <table className="w-full text-left whitespace-nowrap text-sm">
                        <thead className="bg-[#000] text-gray-500 font-bold border-b border-white/5 text-[10px] uppercase tracking-[0.2em]">
                          <tr><th className="p-4 sm:p-5">TxID / Date</th><th className="p-4 sm:p-5">User / Method</th><th className="p-4 sm:p-5">Amount</th><th className="p-4 sm:p-5 text-right">Status</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {deposits.map((dep, idx) => {
                            const isPending = String(dep.status || '').includes('Pending') || String(dep.status || '').includes('Awaiting');
                            return (
                              <tr key={dep.id} className="hover:bg-[rgba(255,255,255,0.05)] transition-colors animate-fade-in-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                <td className="p-4 sm:p-5">
                                  <p className="font-mono text-white font-bold text-[10px] truncate max-w-[120px] allow-select">{String(dep.id || '')}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest">{safeFormatDate(dep.date)}</p>
                                </td>
                                <td className="p-4 sm:p-5">
                                  <p className="text-gray-200 font-medium text-xs allow-select">{String(dep.email || '')}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest">{String(dep.method || '')}</p>
                                </td>
                                <td className="p-4 sm:p-5 font-mono font-bold text-white">${Number(dep.amount || 0).toFixed(2)}</td>
                                <td className="p-4 sm:p-5 text-right">
                                  <div className="flex flex-col items-end gap-2">
                                    <span className={`text-[9px] uppercase tracking-[0.2em] font-bold ${dep.status === 'Approved' ? 'text-green-500' : isPending ? 'text-white' : 'text-red-500'}`}>{String(dep.status || '')}</span>
                                    {isPending && (
                                        <button onClick={() => handleManualApprove(dep.id)} className="btn-animate bg-white text-black border border-white px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold transition-all mt-1">
                                            Approve
                                        </button>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            )
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
                    <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 animate-fade-in-up">
                      <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white mb-6 border-b border-white/10 pb-4">Payment & Gateway Settings</h2>
                      
                      <form onSubmit={handleSaveSettings} className="space-y-8">
                        <div className="space-y-5">
                           <div className="flex justify-between items-center">
                               <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center gap-2"><DollarSign className="w-3.5 h-3.5"/> Crypto Options</h3>
                           </div>
                           
                           <div className="bg-[#0f172a] border border-white/5 rounded-2xl p-5 shadow-inner">
                               <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-3">Add New Crypto Network</p>
                               <div className="grid grid-cols-2 gap-3 mb-3">
                                   <input type="text" placeholder="Name (e.g. USDT)" value={newCryptoInput.name} onChange={e=>setNewCryptoInput({...newCryptoInput, name: e.target.value})} className="glass-input text-xs allow-select" />
                                   <input type="text" placeholder="Network (Optional)" value={newCryptoInput.network} onChange={e=>setNewCryptoInput({...newCryptoInput, network: e.target.value})} className="glass-input text-xs allow-select" />
                               </div>
                               <input type="text" placeholder="Wallet Address" value={newCryptoInput.address} onChange={e=>setNewCryptoInput({...newCryptoInput, address: e.target.value})} className="glass-input text-xs font-mono mb-3 allow-select" />
                               <button onClick={handleAddCrypto} type="button" className="btn-animate w-full bg-white/10 hover:bg-brand-primary text-white font-bold py-2.5 rounded-xl text-[10px] uppercase tracking-widest">Add Crypto</button>
                           </div>
                           
                           {(!cryptoSettings || cryptoSettings.length === 0) ? (
                               <p className="text-xs text-gray-500 font-mono">No crypto methods added.</p>
                           ) : (
                               cryptoSettings.map((c, i) => (
                                   <div key={i} className="bg-[rgba(0,0,0,0.5)] border border-white/5 p-3 rounded-xl flex justify-between items-center animate-fade-in-up" style={{animationDelay: `${i * 0.05}s`}}>
                                       <div className="max-w-[80%]">
                                           <p className="text-[10px] font-bold text-white uppercase">{c.name} <span className="text-[8px] text-brand-primary">({c.network || 'ANY'})</span></p>
                                           <p className="text-[9px] text-gray-400 font-mono mt-1 break-all allow-select">{c.address}</p>
                                       </div>
                                       <button type="button" onClick={() => handleRemoveCrypto(c.id)} className="btn-animate p-2 bg-red-900/20 text-red-500 hover:bg-red-900/50 rounded-lg"><Trash2 className="w-3.5 h-3.5"/></button>
                                   </div>
                               ))
                           )}
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center gap-2"><Building className="w-3.5 h-3.5"/> Local Bank Details</h3>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Bank Name</label>
                             <input type="text" value={bankNameInput} onChange={(e) => setBankNameInput(e.target.value)} required className={`${uiInput} allow-select`} />
                           </div>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Name</label>
                             <input type="text" value={bankAccountNameInput} onChange={(e) => setBankAccountNameInput(e.target.value)} required className={`${uiInput} allow-select`} />
                           </div>
                           <div className="grid grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Account Number</label>
                                 <input type="text" value={bankAccountNumberInput} onChange={(e) => setBankAccountNumberInput(e.target.value)} required className={`${uiInput} allow-select font-mono`} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">1 USD to NGN Rate</label>
                                 <input type="number" step="0.01" value={nairaRateInput} onChange={(e) => setNairaRateInput(e.target.value)} required className={`${uiInput} allow-select`} />
                               </div>
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Flutterwave (Card Payment)</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={flutterwaveActiveInput} onChange={(e) => setFlutterwaveActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Flutterwave Gateway</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Flutterwave Public Key</label>
                             <input type="text" value={flutterwaveKeyInput} onChange={(e) => setFlutterwaveKeyInput(e.target.value)} placeholder="FLWPUBK_TEST-..." className={`${uiInput} allow-select font-mono`} />
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">SMS Settings</h3>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Added Profit per SMS ($)</label>
                             <input type="number" step="0.01" value={smsMarkupInput} onChange={(e) => setSmsMarkupInput(e.target.value)} placeholder="1.00" className={`${uiInput} allow-select`} />
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl transition-colors hover:border-white/20">
                             <input type="checkbox" checked={smsActiveInput} onChange={(e) => setSmsActiveInput(e.target.checked)} className="w-4 h-4 rounded text-brand-primary focus:ring-brand-primary bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable SMS Service Module</span>
                           </label>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Promotions & Features</h3>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Promo Code</label>
                                 <input type="text" value={promoInput} onChange={(e) => setPromoInput(e.target.value)} placeholder="DISCOUNT20" className={`${uiInput} allow-select uppercase`} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Discount (%)</label>
                                 <input type="number" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="10" className={`${uiInput} allow-select`} />
                               </div>
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={promoActive} onChange={(e) => setPromoActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Promo Code</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={dailyRewardActive} onChange={(e) => setDailyRewardActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Daily Reward</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl mb-4 transition-colors hover:border-white/20">
                             <input type="checkbox" checked={referralActive} onChange={(e) => setReferralActive(e.target.checked)} className="w-4 h-4 rounded text-black focus:ring-white bg-[#000]" />
                             <span className="text-xs font-bold text-white uppercase tracking-wider">Enable Referral System</span>
                           </label>
                        </div>
                        
                        <div className="space-y-5 pt-4 border-t border-white/10">
                           <h3 className="text-[10px] font-bold text-white uppercase tracking-[0.3em]">Global Notice</h3>
                           <div>
                             <textarea value={noticeInput} onChange={(e) => setNoticeInput(e.target.value)} placeholder="Write a notice for all users..." rows="3" className={`${uiInput} allow-select resize-none`} />
                           </div>
                        </div>

                        <div className="pt-6 border-t border-white/10"><button type="submit" className={uiBtnPrimary}>Save All Settings</button></div>
                      </form>
                    </div>

                    <div className="space-y-6 sm:space-y-8 w-full">
                        <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 h-fit animate-fade-in-up" style={{animationDelay: '0.1s'}}>
                          <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                             <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Custom Payment Methods</h2>
                          </div>
                          
                          <form onSubmit={handleAddCustomPayment} className="space-y-4 mb-8 bg-[rgba(0,0,0,0.5)] p-5 rounded-2xl border border-white/5 shadow-inner">
                              <p className="text-[9px] font-bold text-brand-primary uppercase tracking-widest mb-2">Add New Method (e.g. bKash/Nagad)</p>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Method Name</label>
                                  <input type="text" required value={newCustomPayment.name} onChange={e => setNewCustomPayment({...newCustomPayment, name: e.target.value})} placeholder="bKash Personal" className="glass-input text-xs allow-select" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Wallet Number / Details</label>
                                  <input type="text" required value={newCustomPayment.details} onChange={e => setNewCustomPayment({...newCustomPayment, details: e.target.value})} placeholder="017XXXXXXXX" className="glass-input text-xs font-mono allow-select" />
                              </div>
                              <div>
                                  <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Instructions for User</label>
                                  <input type="text" value={newCustomPayment.instruction} onChange={e => setNewCustomPayment({...newCustomPayment, instruction: e.target.value})} placeholder="Send money and enter TRX ID below." className="glass-input text-xs allow-select" />
                              </div>
                              <button type="submit" className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl shadow-md text-[10px] uppercase tracking-widest mt-2 flex items-center justify-center gap-2"><Plus className="w-3 h-3"/> Add Method</button>
                          </form>

                          <div className="space-y-3">
                              {(!customPayments || customPayments.length === 0) ? (
                                  <p className="text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest py-4">No custom methods added.</p>
                              ) : (
                                  customPayments.map((p, idx) => (
                                      <div key={p.id || idx} className="bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-xl flex justify-between items-center animate-fade-in-up">
                                          <div>
                                              <p className="text-[11px] font-bold text-white uppercase tracking-wider">{p.name}</p>
                                              <p className="text-[9px] font-mono text-gray-400 mt-1 allow-select">{p.details}</p>
                                          </div>
                                          <button onClick={() => handleRemoveCustomPayment(p.id)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/30 rounded-lg transition-colors">
                                              <Trash2 className="w-3.5 h-3.5"/>
                                          </button>
                                      </div>
                                  ))
                              )}
                          </div>
                        </div>

                        <div className="glass-effect rounded-3xl p-6 sm:p-8 w-full border border-white/10 h-fit animate-fade-in-up" style={{animationDelay: '0.2s'}}>
                          <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                             <h2 className="text-sm font-bold tracking-[0.2em] uppercase text-white">Manage Accounts Cards</h2>
                             <button onClick={() => setNewProductModal(true)} className="btn-animate bg-white text-black px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold flex items-center gap-1"><Plus className="w-3 h-3"/> New</button>
                          </div>
                          
                          <div className="space-y-4">
                              {categories.map((cat, idx) => (
                                  <div key={idx} className="bg-[rgba(0,0,0,0.5)] border border-white/5 p-4 rounded-2xl flex justify-between items-center animate-fade-in-up" style={{animationDelay: `${idx * 0.1}s`}}>
                                      <div>
                                          <p className="text-xs font-bold text-white uppercase tracking-wider">{cat.name}</p>
                                          <p className="text-[10px] font-mono text-gray-400 mt-1">${Number(cat.price).toFixed(2)}</p>
                                      </div>
                                      <button onClick={() => handleRemoveProduct(cat.id)} className="btn-animate p-2.5 bg-red-900/20 text-red-500 hover:bg-red-900/40 border border-red-900/30 rounded-lg transition-colors">
                                          <Trash2 className="w-4 h-4"/>
                                      </button>
                                  </div>
                              ))}
                          </div>
                        </div>
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
