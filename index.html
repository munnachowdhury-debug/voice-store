            }

            }
            render() {

                        <div className="w-full flex flex-col items-center justify-center p-10 text-center glass-effect rounded-3xl min-h-[400px] animate-pop-in">

                }

        const VaultItem = ({ acc, idx, db, appId, triggerToast }) => {
            const [totpCode, setTotpCode] = useState('');
            const [timeLeft, setTimeLeft] = useState(30);
            const [twoFaSecret, setTwoFaSecret] = useState(null);

            useEffect(() => {
                try {
                    const rawData = String(acc?.data || '');
                    const match = rawData.match(/🔐 2FA INFO:\s*\n?([a-zA-Z0-9\s]+)/i);
                    if (match && match[1]) {
                        setTwoFaSecret(match[1].replace(/\s+/g, '').toUpperCase());
                    }
                } catch(e) {}
            }, [acc]);

            useEffect(() => {
                if (!twoFaSecret) return;
                const updateTotp = () => {
                    if (typeof window.OTPAuth !== 'undefined') {
                        try {
                            let totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(twoFaSecret) });
                            setTotpCode(totp.generate());
                            setTimeLeft(30 - (Math.floor(Date.now() / 1000) % 30));
                        } catch(e) {}
                    }
                };
                updateTotp();
                const interval = setInterval(updateTotp, 1000);
                return () => clearInterval(interval);
            }, [twoFaSecret]);

                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits'), (snap) => { 
                    const dep = []; snap.forEach((d) => { dep.push({ id: d.id, ...d.data() }); }); 
                    setDeposits(dep.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Purchases'), (snap) => { 
                    const p = []; snap.forEach((d) => { p.push({ id: d.id, ...d.data() }); }); 
                    setPurchases(p.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets'), (snap) => { 
                    const t = []; snap.forEach((d) => { t.push({ id: d.id, ...d.data() }); }); 
                    setTickets(t.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));

            } else {
                unsubs.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', user.email), (docSnap) => { if (docSnap.exists()) setUsersDB(prev => ({...prev, [user.email]: docSnap.data()})); }, errLog));
                
                // Customer gets ONLY their own data (to match secure Firebase rules)
                unsubs.push(onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Orders'), where('customer', '==', user.email)), (snap) => { 
                    const o = []; snap.forEach((d) => { o.push({ id: d.id, ...d.data() }); }); 
                    setAllOrders(o.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
                unsubs.push(onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits'), where('email', '==', user.email)), (snap) => { 
                    const dep = []; snap.forEach((d) => { dep.push({ id: d.id, ...d.data() }); }); 
                    setDeposits(dep.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
                unsubs.push(onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Purchases'), where('customer', '==', user.email)), (snap) => { 
                    const p = []; snap.forEach((d) => { p.push({ id: d.id, ...d.data() }); }); 
                    setPurchases(p.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
                unsubs.push(onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets'), where('email', '==', user.email)), (snap) => { 
                    const t = []; snap.forEach((d) => { t.push({ id: d.id, ...d.data() }); }); 
                    setTickets(t.sort((a,b) => { return new Date(b.date).getTime() - new Date(a.date).getTime(); })); 
                }, errLog));
            }

            return () => unsubs.forEach(unsub => { if(typeof unsub === 'function') unsub(); });
          }, [user]); // 🟢 FIX 1: END 🟢

          // 🟢 FIX 1: Moved polling to a separate useEffect 🟢
          useEffect(() => {
              if (!user || user.role !== 'customer') return;
              const poll = setInterval(() => {
                  const pendingInvoices = (deposits || []).filter(d => d && d.email === user.email && (d.status === 'Awaiting Payment' || d.status === 'Verifying...') && String(d.method).includes('(Auto)'));
                  if (pendingInvoices.length > 0) {
                      getAuthToken().then(token => {
                          pendingInvoices.forEach(inv => {
                              fetch('https://voicestore-backend.onrender.com/api/verify-deposit', {
                                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                  body: JSON.stringify({ invoiceId: inv.id, amount: inv.amount, method: inv.method, cryptoAmount: inv.cryptoAmount })
                              }).then(r => r.json()).then(result => {
                                  if (result.success) {
                                      triggerToast(`Payment Verified! $${inv.amount} added.`);
                                      addNotification('Deposit Successful', `$${inv.amount} added to balance.`);
                                  }
                              }).catch(e => {});
                          });
                      });
                  }
              }, 8000);
              return () => clearInterval(poll);
          }, [user, deposits]);

          const handleAuthSubmit = async (e) => {
            e.preventDefault(); setAuthError(''); setAuthSuccessMsg(''); setIsLoading(true);
            let email = emailInput.trim(); let pwd = passwordInput.trim();
            if (!email || !pwd) { setAuthError('Email and Password are required.'); setIsLoading(false); return; }
            
            if (authMethod === 'admin') {
              const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'AdminConfig');
              let currentAdminEmail = 'mdmunnachowdhury0003817@gmail.com'; 
              try { const adminDoc = await getDoc(adminDocRef); if (adminDoc.exists()) currentAdminEmail = adminDoc.data().adminEmail || currentAdminEmail; } catch (e) {}

              if (email.toLowerCase() !== currentAdminEmail.toLowerCase()) { setAuthError('Access Denied: Invalid Admin Clearance.'); setIsLoading(false); return; }
              try { await signInWithEmailAndPassword(auth, email, pwd); setAuthSuccessMsg('Admin Login Successful.'); } 
              catch (error) { setAuthError('Incorrect Password.'); }
              setIsLoading(false); return;
            }

            try {
              if (authMethod === 'signup') {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pwd);
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', userCredential.user.email);
                await setDoc(userRef, { password: pwd, balance: 0, totalSpent: 0, joined: new Date().toISOString(), lastBonusDate: '' });
                
                await sendEmailVerification(userCredential.user);
                await auth.signOut(); 
                setAuthSuccessMsg('অ্যাকাউন্ট তৈরি হয়েছে! লগইন করার আগে আপনার ইমেইল ইনবক্স চেক করে ভেরিফাই করুন।'); 
                setAuthMethod('login'); 
              } else {
                const userCredential = await signInWithEmailAndPassword(auth, email, pwd);
                if (!userCredential.user.emailVerified) {
                   await auth.signOut(); 
                   setAuthError('দয়া করে আগে আপনার ইমেইল ভেরিফাই করুন!');
                   setIsLoading(false); 
                   return;
                }
                setAuthSuccessMsg('Login Successful.');
              }
            } catch (error) { 
                setAuthError(getFriendlyAuthError(error.code)); 
            } finally { setIsLoading(false); }
          };

          const handleForgotPassword = async () => {
            if (!emailInput.trim()) { setAuthError('পাসওয়ার্ড রিসেট করতে আগে ইমেইল এড্রেস লিখুন।'); return; }
            setIsLoading(true);
            try {
              await sendPasswordResetEmail(auth, emailInput.trim());
              setAuthError(''); setAuthSuccessMsg('আপনার ইমেইলে পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে।');
            } catch (error) { setAuthError(getFriendlyAuthError(error.code)); } 
            finally { setIsLoading(false); }
          };

          const handleLogout = () => { signOut(auth).then(() => { setUser(null); setCart([]); setShowCart(false); setEmailInput(''); setPasswordInput(''); }); };

          if (showSplash) return <SplashScreen />;

          if (isAuthChecking) return <div className="min-h-screen flex items-center justify-center bg-[#030712]"><RefreshCw className="w-8 h-8 text-brand-primary animate-spin"/></div>;

          if (!user) {
            return (
              <div className="min-h-screen flex items-center justify-center p-4 relative font-sans w-full bg-transparent text-white">
                <FloatingLogos />
                <div className="w-full max-w-[400px] animate-matrix-in z-10">
                  <div className="flex flex-col items-center mb-8">
                    <EliteLogo className="w-20 h-20 mb-4 drop-shadow-[0_0_15px_rgba(191,149,63,0.5)]" />
                    <h2 className="text-4xl sm:text-5xl font-bold tracking-[0.2em] text-white uppercase text-center drop-shadow-md">Voice<span className="font-light text-brand-primary">Store</span></h2>
                    <div className="text-sm tracking-[0.5em] text-yellow-500 font-bold mt-2">ELITE</div>
                  </div>
                  
                  <div className="glass-effect rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                    {authMethod !== 'admin' && (
                        <div className="grid grid-cols-2 gap-2 glass-panel p-1 rounded-xl mb-8 border border-white/5">
                             <button type="button" onClick={() => { setAuthMethod('login'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'login' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Login</button>
                             <button type="button" onClick={() => { setAuthMethod('signup'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'signup' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Sign Up</button>
                        </div>
                    )}
                    {authMethod === 'admin' && <div className="text-center mb-8 pb-4 border-b border-white/10"><span className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center justify-center gap-2"><ShieldCheck className="w-4 h-4"/> Admin Portal</span></div>}
                    
                    <form onSubmit={handleAuthSubmit} className="space-y-5">
                      {authError && <div className="text-red-400 text-[11px] font-bold glass-panel border-red-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><AlertTriangle className="w-5 h-5 shrink-0"/>{authError}</div>}
                      {authSuccessMsg && <div className="text-green-400 text-[11px] font-bold glass-panel border-green-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><CheckCircle className="w-5 h-5 shrink-0"/>{authSuccessMsg}</div>}
                      
                      <div className="space-y-2">
                        <label className="text-[9px] font-bold text-gray-400 pl-1 uppercase tracking-widest">Email Address</label>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="name@example.com" required className="glass-input allow-select" />
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center px-1">
                           <label className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                           {(authMethod === 'login' || authMethod === 'admin') && <button type="button" onClick={handleForgotPassword} className="text-[9px] font-bold text-brand-primary hover:text-white transition-colors uppercase tracking-widest">Forgot?</button>}
                        </div>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••••••" required className="glass-input allow-select" />
                      </div>
                      <div className="pt-6">
                        <button type="submit" disabled={isLoading} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black border border-white/20 font-bold py-4 rounded-2xl text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-[0_5px_20px_rgba(255,255,255,0.2)]">
                            {isLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : (authMethod === 'signup' ? 'Create Account' : authMethod === 'login' ? 'Access Terminal' : 'Admin Login')}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          const currentUserBalance = user.role === 'customer' ? (usersDB[user.email]?.balance || 0) : 0;
          const currentUserTier = user.role === 'customer' ? getTier(usersDB[user.email]?.totalSpent || 0) : null;

          return (
            <div className="min-h-screen w-full relative overflow-x-hidden font-sans pb-24 flex flex-col bg-transparent text-white">
              <FloatingLogos />
              <MessageNotification msg={incomingMsg} onClose={() => setIncomingMsg(null)} />
              
              {toastData.show && createPortal(
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] w-[90%] sm:w-auto max-w-sm animate-fade-in-up">
                  <div className="glass-effect p-3.5 rounded-2xl shadow-xl flex items-center gap-3 border border-white/20 bg-[#030712]/90">
                    <CheckCircle className="w-4 h-4 text-brand-primary shrink-0" />
                    <span className="font-bold text-[10px] sm:text-xs tracking-widest text-white uppercase">{toastData.msg}</span>
                  </div>
                </div>, document.body
              )}

              <header className="sticky top-0 z-40 w-full glass-effect rounded-none border-t-0 border-x-0 border-b border-white/10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3 sm:gap-4">
                      <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center border border-white/20">
                        <EliteLogo className="w-7 h-7" />
                      </div>
                      <span className="text-xl font-light tracking-[0.25em] text-white hidden sm:block uppercase">Verify<span className="font-bold text-brand-primary">Hub</span> <span className="text-[10px] text-yellow-500 font-bold ml-1 tracking-[0.3em]">ELITE</span></span>
                  </div>
                  <div className="flex items-center gap-3 sm:gap-4">
                    {user.role === 'customer' && (
                        <button onClick={() => setShowCart(true)} className="btn-animate relative p-3 rounded-xl glass-panel text-white hover:bg-white/10 transition-colors border border-white/10">
                            <ShoppingCart className="w-4 h-4" strokeWidth={1.5}/>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">{cart.length}</span>}
                        </button>
                    )}
                    {user.role === 'customer' && (
                        <div className="glass-panel px-4 py-2.5 rounded-xl flex items-center gap-2 border border-white/10 cursor-default">
                            <Wallet className="w-4 h-4 text-brand-primary opacity-90" />
                            <span className="font-mono font-bold text-xs sm:text-sm tracking-wider text-white">${Number(currentUserBalance).toFixed(2)}</span>
                        </div>
                    )}
                    <button onClick={handleLogout} className="btn-animate p-3 glass-panel text-white hover:text-red-400 transition-colors border border-white/10"><LogOut className="w-4 h-4" strokeWidth={1.5}/></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-8 relative z-10 w-full flex-grow flex flex-col items-center">
                {globalNotice && (
                  <div className="w-full mb-6 glass-panel border-l-4 border-l-brand-primary p-4 rounded-2xl flex items-start sm:items-center gap-4">
                     <Megaphone className="w-5 h-5 text-brand-primary shrink-0 mt-0.5 sm:mt-0" />
                     <p className="text-xs font-medium text-gray-200 leading-relaxed tracking-wide">{globalNotice}</p>
                  </div>
                )}

                <div className="w-full relative z-30 mb-8">
                  {/* 🟢 FIXED TABS: Grid Layout to Prevent Any Scrolling or Cut-offs 🟢 */}
                  <div className="glass-effect rounded-[24px] p-1.5 sm:p-2 grid grid-cols-5 gap-1 w-full border border-white/10 mx-auto max-w-5xl">
                    {(user.role === 'admin' ? ADMIN_TABS : CUSTOMER_TABS).map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`btn-animate relative flex flex-col items-center justify-center py-3 sm:py-3.5 px-0.5 sm:px-2 rounded-xl min-w-0 group ${activeTab === tab.id ? 'bg-white shadow-[0_4px_15px_rgba(255,255,255,0.2)]' : 'hover:bg-white/10'}`}>
                          <div className="relative z-10 flex flex-col items-center justify-center w-full">
                              <tab.icon className={`w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-200 ${activeTab === tab.id ? 'scale-110 mb-1 text-black' : 'group-hover:scale-110 group-hover:-translate-y-0.5 mb-1 text-gray-400 group-hover:text-white'}`} strokeWidth={activeTab === tab.id ? 2 : 1.5} /> 
                              <span className={`text-[7.5px] sm:text-[9px] min-[400px]:text-[10px] leading-tight mt-0.5 uppercase tracking-wider text-center w-full whitespace-normal break-words px-0.5 ${activeTab === tab.id ? 'font-bold text-black' : 'font-medium text-gray-400 group-hover:text-white'}`}>
                                  {tab.label}
                              </span>
                          </div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="w-full relative tab-transition-enter" key={activeTab}>
                    <ErrorBoundary>
                        {user.role === 'admin' ? (
                          <AdminDashboard inventory={inventory} orders={allOrders} deposits={deposits} categories={categories} usersDB={usersDB} purchases={purchases} tickets={tickets} triggerToast={triggerToast} db={db} appId={appId} promoSettings={promoSettings} featureSettings={featureSettings} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} smsSettings={smsSettings} activeChats={activeChats} auth={auth} user={user} activeTab={activeTab} setActiveTab={setActiveTab} />
                        ) : (
                          <>
                              {activeTab === 'sms' && <CustomerDashboardSMS user={user} balance={currentUserBalance} triggerToast={triggerToast} smsSettings={smsSettings} />}
                              {activeTab === 'store' && <CustomerDashboardStore inventory={inventory} categories={categories} cart={cart} setCart={setCart} allOrders={allOrders} triggerToast={triggerToast} />}
                              {activeTab === 'add_funds' && <CustomerDashboardFunds deposits={deposits} user={user} db={db} appId={appId} triggerToast={triggerToast} addNotification={addNotification} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} />}
                              {activeTab === 'my_accounts' && <CustomerDashboardVault user={user} purchases={purchases} db={db} appId={appId} triggerToast={triggerToast} />}
                              {activeTab === 'profile' && <CustomerDashboardProfile user={user} balance={currentUserBalance} tier={currentUserTier} userInfo={usersDB[user.email]} allOrders={allOrders} deposits={deposits} purchases={purchases} tickets={tickets.filter(t => t && t.email === user.email)} db={db} appId={appId} featureSettings={featureSettings} triggerToast={triggerToast} />}
                          </>
                        )}
                    </ErrorBoundary>
                </div>
              </main>

              {showCart && user.role === 'customer' && <CartModal cart={cart} setCart={setCart} setShowCart={setShowCart} balance={currentUserBalance} user={user} promoSettings={promoSettings} triggerToast={triggerToast} addNotification={addNotification} db={db} appId={appId} />}
              
              {/* LIVE CHAT WIDGET FOR CUSTOMERS */}
              {user && user.role === 'customer' && <LiveChatWidget user={user} db={db} appId={appId} setIncomingMsg={setIncomingMsg} />}
            </div>
          );
        }

        function LiveChatWidget({ user, db, appId, setIncomingMsg }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);
            const initialLoadRef = useRef(true);

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), orderBy('timestamp', 'asc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const allMsgs = [];
                    snapshot.forEach((doc) => { 
                        allMsgs.push({ id: doc.id, ...doc.data() }); 
                    });
                    setChatMessages(allMsgs);
                    
                    if (!initialLoadRef.current) {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const newMsg = change.doc.data();
                                if (newMsg.sender === 'admin' && !isOpen) {
                                    setIncomingMsg(newMsg.text);
                                    setUnreadCount(prev => prev + 1);
                                }
                            }
                        });
                    }

                    if (isOpen) {
                        setTimeout(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, 100);
                        setUnreadCount(0);
                    }
                    initialLoadRef.current = false;
                });
                return () => unsubscribe();
            }, [isOpen, db, appId, user.email, setIncomingMsg]);

            useEffect(() => { if (isOpen) setUnreadCount(0); }, [isOpen]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', user.email, 'messages'), { text: msgText, sender: 'user', timestamp: serverTimestamp(), email: user.email });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', user.email), { lastMessage: msgText, lastMessageTime: serverTimestamp(), userEmail: user.email, unreadByAdmin: true }, { merge: true });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-white rounded-full shadow-[0_4px_15px_rgba(255,255,255,0.3)] flex items-center justify-center text-black">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse shadow-lg">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[340px] h-[480px] glass-effect rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden origin-bottom-right animate-fade-in-up">
                            <div className="bg-[rgba(255,255,255,0.05)] border-b border-white/10 p-5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                   <div className="w-2.5 h-2.5 bg-brand-primary rounded-full animate-pulse"></div>
                                   <h3 className="text-white font-bold text-[11px] tracking-widest uppercase">Admin Support</h3>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white transition-colors"><X className="w-4 h-4"/></button>
                            </div>
                            <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-transparent">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40">
                                        <Headset className="w-12 h-12 mb-4 text-white" strokeWidth={1.5} />
                                        <p className="text-[10px] text-gray-300 font-mono text-center uppercase tracking-widest">Encrypted Channel Open</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-swoosh-in ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.03}s`}}>
                                            <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-medium leading-relaxed shadow-lg allow-select ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-sm' : 'glass-panel text-white rounded-tl-sm'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-500 mt-1.5 font-mono tracking-wider">
                                                {msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-[rgba(0,0,0,0.5)] border-t border-white/10 p-4 flex gap-3 items-center">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="glass-input allow-select !py-3"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        function CustomerDashboardSMS({ user, balance, triggerToast, smsSettings }) {
          const [isSmsLoading, setIsSmsLoading] = useState(false);
          const [selectedSmsService, setSelectedSmsService] = useState(''); 
          const [availableServices, setAvailableServices] = useState([]); 
          const [isAppDropdownOpen, setIsAppDropdownOpen] = useState(false);
          const [appSearch, setAppSearch] = useState('');
          const [isFetchingServices, setIsFetchingServices] = useState(false);
          const [smsCountry, setSmsCountry] = useState('USA'); 
          
          const [priceTiers, setPriceTiers] = useState([]);
          const [selectedTier, setSelectedTier] = useState(null);
          const [isTiersLoading, setIsTiersLoading] = useState(false);

          const [confirmAction, setConfirmAction] = useState({ show: false, type: '', orderId: null, price: 0 });
          const [showSmsWarning, setShowSmsWarning] = useState(false); // 🟢 SMS WARNING MODAL STATE 🟢

          const ordersContainerRef = useRef(null);
          const [activeOrders, setActiveOrders] = useState(() => {
              try { const saved = localStorage.getItem(`smsOrders_${user?.email}`); if (saved) { const parsed = JSON.parse(saved); if(Array.isArray(parsed)) return parsed.filter(o => o && o.status === 'ACTIVE'); } } catch(e) {} return [];
          });

          useEffect(() => { if (user?.email) localStorage.setItem(`smsOrders_${user.email}`, JSON.stringify(activeOrders)); }, [activeOrders, user]);

          // 🟢 FIX 2: Depend on primitive value `smsSettings?.active` to prevent fetch loops 🟢
          const smsActive = smsSettings?.active;
          useEffect(() => {
              if (smsActive) {
                  setIsFetchingServices(true);
                  const controller = new AbortController();
                  const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 seconds limit to prevent infinite loading

                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getPrices?country=${smsCountry}`, { signal: controller.signal })
                  .then(r => r.json()).then(json => { 
                      clearTimeout(timeoutId);
                      const srvs = json?.success && Array.isArray(json.data) ? json.data : [];
                      setAvailableServices(srvs); 
                      setIsFetchingServices(false); 
                  }).catch(() => { 
                      clearTimeout(timeoutId);
                      setIsFetchingServices(false); 
                      setAvailableServices([]); 
                  });

                  return () => { clearTimeout(timeoutId); controller.abort(); };
              }
          }, [smsActive, smsCountry]); // 🟢 FIX 2: END 🟢

          useEffect(() => {
              if (selectedSmsService && smsCountry) {
                  setIsTiersLoading(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getServiceTiers?country=${smsCountry}&service=${selectedSmsService}`)
                  .then(res => res.json()).then(data => { if (data?.success && Array.isArray(data?.tiers) && data.tiers.length > 0) { setPriceTiers(data.tiers); setSelectedTier(data.tiers[0]); } else { setPriceTiers([]); setSelectedTier(null); } setIsTiersLoading(false); }).catch(() => { setPriceTiers([]); setSelectedTier(null); setIsTiersLoading(false); });
              }
          }, [selectedSmsService, smsCountry]);

          const filteredApps = Array.isArray(availableServices) ? availableServices.filter(app => (app?.name || '').toLowerCase().includes((appSearch || '').toLowerCase())) : [];

          const currentService = availableServices.find(s => s?.code === selectedSmsService) || null;
          const fallbackPrice = currentService?.finalPrice ? parseFloat(currentService.finalPrice) : 0;
          const finalBuyPrice = selectedTier?.priceWithMarkup ? parseFloat(selectedTier.priceWithMarkup) : fallbackPrice;
          const exactMaxPrice = selectedTier?.originalPrice ? parseFloat(selectedTier.originalPrice) : null;
          const exactProviderId = selectedTier?.providerId || null;

          const buySmsNumber = async () => {
              if (!currentService) return;
              if (activeOrders.length > 0) { triggerToast("Please complete your current order first."); return; }
              if (balance < finalBuyPrice) { triggerToast("Insufficient balance."); return; }
              
              setIsSmsLoading(true);
              try {
                  const token = await getAuthToken(); 
                  const deductRes = await fetch('https://voicestore-backend.onrender.com/api/sms-deduct', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ email: user.email, price: finalBuyPrice })
                  });
                  const deductData = await deductRes.json();
                  if (!deductData.success) { triggerToast(deductData.message || "Balance deduction failed."); setIsSmsLoading(false); return; }

                  const res = await fetch('https://voicestore-backend.onrender.com/api/juicy/getNumber', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ serviceId: currentService.code, countryId: smsCountry, maxPrice: exactMaxPrice, exactProviderId: exactProviderId }) 
                  });
                  const data = await res.json();
                  
                  if (data?.success && data?.phone) {
                      let finalOrderPrice = finalBuyPrice;
                      if (data.exactCost !== undefined && data.exactCost !== null) {
                          const markup = parseFloat(smsSettings?.markup || 1.00);
                          const actualTotalCost = parseFloat(data.exactCost) + markup;
                          const diff = parseFloat((finalBuyPrice - actualTotalCost).toFixed(2));
                          if (diff > 0) {
                              fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: diff }) }).catch(()=>{});
                              finalOrderPrice = actualTotalCost; 
                          }
                      }
                      const cleanName = (currentService.name || '').split(' [')[0];
                      const newOrder = { id: data.orderId, phone: data.phone, service: cleanName, countryId: smsCountry, price: finalOrderPrice, status: 'ACTIVE', codes: [], expiresAt: Date.now() + 240 * 1000, isCancelling: false, isNew: true };
                      setActiveOrders(prev => [newOrder, ...prev]); 
                      triggerToast("Number assigned!");
                      
                      // 🟢 SHOW SMS WARNING POPUP 🟢
                      setShowSmsWarning(true);

                      // 🟢 SCROLL ANIMATION DOWN TO THE NEW NUMBER 🟢
                      setTimeout(() => {
                          const elements = document.querySelectorAll('.order-card-anim');
                          if(elements.length > 0) {
                              elements[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                          }
                      }, 200);

                  } else {
                      await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: finalBuyPrice }) });
                      triggerToast(data?.message || "Failed to get number.");
                  }
              } catch (e) { triggerToast("Network Error."); } finally { setIsSmsLoading(false); }
          };

          const performSkip = async (orderId, priceToRefund, isAuto = false) => {
              try {
                  const token = await getAuthToken();
                  const skipRes = await fetch(`https://voicestore-backend.onrender.com/api/juicy/skip`, { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`}, body: JSON.stringify({orderId}) }); 
                  const skipData = await skipRes.json();
                  
                  // 🟢 FIXED: DO NOT IGNORE BACKEND ERRORS. STOP REFUND IF CODE ALREADY RECEIVED. 🟢
                  if (!skipData.success) { 
                      if (!isAuto) triggerToast(skipData.message); 
                      if (String(skipData.message).includes('received')) {
                          setActiveOrders(prev => prev.map(o => o.id === orderId ? {...o, isCancelling: false} : o));
                      }
                      return; 
                  }
                  
                  // Only refund if backend confirmed cancellation
                  await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: priceToRefund }) });
                  
                  if(!isAuto) triggerToast(`Skipped. $${priceToRefund.toFixed(2)} refunded.`); 
                  else triggerToast(`Time expired. Auto-refunded.`);
                  
                  setActiveOrders(prev => prev.filter(o => o.id !== orderId));
              } catch (e) {
                  if(!isAuto) triggerToast("Network Error.");
                  setActiveOrders(prev => prev.map(o => o.id === orderId ? {...o, isCancelling: false} : o));
              } 
          };

          const executeConfirmAction = () => {
              if(confirmAction.type === 'skip') performSkip(confirmAction.orderId, confirmAction.price);
              setConfirmAction({ show: false, type: '', orderId: null, price: 0 });
          };

          useEffect(() => {
              if(activeOrders.length === 0) return;
              const interval = setInterval(() => {
                  activeOrders.forEach(async (order) => {
                      if (order.codes.length > 0) return; 
                      if (Date.now() >= order.expiresAt) {
                          if (!order.isCancelling) {
                              setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, isCancelling: true} : o));
                              performSkip(order.id, order.price, true);
                          }
                          return;
                      }
                      try {
                          const res = await fetch(`https://voicestore-backend.onrender.com/api/juicy/getStatus?orderId=${order.id}`);
                          const data = await res.json();
                          if (data.success && data.status === 'OK' && data.code) {
                              setActiveOrders(prev => prev.map(o => {
                                  if (o.id === order.id && !o.codes.includes(data.code)) {
                                      triggerToast(`New SMS Received!`);
                                      getAuthToken().then(token => { fetch('https://voicestore-backend.onrender.com/api/sms-save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, type: `Live SMS (${o.service})`, data: `Phone: ${o.phone}\nSMS Code: ${data.code}` }) }); });
                                      return { ...o, codes: [...o.codes, data.code], lastMsg: 'SMS Received' };
                                  } return o;
                              }));
                          } else if (String(data.status).includes('CANCEL')) { setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                          } else { setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, lastMsg: data.status} : o)); }
                      } catch(e) {}
                  });
              }, 5000); 
              return () => clearInterval(interval);
          }, [activeOrders, user]);

          const copyText = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const formatPhoneDisplay = (phone) => { return `+${String(phone).replace(/\D/g, '')}`; };
          const copyNumberOnly = (phone) => { copyText(String(phone).replace(/\D/g, '')); };

          if(!smsSettings?.active) return <div className="glass-effect rounded-3xl w-full text-center py-32 text-gray-500 font-mono text-sm uppercase tracking-widest"><Smartphone className="w-12 h-12 mx-auto mb-4 opacity-30" strokeWidth={1.5}/> Service Offline.</div>;

          return (
            <div className="w-full max-w-3xl mx-auto space-y-6 sm:space-y-8 relative animate-matrix-in">
                
                {/* 🟢 NEW: SMS WARNING MODAL PORTAL 🟢 */}
                {showSmsWarning && createPortal(
                    <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm animate-fade-in-up">
                        <div className="glass-effect w-full max-w-sm rounded-3xl p-6 sm:p-8 relative overflow-hidden border border-white/20 bg-[#0f172a]">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-yellow-500"></div>
                            <div className="flex items-center gap-4 mb-6">
                                <div className="p-3.5 rounded-2xl glass-panel text-yellow-500 border border-yellow-500/30">
                                    <AlertTriangle className="w-6 h-6"/>
                                </div>
                                <h3 className="text-base font-bold text-white tracking-widest uppercase">Important Notice</h3>
                            </div>
                            <p className="text-sm text-gray-300 leading-relaxed font-medium mb-8">
                                If the number shows that the phone number is already registered on another device then please don't request code. Skip it immediately to get a refund.
                            </p>
                            <button onClick={() => setShowSmsWarning(false)} className="btn-animate w-full py-4 rounded-xl font-bold text-black text-xs uppercase tracking-widest bg-yellow-500 hover:bg-yellow-400">
                                I Understand
                            </button>
                        </div>
                    </div>,
                    document.body
                )}

                {confirmAction.show && createPortal(
                    <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm">
                        <div className="glass-effect w-full max-w-sm rounded-3xl p-6 sm:p-8 relative overflow-hidden border border-white/20 animate-fade-in-up bg-[#0f172a]">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-red-600"></div>
                            <div className="flex items-center gap-4 mb-6">
                                <div className="p-3.5 rounded-2xl glass-panel text-red-500 border border-red-500/30">
                                    <Ban className="w-6 h-6"/>
                                </div>
                                <h3 className="text-base font-bold text-white tracking-widest uppercase">Skip Number?</h3>
                            </div>
                            <p className="text-xs text-gray-300 leading-relaxed font-light mb-8">
                                Are you sure you want to skip this number? It will be banned and balance refunded.
                            </p>
                            <div className="flex gap-3 w-full">
                                <button onClick={() => setConfirmAction({ show: false, type: '', orderId: null, price: 0 })} className="btn-animate flex-1 py-3.5 rounded-xl font-bold text-gray-300 glass-panel hover:bg-white/10 text-xs uppercase tracking-widest">Cancel</button>
                                <button onClick={executeConfirmAction} className="btn-animate flex-1 py-3.5 rounded-xl font-bold text-white text-xs uppercase tracking-widest bg-red-600 hover:bg-red-500 border border-red-500/50">Yes, Skip</button>
                            </div>
                        </div>
                    </div>,
                    document.body
                )}

                {/* 🟢 FULL SCREEN APP SELECTION MODAL RENDERED IN PORTAL (FIXED) 🟢 */}
                {isAppDropdownOpen && createPortal(
                   <div className="fixed inset-0 z-[99999] bg-[rgba(3,7,18,0.95)] backdrop-blur-2xl flex flex-col animate-pop-in overflow-hidden">
                       <div className="p-4 sm:p-6 border-b border-white/10 flex justify-between items-center bg-transparent sticky top-0 z-20">
                           <h3 className="font-bold text-white text-sm sm:text-base tracking-widest uppercase">Select Application</h3>
                           <button onClick={() => { setIsAppDropdownOpen(false); setAppSearch(''); }} className="btn-animate p-2 bg-white/10 hover:bg-white text-white hover:text-black rounded-full transition-colors"><X className="w-5 h-5"/></button>
                       </div>
                       <div className="p-4 sm:p-6 bg-transparent border-b border-white/10 sticky top-[73px] z-20">
                           <div className="relative">
                               <Search className="w-5 h-5 text-gray-500 absolute left-4 top-3.5 pointer-events-none" />
                               <input autoFocus type="text" placeholder="Search app..." value={appSearch} onChange={(e) => setAppSearch(e.target.value)} className="w-full bg-[rgba(255,255,255,0.05)] border border-white/20 rounded-xl pl-12 py-3.5 text-base text-white outline-none focus:border-brand-primary allow-select"/>
                           </div>
                       </div>
                       <div className="flex-grow overflow-y-auto p-4 sm:p-6 custom-scrollbar bg-transparent space-y-3 pb-24 z-10 relative">
                           {filteredApps.length === 0 ? (<p className="text-center text-gray-500 py-10 text-xs font-mono uppercase tracking-widest">{isFetchingServices ? 'Fetching...' : 'No apps found.'}</p>) : 
                               filteredApps.map((s) => {
                                   if(!s) return null;
                                   return (
                                       <div key={s.code} onClick={() => { setSelectedSmsService(s.code); setIsAppDropdownOpen(false); setAppSearch(''); }} className={`btn-animate p-4 rounded-2xl cursor-pointer text-sm font-bold flex items-center justify-between ${selectedSmsService === s.code ? 'bg-white text-black shadow-[0_5px_20px_rgba(255,255,255,0.3)]' : 'text-gray-200 bg-[rgba(15,23,42,0.6)] border border-white/5 hover:border-white/20'}`}>
                                           <div className="flex items-center gap-3">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center ${selectedSmsService === s.code ? 'bg-black/10' : 'bg-white/5'}`}>
                                                    <Smartphone className="w-4 h-4"/>
                                                </div>
                                                {s.name}
                                           </div>
                                           {selectedSmsService === s.code && <CheckCircle className="w-5 h-5" />}
                                       </div>
                                   );
                               })
                           }
                       </div>
                   </div>,
                   document.body
                )}

                <div className={uiCard + " p-6 sm:p-8"}>
                    <div className="flex items-center justify-between mb-8 pb-5 border-b border-white/10 relative z-10">
                        <h2 className="text-lg sm:text-xl font-light tracking-[0.2em] text-white flex items-center gap-3 uppercase">
                            <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center shadow-inner">
                                <Radar className="w-5 h-5 text-brand-primary animate-spin" style={{ animationDuration: '4s' }}/>
                            </div>
                            Control <span className="font-bold text-brand-primary">Panel</span>
                        </h2>
                        <div className="flex items-center gap-2 glass-panel px-3 py-1.5 rounded-full border-white/10">
                           <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                           <span className="text-[9px] text-gray-300 font-mono uppercase tracking-widest hidden sm:block pt-0.5">Status: Live</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 relative z-10 mb-8">
                        <div className="glass-panel p-4 rounded-2xl hover:border-brand-primary/30 transition-colors">
                            <label className="block text-[9px] font-bold text-gray-400 mb-2.5 uppercase tracking-[0.2em] ml-1">Select Region</label>
                            <div className="relative">
                                <select value={smsCountry} onChange={e => setSmsCountry(e.target.value)} className={uiInput + " appearance-none cursor-pointer pr-10 text-white h-12 bg-transparent allow-select"}>
                                    {NETWORK_REGIONS.map(c => <option key={c.id} value={c.id} className="bg-[#121212]">{c.name}</option>)}
                                </select>
                                <ChevronDown className="w-4 h-4 text-white absolute right-4 top-4 pointer-events-none" />
                            </div>
                        </div>

                        <div className="glass-panel p-4 rounded-2xl hover:border-brand-primary/30 transition-colors">
                            <label className="block text-[9px] font-bold text-gray-400 mb-2.5 uppercase tracking-[0.2em] ml-1">Select Price</label>
                            <div className="relative w-full">
                                <select 
                                    value={selectedTier?.originalPrice ? String(selectedTier.originalPrice) : ''}
                                    onChange={(e) => { const tier = Array.isArray(priceTiers) ? priceTiers.find(t => String(t?.originalPrice) === e.target.value) : null; if(tier) setSelectedTier(tier); }}
                                    disabled={isTiersLoading || (!Array.isArray(priceTiers)) || priceTiers.length === 0}
                                    className={uiInput + " h-12 pl-10 appearance-none cursor-pointer text-[13px] font-mono text-white bg-transparent disabled:opacity-50 allow-select"}
                                >
                                    {isTiersLoading ? (
                                        <option value="" className="text-xs bg-[#121212] text-gray-500">...</option>
                                    ) : (Array.isArray(priceTiers) && priceTiers.length > 0) ? (
                                        priceTiers.map((tier, idx) => (
                                            <option key={idx} value={String(tier.originalPrice)} className="bg-[#121212] text-gray-200">${Number(tier.priceWithMarkup || 0).toFixed(2)}</option>
                                        ))
                                    ) : (
                                        <option value="" className="bg-[#121212] text-gray-500">$0.00</option>
                                    )}
                                </select>
                                <DollarSign className="w-4 h-4 text-gray-400 absolute left-3.5 top-4 pointer-events-none"/>
                                <ChevronDown className="w-4 h-4 text-gray-600 absolute right-4 top-4 pointer-events-none"/>
                            </div>
                        </div>
                    </div>

                    <div className="glass-panel p-5 sm:p-6 rounded-3xl mb-8 relative transition-all">
                       <label className="block text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-[0.2em] ml-1">Select Application</label>
                       <div className="relative w-full">
                           <div onClick={() => setIsAppDropdownOpen(!isAppDropdownOpen)} className={uiInput + " h-14 pl-12 pr-10 flex items-center justify-between cursor-pointer hover:border-brand-primary/50 bg-[rgba(0,0,0,0.5)]"}>
                               <span className="truncate text-white font-bold text-[13px] tracking-wide">{isFetchingServices ? 'Loading Apps...' : (currentService ? `${currentService.name}` : (availableServices.length > 0 ? 'Select App' : 'No services found'))}</span>
                               {isFetchingServices ? <RefreshCw className="w-4 h-4 text-brand-primary absolute left-4 animate-spin"/> : <Smartphone className="w-4 h-4 text-brand-primary absolute left-4"/>}
                               <ChevronDown className={`w-4 h-4 text-gray-400 absolute right-4 transition-transform ${isAppDropdownOpen ? 'rotate-180' : ''}`}/>
                           </div>
                       </div>
                    </div>

                    {/* 🟢 HIDDEN BUTTON UNTIL APP SELECTED 🟢 */}
                    {selectedSmsService && (
                        <button onClick={buySmsNumber} disabled={isSmsLoading || activeOrders.length > 0 || (!priceTiers || priceTiers.length === 0)} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black font-bold py-4 rounded-2xl text-xs tracking-widest uppercase shadow-[0_5px_20px_rgba(255,255,255,0.1)] h-14 mt-4 relative z-10 max-w-md mx-auto flex items-center justify-center gap-2 animate-fade-in-up">
                            {activeOrders.length > 0 ? <span className="flex items-center gap-2"><StopCircle className="w-4 h-4"/> Finish Order First</span> : isSmsLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : 'Get Number'}
                        </button>
                    )}
                </div>

                <div ref={ordersContainerRef} className="w-full max-w-3xl mx-auto">
                    {activeOrders.map((order, index) => {
                        return (
                            <div key={order.id} className="glass-effect order-card-anim rounded-3xl border border-white/20 flex flex-col items-center py-10 px-6 sm:px-10 animate-fade-in-up relative overflow-hidden group mt-8">
                                <div className="absolute top-0 left-0 w-full h-[3px] bg-white/10">
                                    <OrderProgressBar expiresAt={order.expiresAt} />
                                </div>
                                
                                <div className="flex items-center gap-2.5 mb-8 glass-panel px-5 py-2.5 rounded-full border-white/20 relative z-10">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    <p className="text-white font-bold uppercase tracking-[0.3em] text-[10px] pt-0.5">{order.service}</p>
                                </div>

                                <div className="flex items-center gap-4 w-full max-w-md mb-10 relative z-10">
                                    <div className="text-3xl sm:text-5xl font-mono font-bold text-white bg-[rgba(0,0,0,0.5)] px-6 py-6 rounded-2xl border border-white/10 flex-grow text-center whitespace-nowrap overflow-hidden text-ellipsis tracking-wider drop-shadow-md allow-select">
                                        +{String(order.phone).replace(/\D/g, '')}
                                    </div>
                                    <button onClick={() => copyNumberOnly(order.phone)} className="btn-animate p-6 bg-white hover:bg-gray-200 text-black rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.2)] shrink-0">
                                        <Copy className="w-6 h-6"/>
                                    </button>
                                </div>
                                
                                {order.codes.length === 0 ? (
                                    <div className="w-full max-w-md relative z-10">
                                        <p className="text-gray-400 font-mono text-[10px] uppercase tracking-widest mb-4 flex justify-center items-center gap-2"><RefreshCw className="w-3 h-3 animate-spin text-white"/> {order.lastMsg === 'WAITING' || !order.lastMsg ? 'Waiting for SMS...' : `Status: ${order.lastMsg}`}</p>
                                        <div className="flex justify-between items-center bg-[rgba(0,0,0,0.5)] p-4 rounded-2xl border border-white/10">
                                            <div className="flex items-center gap-3 pl-2">
                                                <Clock className="w-4 h-4 text-gray-400 hidden sm:block"/>
                                                <OrderTimerDisplay expiresAt={order.expiresAt} />
                                            </div>
                                            
                                            <button onClick={() => setConfirmAction({show: true, type: 'skip', orderId: order.id, price: order.price})} className="btn-animate bg-red-900/20 hover:bg-red-900/40 border border-red-900/50 text-red-400 px-6 py-3 rounded-xl text-[10px] uppercase tracking-widest font-bold flex items-center gap-2"><Ban className="w-3.5 h-3.5"/> Skip</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="w-full max-w-md space-y-5 relative z-10 animate-swoosh-in">
                                        <p className="text-[11px] text-green-400 font-bold uppercase tracking-[0.3em] text-center mb-5">SMS Received</p>
                                        {/* 🟢 FULL TEXT DISPLAY & COPY AS REQUESTED 🟢 */}
                                        {order.codes.map((c, i) => {
                                            return (
                                                <div key={i} className="flex flex-col gap-4 bg-[rgba(255,255,255,0.05)] border border-brand-primary/30 p-5 rounded-2xl animate-fade-in-up" style={{animationDelay: `${i * 0.1}s`, animationFillMode: 'both'}}>
                                                    <p className="text-sm text-white font-sans font-medium tracking-normal leading-relaxed text-left break-words drop-shadow-md allow-select">{c}</p>
                                                    <button onClick={() => copyText(c)} className="btn-animate w-full py-3.5 bg-brand-primary text-black hover:bg-white rounded-xl flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest font-bold shadow-[0_0_15px_rgba(6,182,212,0.3)] shrink-0">
                                                        <Copy className="w-4 h-4"/> Copy Full Message
                                                    </button>
                                                </div>
                                            );
                                        })}
                                        <button onClick={() => setActiveOrders([])} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2 uppercase tracking-widest mt-8 !text-xs">Close Order</button>
                                    </div>
                                )}
                            </div>
                        )
                    })}
                </div>
            </div>
          );
        }

        // ==========================================
        // 🌟 ASSET STORE MODULE
        // ==========================================
        function CustomerDashboardStore({ inventory, categories, cart, setCart, triggerToast }) {
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedStates, setSelectedStates] = useState({}); 
          const filteredCategories = categories.filter(c => (c?.name || '').toLowerCase().includes((searchQuery || '').toLowerCase()));

          const handleAddToCart = (product) => {
              const selectedState = selectedStates[product.id];
              if (!selectedState && getAvailableStates(product.id).length > 0) {
                  triggerToast("Please select a State.");
                  return;
              }
              const finalState = (!selectedState || selectedState === 'Random') ? undefined : selectedState;
              const cartItem = { ...product };
              if (finalState) cartItem.selectedState = finalState;
              
              setCart([...cart, cartItem]); 
              triggerToast(`Added to cart.`);
          };

          const handleStateChange = (productId, stateStr) => {
              setSelectedStates(prev => ({...prev, [productId]: stateStr}));
          };

          const getAvailableStates = (productId) => {
              const stock = inventory[productId] || [];
              if (stock.length === 0) return [];
              const states = new Set();
              stock.forEach(accData => {
                  const match = String(accData).match(/📍 STATE:\s*\n?([^\n]+)/i);
                  if (match && match[1]) states.add(match[1].trim());
              });
              return Array.from(states).sort();
          };

          return (
            <div className="space-y-6 w-full relative z-10 animate-matrix-in">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4 w-full glass-effect p-5 rounded-3xl border border-white/10 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-brand-primary"></div>
                <div className="text-center sm:text-left w-full pl-4 py-1">
                  <h1 className="text-xl sm:text-2xl font-bold text-white tracking-[0.25em] uppercase mb-1">Buy <span className="font-light text-brand-primary">Accounts</span></h1>
                  <p className="text-gray-400 text-[9px] sm:text-[10px] font-mono tracking-widest uppercase">Verified Static Entities</p>
                </div>
                <div className="w-full sm:w-72 relative">
                     <Search className="w-4 h-4 text-white absolute left-4 top-3.5" />
                     <input type="text" placeholder="Search accounts..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="glass-input allow-select !pl-12 !py-3 rounded-2xl bg-[rgba(0,0,0,0.5)]" />
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full">
                  {filteredCategories.map((product, idx) => {
                      const Icon = product.icon || Package;
                      const availableStates = getAvailableStates(product.id);
                      const stockCount = inventory[product.id] ? inventory[product.id].length : 0;
                      const isOutOfStock = stockCount === 0;

                      return (
                          <div key={product.id} className={`relative glass-panel rounded-3xl p-6 flex flex-col group transition-all duration-300 border border-white/5 animate-spring-card ${isOutOfStock ? "opacity-50 grayscale" : "hover:border-brand-primary/40 hover:bg-[rgba(255,255,255,0.02)]"}`} style={{animationDelay: `${idx * 0.05}s`, animationFillMode: 'both'}}>
                              
                              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-brand-primary to-transparent scale-x-0 group-hover:scale-x-100 transition-transform duration-700 ease-out"></div>

                              {isOutOfStock && (
                                  <div className="absolute inset-0 z-20 flex items-center justify-center bg-[#000]/80 rounded-3xl pointer-events-none">
                                      <div className="bg-white/10 text-white font-bold px-4 py-2 rounded-xl border border-white/20 tracking-[0.3em] text-[10px] uppercase transform -rotate-12">
                                          Out of Stock
                                      </div>
                                  </div>
                              )}

                              <div className="flex justify-between items-start mb-6 relative z-10">
                                  <div className="bg-white/5 p-4 rounded-2xl border border-white/10 group-hover:bg-brand-primary/10 transition-colors duration-500">
                                      <Icon className={`w-6 h-6 text-brand-primary`} strokeWidth={1.5} />
                                  </div>
                                  <div className="text-right flex flex-col items-end">
                                      <span className="text-white text-xl font-mono font-bold tracking-wider">${Number(product.price).toFixed(2)}</span>
                                      <span className="text-[8px] text-brand-primary uppercase tracking-widest mt-1 font-mono bg-brand-primary/10 px-2.5 py-1 rounded-full border border-brand-primary/20">{stockCount} Units</span>
                                  </div>
                              </div>
                              
                              <h3 className="text-sm font-bold text-white mb-2 tracking-wider uppercase relative z-10 group-hover:text-brand-primary transition-colors duration-300">{product.name}</h3>
                              <p className="text-gray-400 text-[10px] leading-relaxed mb-6 flex-grow line-clamp-2 font-light relative z-10">{product.description}</p>
                              
                              {!isOutOfStock && availableStates.length > 0 && (
                                  <div className="mb-5 relative z-10">
                                      <select 
                                          value={selectedStates[product.id] || ''} 
                                          onChange={(e) => handleStateChange(product.id, e.target.value)}
                                          className="w-full bg-[rgba(0,0,0,0.5)] border border-white/10 text-gray-300 text-[10px] rounded-xl px-4 py-3.5 appearance-none outline-none focus:border-brand-primary/50 tracking-wider font-mono cursor-pointer transition-colors allow-select"
                                      >
                                          <option value="">Select State</option>
                                          {availableStates.map(state => <option key={state} value={state}>{state}</option>)}
                                      </select>
                                      <ChevronDown className="w-3 h-3 text-gray-400 absolute right-4 top-3.5 pointer-events-none"/>
                                  </div>
                              )}

                              <button onClick={() => handleAddToCart(product)} disabled={isOutOfStock} className="btn-animate w-full bg-white/5 border border-white/10 hover:bg-brand-primary text-white hover:text-black font-bold py-4 rounded-xl text-[10px] tracking-widest uppercase relative z-10 flex justify-center items-center gap-2">
                                  {isOutOfStock ? 'Unavailable' : 'Add to Cart'} <ShoppingCart className="w-3.5 h-3.5" />
                              </button>
                          </div>
                      );
                  })}
                  {filteredCategories.length === 0 && <div className="col-span-full py-16 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest"><Search className="w-8 h-8 mx-auto mb-3 opacity-20"/>No accounts found.</div>}
              </div>
            </div>
          );
        }

        // ==========================================
        // FUNDS MODULE
        // ==========================================
        function CustomerDashboardFunds({ user, db, appId, triggerToast, addNotification, bankSettings, cryptoSettings, customPayments, deposits }) {
          const [hiddenInvoices, setHiddenInvoices] = useState(() => {
              try {
                  const stored = localStorage.getItem(`hiddenInvoices_${user?.email}`);
                  return stored ? JSON.parse(stored) : [];
              } catch(e) { return []; }
          }); // 🟢 GLITCH FIX: Local hide state preserved
          
          const [isGenerating, setIsGenerating] = useState(false);  // 🟢 GLITCH FIX: Prevent double clicks
          const [isVerifyingClick, setIsVerifyingClick] = useState(false); // 🟢 NEW: Manual Check State

          // 🟢 NEW: LIVE CRYPTO PRICES 🟢
          const [liveRates, setLiveRates] = useState({});
          useEffect(() => {
              fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,tron,tether,ethereum,litecoin&vs_currencies=usd')
              .then(r=>r.json())
              .then(d => {
                  setLiveRates({
                      BTC: d.bitcoin?.usd || 0,
                      TRX: d.tron?.usd || 0,
                      USDT: d.tether?.usd || 1,
                      ETH: d.ethereum?.usd || 0,
                      LTC: d.litecoin?.usd || 0
                  });
              }).catch(e=>{});
          }, []);

          useEffect(() => {
              if(user?.email) {
                  localStorage.setItem(`hiddenInvoices_${user.email}`, JSON.stringify(hiddenInvoices));
              }
          }, [hiddenInvoices, user]);

          // 🟢 GLITCH FIX: Ignores invoices hidden locally OR older than 1 hour to prevent permanent lockouts
          const pendingCrypto = (deposits || []).find(d => {
              if (!d || d.email !== user?.email || d.status !== 'Awaiting Payment' || !String(d.method).includes('(Auto)')) return false;
              if (hiddenInvoices.includes(d.id)) return false; 
              
              const invoiceTime = new Date(d.date).getTime();
              if (Date.now() - invoiceTime > 3600000) return false; 
              return true;
          });
          
          const [depositAmountUsd, setDepositAmountUsd] = useState('');
          const [cryptoAmountInput, setCryptoAmountInput] = useState(''); 
          
          const validCryptoOptions = cryptoSettings && cryptoSettings.length > 0 ? cryptoSettings : [{id: 1, name: 'USDT', network: 'TRC20', address: 'TELRyMwDmdKzBRb7Uaw3zNvphrc8V3D5Mj'}];
          const [cryptoMethod, setCryptoMethod] = useState(validCryptoOptions[0].name);
          
          const activeCryptoMethodName = pendingCrypto ? String(pendingCrypto.method).split(' ')[0] : cryptoMethod;
          const activeCryptoObj = validCryptoOptions.find(c => c.name === activeCryptoMethodName) || validCryptoOptions[0];
          
          const [timeLeft, setTimeLeft] = useState(3600);

          // 🟢 MANUAL DEPOSIT STATE 🟢
          const [manualAmount, setManualAmount] = useState('');
          const [manualMethod, setManualMethod] = useState('Local Bank Transfer');
          const [manualTxId, setManualTxId] = useState('');

          // 🟢 AUTO-PAY POLLING LOGIC (SURVIVES PAGE RELOADS) 🟢
          useEffect(() => {
              if (!pendingCrypto) return;
              
              const invoiceTime = new Date(pendingCrypto.date).getTime();
              
              const calcTimeLeft = () => {
                  let diff = 3600 - Math.floor((Date.now() - invoiceTime) / 1000);
                  return diff > 0 ? diff : 0;
              };
              setTimeLeft(calcTimeLeft());

              // Countdown Timer
              const timer = setInterval(() => {
                  const rem = calcTimeLeft();
                  if (rem <= 0) {
                      clearInterval(timer);
                      setHiddenInvoices(prev => {
                          const newArr = [...prev, pendingCrypto.id];
                          localStorage.setItem(`hiddenInvoices_${user?.email}`, JSON.stringify(newArr));
                          return newArr;
                      });
                      triggerToast('Payment session expired.');
                  } else {
                      setTimeLeft(rem);
                  }
              }, 1000);

              // Server Polling Timer - 🟢 SUPER FAST: 5 SECONDS 🟢
              const poll = setInterval(async () => {
                  try {
                      const token = await getAuthToken();
                      const response = await fetch('https://voicestore-backend.onrender.com/api/verify-deposit', {
                          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                          body: JSON.stringify({ invoiceId: pendingCrypto.id, amount: pendingCrypto.amount, method: pendingCrypto.method, cryptoAmount: pendingCrypto.cryptoAmount })
                      });
                      const result = await response.json();
                      if (result.success) {
                          triggerToast(`Payment Verified! $${pendingCrypto.amount} added.`);
                          addNotification('Deposit Successful', `$${pendingCrypto.amount} added to balance.`);
                      }
                  } catch (err) {}
              }, 5000);

              return () => { clearInterval(timer); clearInterval(poll); };
          }, [pendingCrypto?.id, user]); 

          const startAutoDeposit = async (e) => {
              e.preventDefault();
              if (isGenerating) return; // 🟢 GLITCH FIX
              if (pendingCrypto) { triggerToast('You already have an active invoice.'); return; }
              const baseAmount = parseFloat(cryptoAmountInput);
              if (isNaN(baseAmount) || baseAmount < 1) { triggerToast('Minimum deposit is $1.00'); return; }
              
              setIsGenerating(true); // 🟢 GLITCH FIX
              const uniqueCents = (Math.floor(Math.random() * 9) + 1) / 100; 
              const finalAmount = +(baseAmount + uniqueCents).toFixed(2);
              
              const newInvoiceId = 'DEP-' + Date.now();
              let cryptoAmount = finalAmount;
              const cmName = String(cryptoMethod).toUpperCase();
              
              try {
                  // 🟢 LIVE CONVERSION LOGIC BEFORE DB SAVE 🟢
                  if (!cmName.includes('USDT')) {
                      try {
                          let cid = 'bitcoin';
                          if (cmName.includes('TRX')) cid = 'tron';
                          if (cmName.includes('ETH')) cid = 'ethereum';
                          if (cmName.includes('LTC')) cid = 'litecoin';
                          
                          const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cid}&vs_currencies=usd`);
                          const data = await res.json();
                          const rate = data[cid]?.usd;
                          if (rate) {
                               if (cmName.includes('BTC')) cryptoAmount = parseFloat((finalAmount / rate).toFixed(8));
                               else if (cmName.includes('ETH')) cryptoAmount = parseFloat((finalAmount / rate).toFixed(6));
                               else if (cmName.includes('LTC')) cryptoAmount = parseFloat((finalAmount / rate).toFixed(5));
                               else cryptoAmount = parseFloat((finalAmount / rate).toFixed(2));
                          } else { throw new Error('no rate'); }
                      } catch(e) {
                           // Fallback to state
                           if (cmName.includes('BTC') && liveRates.BTC) cryptoAmount = parseFloat((finalAmount / liveRates.BTC).toFixed(8));
                           else if (cmName.includes('TRX') && liveRates.TRX) cryptoAmount = parseFloat((finalAmount / liveRates.TRX).toFixed(2));
                           else if (cmName.includes('ETH') && liveRates.ETH) cryptoAmount = parseFloat((finalAmount / liveRates.ETH).toFixed(6));
                           else if (cmName.includes('LTC') && liveRates.LTC) cryptoAmount = parseFloat((finalAmount / liveRates.LTC).toFixed(5));
                      }
                  }

                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', newInvoiceId), {
