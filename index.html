        // ==========================================
        // CART MODAL
        // ==========================================
        function CartModal({ cart, setCart, setShowCart, balance, user, promoSettings, triggerToast, addNotification, db, appId, uiCard, uiBtnPrimary, uiInnerPanel }) {
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
            const discountAmount = promoSettings?.isActive ? (totalAmount * (promoSettings.discount / 100)) : 0;
            const finalAmount = totalAmount - discountAmount;

            const handleCheckout = async () => {
                if (balance < finalAmount) { triggerToast("Insufficient balance. Add funds."); return; }
                setIsCheckingOut(true);
                let serverWakeTimer = setTimeout(() => { triggerToast("Please wait..."); }, 4000);
                try {
                    const token = await getAuthToken();
                    const response = await fetch('https://voicestore-backend.onrender.com/api/checkout', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, cart: cart })
                    });
                    clearTimeout(serverWakeTimer);
                    if (!response.ok) throw new Error("Network error");
                    const result = await response.json();
                    if (result.success) {
                        triggerToast(`Successfully purchased ${cart.length} item(s).`);
                        addNotification("Purchase Success", `You bought ${cart.length} item(s).`);
                        setCart([]); setShowCart(false);
                    } else triggerToast("Error: " + result.message);
                } catch(e) { clearTimeout(serverWakeTimer); triggerToast("Purchase failed. Try again."); } 
                finally { setIsCheckingOut(false); }
            };

            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-[#0a0a0a]/90 backdrop-blur-sm animate-fade-in-up">
                    <div className="bg-[#121212] border border-[#2a2a2a] shadow-[0_20px_50px_rgba(0,0,0,0.8)] rounded-2xl w-full max-w-md p-6 sm:p-8 animate-pop-in">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-[#1a1a1a]">
                            <h3 className="text-sm font-light tracking-[0.2em] text-white flex items-center gap-2 uppercase"><ShoppingCart className="w-4 h-4 text-brand-primary"/> Your Cart</h3>
                            <button onClick={() => setShowCart(false)} className="btn-animate p-2 bg-[#0a0a0a] hover:bg-[#1a1a1a] rounded-full text-gray-500 transition-colors border border-[#2a2a2a]"><X className="w-3.5 h-3.5" /></button>
                        </div>
                        {cart.length === 0 ? (
                            <div className="text-center py-16 text-gray-600 flex flex-col items-center">
                                <ShoppingCart className="w-10 h-10 mb-4 opacity-20" strokeWidth={1} />
                                <p className="font-mono text-[10px] uppercase tracking-widest">Cart is empty.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="max-h-60 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 bg-[#0a0a0a] border border-[#1a1a1a] rounded-xl group hover:border-[#2a2a2a] transition-colors animate-scale-up" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">
                                                    {item.name}
                                                </span>
                                                {item.selectedState && item.selectedState !== 'Random' && (
                                                    <span className="text-[9px] text-brand-primary mt-1 font-mono uppercase">State: {item.selectedState}</span>
                                                )}
                                            </div>
                                            <div className="flex items-center gap-5">
                                                <span className="text-sm font-mono text-brand-primary">${item.price.toFixed(2)}</span>
                                                <button onClick={() => setCart(cart.filter((_, i) => i !== idx))} className="btn-animate text-gray-600 hover:text-red-500 transition-colors"><Trash2 className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="border-t border-[#1a1a1a] pt-5 space-y-3">
                                    <div className="flex justify-between text-xs text-gray-500 font-mono uppercase tracking-widest"><span>Subtotal:</span><span>${totalAmount.toFixed(2)}</span></div>
                                    {promoSettings?.isActive && discountAmount > 0 && <div className="flex justify-between text-xs text-brand-primary font-mono uppercase tracking-widest"><span>Discount ({promoSettings.discount}%):</span><span>-${discountAmount.toFixed(2)}</span></div>}
                                    <div className="flex justify-between text-xl font-light font-mono text-white pt-4 border-t border-[#1a1a1a]"><span>Total:</span><span className="text-brand-primary drop-shadow-[0_0_10px_rgba(212,175,55,0.3)]">${finalAmount.toFixed(2)}</span></div>
                                </div>
                                <button onClick={handleCheckout} disabled={isCheckingOut || balance < finalAmount} className={uiBtnPrimary + " mt-6 !py-4"}>
                                    {isCheckingOut ? 'Processing...' : (balance < finalAmount ? 'Not Enough Balance' : 'Confirm Purchase')}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // ADMIN DASHBOARD
        // ==========================================
        function AdminDashboard({ inventory, orders, deposits, categories, usersDB, db, appId, promoSettings, globalNotice, tickets, featureSettings, bankSettings, smsSettings, activeChats, auth, user, uiCard, uiInput, uiBtnPrimary, uiBtnSecondary, uiBtnAction, uiInnerPanel, triggerToast, activeTab, setActiveTab }) {
          const [uploadCategory, setUploadCategory] = useState('new');
          const [uploadText, setUploadText] = useState('');
          const [customerSearch, setCustomerSearch] = useState('');

          const [promoInput, setPromoInput] = useState('');
          const [discountInput, setDiscountInput] = useState(0);
          const [promoActive, setPromoActive] = useState(false);
          const [noticeInput, setNoticeInput] = useState('');
          const [nairaRateInput, setNairaRateInput] = useState(1500);
          
          const [flutterwaveKeyInput, setFlutterwaveKeyInput] = useState('');
          const [flutterwaveActiveInput, setFlutterwaveActiveInput] = useState(false);
          
          const [dailyRewardActive, setDailyRewardActive] = useState(false);
          const [referralActive, setReferralActive] = useState(false);

          const [smsMarkupInput, setSmsMarkupInput] = useState(1.00);
          const [smsActiveInput, setSmsActiveInput] = useState(true);

          const [editUserModal, setEditUserModal] = useState({ show: false, email: '', password: '', balance: 0, totalSpent: 0 });
          
          // 🟢 PRODUCT MANAGEMENT STATES 🟢
          const [manageStockModal, setManageStockModal] = useState({ show: false, categoryId: null });
          const [newProductModal, setNewProductModal] = useState(false);
          const [newProduct, setNewProduct] = useState({ id: '', name: '', description: '', price: 5.00 });

          // Chat Management State
          const [selectedChatUser, setSelectedChatUser] = useState(null);
          const [adminChatMessage, setAdminChatMessage] = useState('');
          const [adminChatMessages, setAdminChatMessages] = useState([]);
          const adminMessagesEndRef = useRef(null);

          // 🟢 ADD NEW PRODUCT LOGIC 🟢
          const handleAddProduct = async (e) => {
              e.preventDefault();
              if (!newProduct.id || !newProduct.name) return;
              
              const safeNewProduct = {
                  id: newProduct.id.toLowerCase().replace(/[^a-z0-9]/g, '_'),
                  name: newProduct.name,
                  description: newProduct.description,
                  price: Number(newProduct.price),
                  color: 'text-brand-primary'
              };

              const updatedCategories = [...categories, safeNewProduct];
              
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), { list: updatedCategories });
                  triggerToast('New card added successfully.');
                  setNewProductModal(false);
                  setNewProduct({ id: '', name: '', description: '', price: 5.00 });
              } catch (err) { triggerToast('Failed to add card.'); }
          };

          // 🟢 REMOVE PRODUCT LOGIC 🟢
          const handleRemoveProduct = async (productId) => {
              if (!window.confirm("Are you sure you want to permanently remove this card?")) return;
              const updatedCategories = categories.filter(c => c.id !== productId);
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), { list: updatedCategories });
                  triggerToast('Card removed.');
              } catch (err) { triggerToast('Failed to remove.'); }
          };

          const handleDeleteAccount = async (categoryId, accountIndex) => {
            if (!window.confirm("Delete this account?")) return;
            try {
              const newInv = { ...inventory };
              newInv[categoryId].splice(accountIndex, 1);
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), newInv);
              triggerToast('Account deleted.');
            } catch (err) { triggerToast('Failed to delete.'); }
          };

          useEffect(() => {
            if (promoSettings) { setPromoInput(promoSettings.code || ''); setDiscountInput(promoSettings.discount || 0); setPromoActive(promoSettings.isActive || false); }
            if (globalNotice) setNoticeInput(globalNotice);
            if (featureSettings) { setDailyRewardActive(featureSettings.dailyReward || false); setReferralActive(featureSettings.referral || false); }
            if (bankSettings) { 
                setNairaRateInput(bankSettings.nairaRate || 1500); 
                setFlutterwaveKeyInput(bankSettings.flutterwaveKey || '');
                setFlutterwaveActiveInput(bankSettings.flutterwaveActive || false);
            }
            if (smsSettings) {
                setSmsMarkupInput(smsSettings.markup !== undefined ? smsSettings.markup : 1.00);
                setSmsActiveInput(smsSettings.active ?? true);
            }
          }, [promoSettings, globalNotice, featureSettings, bankSettings, smsSettings]);

          // Fetch messages for selected user in Admin
          useEffect(() => {
              if (!selectedChatUser) return;
              
              const q = query(
                  collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', selectedChatUser, 'messages'),
                  orderBy('timestamp', 'asc')
              );
              
              const unsubscribe = onSnapshot(q, (snapshot) => {
                  const msgs = [];
                  snapshot.forEach(doc => {
                      msgs.push({ id: doc.id, ...doc.data() });
                  });
                  setAdminChatMessages(msgs);
                  
                  // Mark as read when admin opens it
                  updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', selectedChatUser), {
                      unreadByAdmin: false
                  }).catch(e => {});

                  setTimeout(() => {
                      adminMessagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
                  }, 100);
              });
              
              return () => unsubscribe();
          }, [selectedChatUser, db, appId]);

          const sendAdminMessage = async (e) => {
              e.preventDefault();
              if (!adminChatMessage.trim() || !selectedChatUser) return;
              
              const msgText = adminChatMessage;
              setAdminChatMessage(''); 
              
              try {
                  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', selectedChatUser, 'messages'), {
                      text: msgText,
                      sender: 'admin',
                      timestamp: serverTimestamp(),
                      email: 'Admin'
                  });
                  
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', selectedChatUser), {
                      lastMessage: msgText,
                      lastMessageTime: serverTimestamp(),
                      unreadByAdmin: false 
                  }, { merge: true });
                  
              } catch(err) {}
          };

          // 🟢 FIXED: Navigate and pre-select chat safely 🟢
          const startTicketChat = (userEmail) => {
              if (userEmail) {
                  setSelectedChatUser(userEmail);
              }
          };

          const pendingDeposits = deposits.filter(d => d.status === 'Pending' || d.status === 'Verifying...' || d.status === 'Pending Review' || d.status === 'Awaiting Payment');
          const pendingTickets = (tickets || []).filter(t => t.status === 'Open');
          const totalSales = orders.filter(o => o.status === 'Completed').reduce((sum, order) => sum + Number(order.total || 0), 0);
          
          const filteredUsers = Object.keys(usersDB).filter(email => email.toLowerCase().includes(customerSearch.toLowerCase()));

          const handleUploadAccounts = async (e) => {
            e.preventDefault(); if (!uploadText.trim()) return;
            const rawText = uploadText.trim(); let validAccounts = [];
            
            if (uploadCategory === 'textplus' || rawText.includes('Email\n') || rawText.includes('Email\r\n')) {
                validAccounts = rawText.split(/(?=^Email\s*\n)/gm).filter(b => b.trim().length > 5).map(b => b.trim());
            } else if (rawText.includes('💌 EMAIL:')) {
                validAccounts = rawText.split(/(?=💌 EMAIL:)/g).filter(b => b.trim().length > 5).map(b => b.trim());
            } else {
                validAccounts = rawText.split(/\n\s*\n/).map(a => a.trim()).filter(a => a.length > 5);
                if(validAccounts.length === 0) validAccounts = rawText.split(/\n/).map(a => a.trim()).filter(a => a.length > 5);
            }

            if (validAccounts.length === 0) { triggerToast("Format error."); return; }

            try {
              const newInv = { ...inventory };
              if (!newInv[uploadCategory]) newInv[uploadCategory] = [];
              newInv[uploadCategory] = [...newInv[uploadCategory], ...validAccounts];
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), newInv);
              setUploadText(''); triggerToast(`Added ${validAccounts.length} accounts.`);
            } catch (err) { triggerToast("Upload failed."); }
          };

          const submitEditUser = async (e) => {
            e.preventDefault();
            try {
              const token = await getAuthToken();
              const res = await fetch('https://voicestore-backend.onrender.com/api/admin/update-user', {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ userEmail: editUserModal.email, newBalance: editUserModal.balance, newTotalSpent: editUserModal.totalSpent, newPassword: editUserModal.password })
              });
              if(res.ok) { triggerToast('User saved.'); setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 }); } 
              else { triggerToast('Update failed.'); }
            } catch (err) { triggerToast('Network error.'); }
          };

          const sendResetLinkToUser = async (userEmail) => {
              try { await sendPasswordResetEmail(auth, userEmail); triggerToast(`Link sent to ${userEmail}`); } 
              catch (err) { triggerToast('Failed to send.'); }
          };

          const handleManualApprove = async (depId) => {
            const dep = deposits.find(d => d.id === depId);
            if(!dep) return;
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', depId), { status: 'Approved' });
              const currentBal = Number(usersDB[dep.email]?.balance || 0);
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', dep.email), { balance: currentBal + Number(dep.amount || 0) });
              triggerToast("Approved.");
            } catch (err) { triggerToast("Failed."); }
          };

          const handleResolveTicket = async (ticketId) => {
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', ticketId), { status: 'Resolved' }); triggerToast('Ticket closed.'); } 
            catch(err) { triggerToast('Failed to close.'); }
          };

          const handleSaveSettings = async (e) => {
            e.preventDefault();
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'PromoCode'), { code: String(promoInput).toUpperCase(), discount: parseFloat(discountInput), isActive: promoActive });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Notice'), { text: noticeInput });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Features'), { dailyReward: dailyRewardActive, referral: referralActive });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'SMS'), { markup: parseFloat(smsMarkupInput), active: smsActiveInput });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Bank'), { 
                  nairaRate: parseFloat(nairaRateInput) || 1500, flutterwaveKey: flutterwaveKeyInput, flutterwaveActive: flutterwaveActiveInput
              });
              triggerToast("Settings saved.");
            } catch (error) { triggerToast("Error saving."); }
          };

          return (
            <>
              {editUserModal.show && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-[#0a0a0a]/90 backdrop-blur-sm animate-pop-in">
                  <div className="bg-[#121212] border border-[#2a2a2a] w-full max-w-md p-8 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                     <div className="flex justify-between items-center mb-6 pb-4 border-b border-[#1a1a1a]">
                         <h3 className="text-sm font-light uppercase tracking-[0.2em] text-white flex items-center gap-2"><Edit className="w-4 h-4 text-brand-primary"/> Edit User</h3>
                         <button onClick={() => setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 })} className="btn-animate p-2 bg-[#0a0a0a] rounded-full text-gray-500 hover:text-white border border-[#2a2a2a]"><X className="w-3.5 h-3.5" /></button>
                     </div>
                     <p className="text-[10px] text-gray-400 font-mono mb-6 bg-[#0a0a0a] border border-[#1a1a1a] p-3 rounded-lg truncate shadow-inner tracking-widest">{editUserModal.email}</p>
                     
                     <form onSubmit={submitEditUser} className="space-y-5">
                        <div>
                           <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Password</label>
                           <input type="text" value={editUserModal.password} onChange={e => setEditUserModal({...editUserModal, password: e.target.value})} className={uiInput + " bg-[#0a0a0a] font-mono text-xs"} />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Balance ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.balance} onChange={e => setEditUserModal({...editUserModal, balance: e.target.value})} className={uiInput + " bg-[#0a0a0a] font-mono"} />
                            </div>
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Total Spent ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.totalSpent} onChange={e => setEditUserModal({...editUserModal, totalSpent: e.target.value})} className={uiInput + " bg-[#0a0a0a] font-mono"} />
                            </div>
                        </div>
                        <div className="pt-6 mt-4 border-t border-[#1a1a1a]">
                          <button type="submit" className={uiBtnPrimary}>Save Changes</button>
                        </div>
                     </form>
                  </div>
                </div>
              )}

              {/* 🟢 NEW PRODUCT MODAL 🟢 */}
              {newProductModal && (
                  <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-[#0a0a0a]/90 backdrop-blur-sm animate-pop-in">
                    <div className="bg-[#121212] border border-[#2a2a2a] w-full max-w-md p-8 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                       <div className="flex justify-between items-center mb-6 pb-4 border-b border-[#1a1a1a]">
                           <h3 className="text-sm font-light uppercase tracking-[0.2em] text-white flex items-center gap-2"><Plus className="w-4 h-4 text-brand-primary"/> Create New Card</h3>
                           <button onClick={() => setNewProductModal(false)} className="btn-animate p-2 bg-[#0a0a0a] rounded-full text-gray-500 hover:text-white border border-[#2a2a2a]"><X className="w-3.5 h-3.5" /></button>
                       </div>
                       
                       <form onSubmit={handleAddProduct} className="space-y-4">
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Card ID (e.g. facebook_acc)</label>
                             <input type="text" required value={newProduct.id} onChange={e => setNewProduct({...newProduct, id: e.target.value})} className={uiInput + " bg-[#0a0a0a] text-xs"} />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Display Name</label>
                             <input type="text" required value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className={uiInput + " bg-[#0a0a0a] text-xs"} />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Description</label>
                             <input type="text" required value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} className={uiInput + " bg-[#0a0a0a] text-xs"} />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Price ($)</label>
                             <input type="number" step="0.01" required value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className={uiInput + " bg-[#0a0a0a] text-xs font-mono"} />
                          </div>
                          <div className="pt-4 mt-2 border-t border-[#1a1a1a]">
                            <button type="submit" className={uiBtnPrimary}>Create Card</button>
                          </div>
                       </form>
                    </div>
                  </div>
              )}

              <div className="flex-grow w-full min-w-0 mt-2 sm:mt-4 animate-fade-in-up">
                {activeTab === 'inventory' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8 w-full">
                    <div className={uiCard + " p-6 sm:p-8 h-fit lg:col-span-1 border-t-[1px] border-t-brand-primary/30"}>
                      <h2 className="text-sm font-light uppercase tracking-[0.2em] mb-6 text-white border-b border-[#2a2a2a] pb-4">Add Stock</h2>
                      <form onSubmit={handleUploadAccounts} className="flex flex-col space-y-5">
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Select Type</label>
                          <select value={uploadCategory} onChange={(e) => setUploadCategory(e.target.value)} className={uiInput + " bg-[#0a0a0a]"}>
                            {categories.map(cat => <option key={cat.id} value={cat.id} className="bg-[#121212]">{cat.name}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Accounts Data</label>
                          <textarea value={uploadText} onChange={(e) => setUploadText(e.target.value)} placeholder="Paste accounts here..." className={uiInput + " bg-[#0a0a0a] min-h-[200px] resize-none font-mono text-[10px] text-gray-400"} required />
                        </div>
                        <button type="submit" className={uiBtnSecondary}>Upload</button>
                      </form>
                    </div>

                    <div className="lg:col-span-2 space-y-6 sm:space-y-8 w-full">
                      <div className={uiCard}>
                        <div className="p-5 sm:p-6 border-b border-[#2a2a2a] bg-[#0a0a0a]"><h2 className="text-sm font-light tracking-[0.2em] uppercase text-white">Available Stock</h2></div>
                        <div className="w-full overflow-x-auto bg-[#121212]">
                          <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-[#0a0a0a] text-gray-500 font-bold border-b border-[#1a1a1a] text-[10px] uppercase tracking-[0.2em]">
                              <tr><th className="p-4 sm:p-5">Name</th><th className="p-4 sm:p-5 text-center">Amount</th><th className="p-4 sm:p-5 text-right">Action</th></tr>
                            </thead>
                            <tbody className="divide-y divide-[#1a1a1a]">
                              {categories.map((cat, idx) => (
                                <tr key={cat.id} className="hover:bg-[#0a0a0a] transition-colors animate-scale-up" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                  <td className="p-4 sm:p-5">
                                    <p className="text-gray-200 font-bold text-xs uppercase tracking-wide">{cat.name}</p>
                                    <p className="text-[10px] font-mono text-brand-primary mt-1">${Number(cat.price).toFixed(2)}</p>
                                  </td>
                                  <td className="p-4 sm:p-5 text-center font-mono font-light text-xl text-white">{inventory[cat.id] ? inventory[cat.id].length : 0}</td>
                                  <td className="p-4 sm:p-5 text-right">
                                      <button onClick={() => setManageStockModal({ show: true, categoryId: cat.id })} className="btn-animate bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-300 border border-[#2a2a2a] px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all ml-auto">View</button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {manageStockModal.show && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#0a0a0a]/90 backdrop-blur-md animate-pop-in">
                    <div className="bg-[#121212] border border-[#2a2a2a] w-full max-w-3xl p-6 sm:p-8 flex flex-col max-h-[85vh] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                       <div className="flex justify-between items-center mb-6 pb-4 border-b border-[#1a1a1a] shrink-0">
                         <h3 className="text-sm font-light tracking-[0.2em] uppercase text-white flex items-center gap-2"><Package className="w-4 h-4 text-brand-primary"/> View Stock</h3>
                         <button onClick={() => setManageStockModal({ show: false, categoryId: null })} className="btn-animate p-2 bg-[#0a0a0a] rounded-full text-gray-500 hover:text-white border border-[#2a2a2a]"><X className="w-4 h-4" /></button>
                       </div>
                       <div className="overflow-y-auto flex-grow pr-2 custom-scrollbar space-y-3 w-full">
                          {(!inventory[manageStockModal.categoryId] || inventory[manageStockModal.categoryId].length === 0) ? (
                              <p className="text-center text-gray-600 font-mono text-xs uppercase tracking-widest py-20">Stock is empty.</p>
                          ) : (
                              inventory[manageStockModal.categoryId].map((acc, index) => (
                                  <div key={index} className="flex justify-between items-center w-full p-4 bg-[#0a0a0a] border border-[#1a1a1a] rounded-xl hover:border-[#2a2a2a] transition-colors">
                                      <pre className="text-[10px] text-gray-400 font-mono leading-relaxed truncate max-w-[80%]">{acc}</pre>
                                      <button onClick={() => handleDeleteAccount(manageStockModal.categoryId, index)} className="btn-animate p-2.5 bg-red-900/10 text-red-500 hover:bg-red-900/20 border border-red-900/30 rounded-lg shrink-0 transition-colors">
                                          <Trash2 className="w-4 h-4" />
                                      </button>
                                  </div>
                              ))
                          )}
                       </div>
                    </div>
                  </div>
                )}

                {activeTab === 'users' && (
                  <div className={uiCard + " w-full"}>
                    <div className="p-5 sm:p-6 border-b border-[#2a2a2a] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-[#0a0a0a]">
                      <h2 className="text-sm font-light tracking-[0.2em] uppercase text-white">All Users</h2>
                      <div className="flex items-center gap-3 w-full sm:w-auto">
                        <div className="relative flex-grow sm:flex-grow-0 sm:w-64">
                           <Search className="w-4 h-4 text-gray-500 absolute left-3 top-3" />
                           <input type="text" placeholder="Search email..." value={customerSearch} onChange={(e)=>setCustomerSearch(e.target.value)} className={uiInput + " !py-2 !pl-9 bg-[#121212] border-[#2a2a2a] text-xs font-mono"} />
                        </div>
                        <span className="text-[10px] font-mono font-bold text-brand-primary bg-[#121212] border border-[#2a2a2a] px-3 py-2 rounded-lg uppercase tracking-widest">{filteredUsers.length} Users</span>
                      </div>
                    </div>
                    <div className="overflow-x-auto w-full bg-[#121212]">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-[#0a0a0a] text-gray-500 font-bold border-b border-[#1a1a1a] text-[10px] uppercase tracking-[0.2em]">
                          <tr><th className="p-4 sm:p-5">User</th><th className="p-4 sm:p-5">Spent</th><th className="p-4 sm:p-5">Balance</th><th className="p-4 sm:p-5 text-right">Action</th></tr>
                        </thead>
                        <tbody className="divide-y divide-[#1a1a1a]">
                          {filteredUsers.map((email, idx) => (
                            <tr key={email} className="hover:bg-[#0a0a0a] transition-colors animate-scale-up" style={{animationDelay: `${idx * 0.03}s`, opacity: 0, animationFillMode: 'forwards'}}>
                              <td className="p-4 sm:p-5">
                                  <p className="text-gray-200 font-medium text-xs tracking-wide">{String(email)}</p>
                                  <p className="text-[9px] text-gray-600 mt-1.5 font-mono uppercase tracking-widest">Pass: {usersDB[email].password || 'Hidden'}</p>
                              </td>
                              <td className="p-4 sm:p-5 font-mono text-gray-400">${Number(usersDB[email].totalSpent || 0).toFixed(2)}</td>
                              <td className="p-4 sm:p-5 font-mono font-light text-brand-primary">${Number(usersDB[email].balance || 0).toFixed(2)}</td>
                              <td className="p-4 sm:p-5 text-right">
                                <button onClick={() => setEditUserModal({ show: true, email: email, password: usersDB[email].password || '', balance: usersDB[email].balance || 0, totalSpent: usersDB[email].totalSpent || 0 })} className="btn-animate bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-300 border border-[#2a2a2a] px-4 py-2 rounded-lg text-[10px] uppercase tracking-widest font-bold transition-all ml-auto flex items-center gap-2"><Edit className="w-3 h-3"/> Edit</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      {filteredUsers.length === 0 && <p className="text-center py-16 text-gray-600 font-mono text-xs uppercase tracking-widest">No users found.</p>}
                    </div>
                  </div>
                )}

                {activeTab === 'support' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
                    {/* Left Column: Tickets */}
                    <div className={uiCard + " flex flex-col w-full h-[600px] border-t-[1px] border-t-brand-primary/10"}>
                      <div className="p-5 sm:p-6 border-b border-[#2a2a2a] flex items-center justify-between bg-[#0a0a0a]">
                         <h2 className="text-sm font-light tracking-[0.2em] uppercase text-white">Support Tickets</h2>
                      </div>
                      <div className="overflow-y-auto w-full bg-[#121212] flex-grow p-4 space-y-4 custom-scrollbar">
                        {(tickets||[]).map((t, idx) => (
                          <div key={t.id} className="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl animate-scale-up" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                            <div className="flex justify-between items-start mb-3">
                              <div>
                                <p className="text-gray-300 font-medium text-xs mb-1">{String(t.email || 'Unknown')}</p>
                                <span className="font-bold text-[10px] text-brand-primary uppercase tracking-wide">{t.subject}</span>
                              </div>
                              <div className="flex flex-col items-end gap-2">
                                  <span className={`text-[8px] px-2 py-1 rounded border uppercase tracking-[0.2em] font-bold ${t.status === 'Open' ? 'bg-red-900/10 text-red-500 border-red-900/30' : 'bg-emerald-900/10 text-emerald-500 border-emerald-900/30'}`}>{t.status}</span>
                                  {t.status === 'Open' && (
                                    <div className="flex gap-2 mt-1">
                                        <button onClick={() => startTicketChat(t.email)} className="btn-animate text-[9px] text-brand-primary hover:text-white transition-colors underline flex items-center gap-1"><MessageCircle className="w-2.5 h-2.5"/> Reply</button>
                                        <button onClick={async () => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', t.id), { status: 'Resolved' }); triggerToast('Ticket marked resolved.'); }} className="btn-animate text-[9px] text-gray-500 hover:text-white transition-colors underline ml-2">Resolve</button>
                                    </div>
                                  )}
                              </div>
                            </div>
                            <div className="bg-[#121212] p-3 rounded-lg mb-3">
                              <p className="text-xs text-gray-400 font-light leading-relaxed break-words">{t.message}</p>
                            </div>
                            <p className="text-[9px] text-gray-600 font-mono flex items-center gap-1.5 uppercase tracking-widest"><Clock className="w-3 h-3"/> {new Date(t.date).toLocaleString()}</p>
                          </div>
                        ))}
                        {tickets.length === 0 && <p className="text-center text-gray-600 py-10 text-xs font-mono uppercase tracking-widest">No tickets.</p>}
                      </div>
                    </div>

                    {/* Right Column: Live Chats Dashboard */}
                    <div id="admin-chat-section" className={uiCard + " flex flex-col w-full h-[600px] border-t-[1px] border-t-brand-primary/30"}>
                      <div className="p-5 sm:p-6 border-b border-[#2a2a2a] flex items-center justify-between bg-[#0a0a0a]">
                         <h2 className="text-sm font-light tracking-[0.2em] uppercase text-brand-primary flex items-center gap-2"><MessageSquare className="w-4 h-4"/> Live Chats</h2>
                         {activeChats.filter(c => c.unreadByAdmin).length > 0 && <span className="bg-red-500 text-white px-2 py-1 rounded-full text-[9px] font-bold animate-pulse">{activeChats.filter(c => c.unreadByAdmin).length} New</span>}
                      </div>
                      
                      <div className="flex flex-grow overflow-hidden bg-[#121212]">
                          {/* User List Sidebar */}
                          <div className="w-1/3 border-r border-[#2a2a2a] overflow-y-auto custom-scrollbar bg-[#0a0a0a]">
                              {activeChats.length === 0 ? <p className="text-[10px] text-center p-4 text-gray-600">No active chats</p> : 
                                  activeChats.map((chat, idx) => (
                                      <div key={chat.id} onClick={() => setSelectedChatUser(chat.userEmail)} className={`p-4 cursor-pointer border-b border-[#1a1a1a] transition-all hover:bg-[#121212] animate-slide-in-right ${selectedChatUser === chat.userEmail ? 'bg-[#121212] border-l-2 border-l-brand-primary' : ''}`} style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                          <p className="text-[10px] font-bold text-gray-300 truncate w-full mb-1 flex items-center gap-1">
                                              {chat.unreadByAdmin && <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>}
                                              {String(chat.userEmail || chat.id || 'User').split('@')[0]}
                                          </p>
                                          <p className="text-[9px] text-gray-500 truncate w-full font-light">{chat.lastMessage}</p>
                                      </div>
                                  ))
                              }
                          </div>
                          
                          {/* Chat Area */}
                          <div className="w-2/3 flex flex-col relative">
                              {selectedChatUser ? (
                                  <>
                                      <div className="bg-[#1a1a1a] p-3 text-[10px] font-bold text-gray-300 border-b border-[#2a2a2a] flex justify-between items-center animate-fade-in-up">
                                          <span className="truncate">{selectedChatUser}</span>
                                          <button onClick={() => setSelectedChatUser(null)} className="btn-animate text-gray-500 hover:text-white"><X className="w-3 h-3"/></button>
                                      </div>
                                      <div className="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                          {adminChatMessages.map(msg => (
                                              <div key={msg.id} className={`flex flex-col animate-scale-up ${msg.sender === 'admin' ? 'items-end' : 'items-start'}`}>
                                                  <div className={`px-3 py-2 rounded-xl max-w-[90%] text-[11px] font-medium leading-relaxed ${msg.sender === 'admin' ? 'bg-brand-primary/20 text-brand-primary border border-brand-primary/30 rounded-tr-none shadow-md' : 'bg-[#1a1a1a] text-gray-300 border border-[#2a2a2a] rounded-tl-none shadow-md'}`}>
                                                      {msg.text}
                                                  </div>
                                              </div>
                                          ))}
                                          <div ref={adminMessagesEndRef} />
                                      </div>
                                      <form onSubmit={sendAdminMessage} className="bg-[#0a0a0a] border-t border-[#2a2a2a] p-3 flex gap-2 animate-fade-in-up">
                                          <input type="text" value={adminChatMessage} onChange={e => setAdminChatMessage(e.target.value)} placeholder="Type reply..." className="flex-grow bg-[#121212] border border-[#2a2a2a] rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-brand-primary"/>
                                          <button type="submit" disabled={!adminChatMessage.trim()} className="btn-animate bg-brand-primary text-black p-2 rounded-lg hover:bg-brand-primaryHover disabled:opacity-50"><Send className="w-4 h-4"/></button>
                                      </form>
                                  </>
                              ) : (
                                  <div className="flex-grow flex flex-col items-center justify-center text-gray-600 opacity-50 animate-pulse">
                                      <MessageSquare className="w-10 h-10 mb-3" />
                                      <p className="text-[10px] font-mono uppercase tracking-widest">Select a chat</p>
                                  </div>
                              )}
                          </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'analytics' && (
                  <div className="w-full">
                    <h2 className="text-xl font-light tracking-[0.1em] uppercase mb-6 text-white pl-2 animate-slide-in-right">System Metrics</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 w-full">
                      <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/20 animate-scale-up"} style={{animationDelay: '0.1s', opacity: 0, animationFillMode: 'forwards'}}>
                        <p className="text-gray-500 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Revenue</p>
                        <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">${Number(totalSales || 0).toFixed(2)}</h3>
                      </div>
                      <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/20 animate-scale-up"} style={{animationDelay: '0.2s', opacity: 0, animationFillMode: 'forwards'}}>
                        <p className="text-gray-500 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Users</p>
                        <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{Object.keys(usersDB).length}</h3>
                      </div>
                      <div className={uiCard + " p-6 sm:p-8 border-t-[1px] border-t-brand-primary/20 animate-scale-up"} style={{animationDelay: '0.3s', opacity: 0, animationFillMode: 'forwards'}}>
                        <p className="text-gray-500 text-[10px] font-bold mb-3 uppercase tracking-[0.3em]">Total Orders</p>
                        <h3 className="text-3xl sm:text-4xl font-light font-mono text-white">{orders.length}</h3>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'deposits' && (
                  <div className={uiCard + " w-full"}>
                    <div className="p-5 sm:p-6 border-b border-[#2a2a2a] flex items-center justify-between bg-[#0a0a0a]">
                      <h2 className="text-sm font-light tracking-[0.2em] uppercase text-white">Deposits</h2>
                      {pendingDeposits.length > 0 && <span className="bg-brand-primary/10 border border-brand-primary/30 text-brand-primary px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold animate-pulse">{pendingDeposits.length} Pending</span>}
                    </div>
                    <div className="overflow-x-auto w-full bg-[#121212]">
                      <table className="w-full text-left whitespace-nowrap text-sm">
                        <thead className="bg-[#0a0a0a] text-gray-500 font-bold border-b border-[#1a1a1a] text-[10px] uppercase tracking-[0.2em]">
                          <tr><th className="p-4 sm:p-5">TxID / Date</th><th className="p-4 sm:p-5">User / Method</th><th className="p-4 sm:p-5">Amount</th><th className="p-4 sm:p-5 text-right">Status</th></tr>
                        </thead>
                        <tbody className="divide-y divide-[#1a1a1a]">
                          {deposits.map((dep, idx) => {
                            const isPending = String(dep.status || '').includes('Pending') || String(dep.status || '').includes('Awaiting');
                            return (
                              <tr key={dep.id} className="hover:bg-[#0a0a0a] transition-colors animate-scale-up" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                <td className="p-4 sm:p-5">
                                  <p className="font-mono text-gray-400 font-light text-[10px] truncate max-w-[120px]">{String(dep.id || '')}</p>
                                  <p className="text-[9px] text-gray-600 mt-1.5 font-mono uppercase tracking-widest">{dep.date ? new Date(dep.date).toLocaleString() : ''}</p>
                                </td>
                                <td className="p-4 sm:p-5">
                                  <p className="text-gray-300 font-medium text-xs">{String(dep.email || '')}</p>
                                  <p className="text-[9px] text-gray-500 mt-1.5 font-mono uppercase tracking-widest">{String(dep.method || '')}</p>
                                </td>
                                <td className="p-4 sm:p-5 font-mono font-light text-brand-primary">${Number(dep.amount || 0).toFixed(2)}</td>
                                <td className="p-4 sm:p-5 text-right">
                                  <div className="flex flex-col items-end gap-2">
                                    <span className={`text-[9px] uppercase tracking-[0.2em] font-bold ${dep.status === 'Approved' ? 'text-emerald-500' : isPending ? 'text-brand-primary' : 'text-red-500'}`}>{String(dep.status || '')}</span>
                                    {isPending && (
                                        <button onClick={() => handleManualApprove(dep.id)} className="btn-animate bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-300 border border-[#2a2a2a] px-3 py-1.5 rounded text-[9px] uppercase tracking-widest font-bold transition-all mt-1">
                                            Approve
                                        </button>
                                    )}
                                  </div>
                                </td>
                              </tr>
                            )
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
                    <div className={uiCard + " p-6 sm:p-8 w-full border-t-[1px] border-t-brand-primary/30 animate-slide-in-right"}>
                      <h2 className="text-sm font-light tracking-[0.2em] uppercase text-white mb-6 border-b border-[#2a2a2a] pb-4">General Settings</h2>
                      
                      <form onSubmit={handleSaveSettings} className="space-y-8">
                        <div className="space-y-5">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em]">SMS Markup</h3>
                           <div className="grid grid-cols-1 gap-4">
                             <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Added Profit per SMS ($)</label>
                               <input type="number" step="0.01" value={smsMarkupInput} onChange={(e) => setSmsMarkupInput(e.target.value)} placeholder="1.00" className={uiInput + " bg-[#0a0a0a] font-mono"} />
                             </div>
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl transition-colors hover:border-[#2a2a2a]">
                             <input type="checkbox" checked={smsActiveInput} onChange={(e) => setSmsActiveInput(e.target.checked)} className="w-4 h-4 rounded border-[#2a2a2a] text-brand-primary focus:ring-brand-primary bg-[#121212]" />
                             <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">Enable SMS Service</span>
                           </label>
                        </div>
                        
                        <div className="space-y-5 pt-4 border-t border-[#1a1a1a]">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em]">Bank Transfer Rate</h3>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">1 USD to NGN Rate</label>
                             <input type="number" step="0.01" value={nairaRateInput} onChange={(e) => setNairaRateInput(e.target.value)} className={uiInput + " bg-[#0a0a0a] font-mono"} />
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-[#1a1a1a]">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em]">Flutterwave (Card Payment)</h3>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl mb-4 transition-colors hover:border-[#2a2a2a]">
                             <input type="checkbox" checked={flutterwaveActiveInput} onChange={(e) => setFlutterwaveActiveInput(e.target.checked)} className="w-4 h-4 rounded border-[#2a2a2a] text-brand-primary focus:ring-brand-primary bg-[#121212]" />
                             <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">Enable Flutterwave</span>
                           </label>
                           <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Flutterwave Public Key</label>
                             <input type="text" value={flutterwaveKeyInput} onChange={(e) => setFlutterwaveKeyInput(e.target.value)} placeholder="FLWPUBK_TEST-..." className={uiInput + " bg-[#0a0a0a] font-mono text-xs"} />
                           </div>
                        </div>

                        <div className="space-y-5 pt-4 border-t border-[#1a1a1a]">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em]">Promotions & Features</h3>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Promo Code</label>
                                 <input type="text" value={promoInput} onChange={(e) => setPromoInput(e.target.value)} placeholder="DISCOUNT20" className={uiInput + " bg-[#0a0a0a] font-mono text-xs uppercase"} />
                               </div>
                               <div>
                                 <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Discount (%)</label>
                                 <input type="number" value={discountInput} onChange={(e) => setDiscountInput(e.target.value)} placeholder="10" className={uiInput + " bg-[#0a0a0a] font-mono"} />
                               </div>
                           </div>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl mb-4 transition-colors hover:border-[#2a2a2a]">
                             <input type="checkbox" checked={promoActive} onChange={(e) => setPromoActive(e.target.checked)} className="w-4 h-4 rounded border-[#2a2a2a] text-brand-primary focus:ring-brand-primary bg-[#121212]" />
                             <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">Enable Promo Code</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl mb-4 transition-colors hover:border-[#2a2a2a]">
                             <input type="checkbox" checked={dailyRewardActive} onChange={(e) => setDailyRewardActive(e.target.checked)} className="w-4 h-4 rounded border-[#2a2a2a] text-brand-primary focus:ring-brand-primary bg-[#121212]" />
                             <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">Enable Daily Reward</span>
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer mt-4 pl-1 bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl mb-4 transition-colors hover:border-[#2a2a2a]">
                             <input type="checkbox" checked={referralActive} onChange={(e) => setReferralActive(e.target.checked)} className="w-4 h-4 rounded border-[#2a2a2a] text-brand-primary focus:ring-brand-primary bg-[#121212]" />
                             <span className="text-xs font-bold text-gray-300 uppercase tracking-wider">Enable Referral System</span>
                           </label>
                        </div>
                        
                        <div className="space-y-5 pt-4 border-t border-[#1a1a1a]">
                           <h3 className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em]">Global Notice</h3>
                           <div>
                             <textarea value={noticeInput} onChange={(e) => setNoticeInput(e.target.value)} placeholder="Write a notice for all users..." rows="3" className={uiInput + " bg-[#0a0a0a] resize-none"} />
                           </div>
                        </div>

                        <div className="pt-6 border-t border-[#1a1a1a]"><button type="submit" className={uiBtnPrimary}>Save All Settings</button></div>
                      </form>
                    </div>

                    {/* 🟢 NEW PRODUCT MANAGEMENT SECTION 🟢 */}
                    <div className={uiCard + " p-6 sm:p-8 w-full border-t-[1px] border-t-brand-primary/30 h-fit animate-slide-in-right"} style={{animationDelay: '0.1s', opacity: 0, animationFillMode: 'forwards'}}>
                      <div className="flex justify-between items-center mb-6 border-b border-[#2a2a2a] pb-4">
                         <h2 className="text-sm font-light tracking-[0.2em] uppercase text-white">Manage Accounts Cards</h2>
                         <button onClick={() => setNewProductModal(true)} className="btn-animate bg-brand-primary/10 text-brand-primary border border-brand-primary/30 px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-widest font-bold hover:bg-brand-primary/20 transition-all flex items-center gap-1"><Plus className="w-3 h-3"/> New</button>
                      </div>
                      
                      <div className="space-y-4">
                          {categories.map((cat, idx) => (
                              <div key={idx} className="bg-[#0a0a0a] border border-[#1a1a1a] p-4 rounded-xl flex justify-between items-center animate-scale-up hover:border-[#2a2a2a] transition-colors" style={{animationDelay: `${idx * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                  <div>
                                      <p className="text-xs font-bold text-gray-200 uppercase tracking-wider">{cat.name}</p>
                                      <p className="text-[10px] font-mono text-brand-primary mt-1">${Number(cat.price).toFixed(2)}</p>
                                  </div>
                                  <button onClick={() => handleRemoveProduct(cat.id)} className="btn-animate p-2 bg-red-900/10 text-red-500 hover:bg-red-900/20 border border-red-900/30 rounded-lg transition-colors">
                                      <Trash2 className="w-4 h-4"/>
                                  </button>
                              </div>
                          ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
