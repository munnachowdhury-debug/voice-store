                      email: user.email, amount: amt, method: manualMethod, status: 'Pending Review', date: new Date().toISOString(), txId: manualTxId
                  });
                  triggerToast(`Deposit request sent! Admin will review shortly.`);
                  setManualAmount('');
                  setManualTxId('');
              } catch(e) {
                  triggerToast("Failed to submit request.");
              }
          }

          const handleFlutterwavePayment = async () => {
              if(!bankSettings?.flutterwaveActive || !bankSettings?.flutterwaveKey) { triggerToast("Payment gateway disabled."); return; }
              const usdAmt = parseFloat(depositAmountUsd);
              if(isNaN(usdAmt) || usdAmt < 1) { triggerToast("Minimum deposit is $1.00"); return; }
              const nairaRate = bankSettings?.nairaRate || 1500;
              const nairaAmount = usdAmt * nairaRate;
              if (typeof window.FlutterwaveCheckout !== 'undefined') {
                  window.FlutterwaveCheckout({
                      public_key: bankSettings.flutterwaveKey, tx_ref: 'FLW-' + Math.floor((Math.random() * 1000000000) + 1), amount: nairaAmount, currency: "NGN",
                      payment_options: "card, banktransfer, ussd", customer: { email: user.email },
                      customizations: { title: "VerifyHub Deposit", description: "Account Deposit ($" + usdAmt + ")" },
                      callback: async function (data) {
                          if(data.status === "successful" || data.status === "completed") {
                              try {
                                  const token = await getAuthToken();
                                  const response = await fetch('https://voicestore-backend.onrender.com/api/flutterwave-success', {
                                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                      body: JSON.stringify({ email: user.email, amount: Number(usdAmt), transactionId: String(data.transaction_id || data.tx_ref) })
                                  });
                                  const result = await response.json();
                                  if(result.success) {
                                      triggerToast(`Successfully added $${usdAmt.toFixed(2)}!`); 
                                      setDepositAmountUsd('');
                                  } else {
                                      triggerToast(result.message || 'Payment verification failed');
                                  }
                              } catch(e) {}
                          }
                      },
                      onclose: function() { triggerToast('Payment window closed.'); }
                  });
              } else { triggerToast("Payment module loading... please try again."); }
          };

          useEffect(() => {
              let interval;
              if (autoPay.active && autoPay.checking && autoPay.time > 0) {
                  interval = setInterval(async () => {
                      try {
                          const token = await getAuthToken();
                          const response = await fetch('https://voicestore-backend.onrender.com/api/verify-deposit', {
                              method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                              body: JSON.stringify({ invoiceId: autoPay.invoiceId, amount: autoPay.amount, method: `${autoPay.method} (Auto)`, cryptoAmount: autoPay.cryptoAmount })
                          });
                          const result = await response.json();
                          if (result.success) {
                              setAutoPay({ active: false, amount: 0, cryptoAmount: 0, time: 0, checking: false, invoiceId: '' }); 
                              triggerToast(`Payment Verified! $${autoPay.amount} added.`);
                              addNotification('Deposit Successful', `$${autoPay.amount} added to balance.`);
                          }
                      } catch (err) {}
                  }, 15000); 
              }
              const timer = setInterval(() => {
                  if (autoPay.active && autoPay.time > 0) { setAutoPay(prev => ({ ...prev, time: prev.time - 1 })); } 
                  else if (autoPay.active && autoPay.time <= 0 && autoPay.checking) {
                      try { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', autoPay.invoiceId), { status: 'Expired' }); } catch (e) {}
                      setAutoPay({ active: false, amount: 0, cryptoAmount: 0, time: 0, checking: false, invoiceId: '' });
                      triggerToast('Payment session expired.');
                  }
              }, 1000);
              return () => { clearInterval(interval); clearInterval(timer); };
          }, [autoPay.active, autoPay.checking, autoPay.invoiceId, autoPay.amount, autoPay.method, autoPay.cryptoAmount, addNotification]);

          const copyToClipboard = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const selectedCustomPayment = (customPayments || []).find(p => p.name === manualMethod);

          return (
            <div className="animate-fade-in-up grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full">
              <div className="space-y-6 sm:space-y-8 w-full">
                <div className="glass-effect rounded-3xl p-6 sm:p-8 h-fit border border-white/10">
                  <h2 className="text-sm font-bold tracking-widest mb-6 text-white flex items-center gap-2 uppercase">
                     <Zap className="w-4 h-4"/> Crypto Deposit
                  </h2>
                  
                  {!autoPay.active ? (
                      <div className="mt-4">
                        <form onSubmit={startAutoDeposit} className="space-y-5 w-full">
                          <div>
                            <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                            <div className="relative">
                               <DollarSign className="w-4 h-4 text-white absolute left-4 top-3.5" />
                               <input type="number" step="1" min="1" name="amount" value={cryptoAmountInput} onChange={e => setCryptoAmountInput(e.target.value)} required placeholder="10" className="glass-input pl-11 text-sm font-mono" />
                            </div>
                          </div>
                          <div>
                              <label className="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-[0.2em]">Select Crypto</label>
                              <div className="relative">
                                  <select value={cryptoMethod} onChange={e => setCryptoMethod(e.target.value)} className="glass-input cursor-pointer font-mono text-xs appearance-none">
                                      {validCryptoOptions.map((c, i) => (
                                          <option key={i} value={c.name} className="bg-[#121212]">{c.name} {c.network ? `(${c.network})` : ''}</option>
                                      ))}
                                  </select>
                                  <ChevronDown className="w-4 h-4 text-gray-500 absolute right-4 top-4 pointer-events-none"/>
                              </div>
                          </div>
                          <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 shadow-[0_5px_20px_rgba(255,255,255,0.2)] tracking-widest uppercase text-xs h-12 mt-2">Generate Invoice</button>
                        </form>
                      </div>
                  ) : (
                      <div className="bg-black/60 border border-white/10 rounded-2xl p-6 text-center space-y-6 relative overflow-hidden mt-6 animate-zoom-fade backdrop-blur-md">
                          <div className="absolute top-0 left-0 w-full h-[2px] bg-white/10">
                              <div className="h-full bg-white transition-all duration-1000 shadow-[0_0_10px_rgba(255,255,255,0.8)]" style={{ width: `${(autoPay.time / 1800) * 100}%` }}></div>
                          </div>
                          
                          <p className="text-[10px] font-mono font-bold text-white flex items-center justify-center gap-2 pt-4 uppercase tracking-[0.3em]">
                              <span className="w-1.5 h-1.5 bg-white rounded-full animate-pulse shadow-[0_0_5px_#fff]"></span> Waiting for payment
                          </p>
                          
                          <div className="text-3xl sm:text-4xl font-light font-mono text-white tracking-widest">
                              {autoPay.cryptoAmount} <span className="text-sm text-gray-400">{autoPay.method === 'BTC' ? 'BTC' : 'USDT'}</span>
                          </div>
                          
                          <div className="bg-white/5 border border-white/10 p-4 rounded-xl mt-6 shadow-inner">
                              <p className="text-[8px] text-gray-400 font-bold uppercase tracking-[0.3em] mb-2">Send To Address {activeCryptoObj.network ? `(${activeCryptoObj.network})` : ''}</p>
                              <p className="font-mono text-xs sm:text-sm text-white break-all select-all font-light tracking-wider bg-black/50 p-3 rounded-lg border border-white/5">
                                  {activeCryptoObj.address}
                              </p>
                              <button onClick={() => copyToClipboard(activeCryptoObj.address)} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2 uppercase tracking-widest shadow-md mt-4 mx-auto !text-[9px]"><Copy className="w-3.5 h-3.5" /> Copy Address</button>
                          </div>
                          
                          <div className="bg-red-900/20 p-4 rounded-xl border border-red-900/50 text-left">

                          <div className="flex justify-between items-center pt-4 border-t border-white/10 w-full">

                              <button onClick={() => setAutoPay({active: false, amount: 0, cryptoAmount: 0, time: 0, checking: false, invoiceId: ''})} className="btn-animate text-[9px] text-gray-500 hover:text-white font-bold uppercase tracking-widest bg-white/10 px-3 py-1.5 rounded-lg">Cancel</button>
                          </div>
                      </div>
                  )}

              <div className="space-y-6 sm:space-y-8 w-full">
                <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10">
                  <div className="flex justify-between items-start mb-6 pb-4 border-b border-white/10">
                     <h3 className="text-sm font-bold tracking-widest text-white flex items-center gap-2 uppercase">
                       <Building className="w-4 h-4"/> Manual Deposit

                  </div>

                  <div className="mb-6">

                      <div className="relative">
                          <select value={manualMethod} onChange={e => setManualMethod(e.target.value)} className={uiInput + " appearance-none cursor-pointer text-white font-mono text-xs bg-black/40"}>
                              <option value="Local Bank Transfer" className="bg-[#121212]">Local Bank Transfer</option>
                              {(customPayments || []).map(p => (
                                  <option key={p.id} value={p.name} className="bg-[#121212]">{p.name}</option>
                              ))}
                          </select>
                          <ChevronDown className="w-4 h-4 text-white absolute right-4 top-4 pointer-events-none" />
                      </div>
                  </div>
                  
                  {/* 🟢 DYNAMIC PAYMENT INSTRUCTIONS 🟢 */}
                  {manualMethod === 'Local Bank Transfer' ? (
                      <div className="bg-black/40 border border-white/5 rounded-xl p-4 mb-6 text-[11px] font-mono tracking-wide space-y-3 animate-slide-up-smooth">
                        <div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-gray-400">Bank</span> <span className="font-bold text-white">{bankSettings?.bankName || 'Parallex'}</span></div>
                        <div className="flex justify-between items-center border-b border-white/5 pb-2 pt-1"><span className="text-gray-400">Name</span> <span className="font-bold text-white text-right">{bankSettings?.accountName || 'Samuel Osita Emmanuel'}</span></div>
                        <div className="flex justify-between items-center border-b border-white/5 pb-2 pt-1"><span className="text-gray-400">A/C No.</span> <span className="text-white font-bold text-sm">{bankSettings?.accountNumber || '1120927346'}</span></div>
                        <div className="flex justify-between items-center pt-1"><span className="text-gray-400">Rate</span> <span className="text-brand-primary font-bold text-sm">1 USD = ₦{bankSettings?.nairaRate || 1500}</span></div>
                        <button onClick={() => copyToClipboard(bankSettings?.accountNumber || '1120927346')} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest shadow-md mt-2 !text-[10px]"><Copy className="w-3.5 h-3.5" /> Copy Details</button>
                      </div>
                  ) : selectedCustomPayment ? (
                      <div className="bg-black/40 border border-white/5 rounded-xl p-4 mb-6 text-[11px] font-mono tracking-wide space-y-3 animate-slide-up-smooth">
                        <div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-gray-400">Method</span> <span className="font-bold text-white">{selectedCustomPayment.name}</span></div>
                        <div className="flex justify-between items-center border-b border-white/5 pb-2 pt-1"><span className="text-gray-400">Details/Wallet</span> <span className="text-white font-bold text-sm break-all text-right max-w-[60%]">{selectedCustomPayment.details}</span></div>
                        <div className="flex flex-col pt-1"><span className="text-gray-400 mb-1">Instructions:</span> <span className="text-gray-300 font-light leading-relaxed">{selectedCustomPayment.instruction}</span></div>
                        <button onClick={() => copyToClipboard(selectedCustomPayment.details)} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 uppercase tracking-widest shadow-md mt-2 !text-[10px]"><Copy className="w-3.5 h-3.5" /> Copy Data</button>
                      </div>
                  ) : null}

                  {/* 🟢 DEPOSIT REQUEST FORM 🟢 */}
                  <form onSubmit={submitManualDeposit} className="space-y-4 p-4 bg-white/5 rounded-2xl border border-white/10 shadow-inner">
                      <p className="text-[10px] font-bold text-brand-primary uppercase tracking-widest mb-2 flex items-center gap-2"><CircleDollarSign className="w-3.5 h-3.5"/> Submit Deposit Request</p>
                      <div className="grid grid-cols-2 gap-4">
                          <div>
                              <label className="block text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-[0.2em]">Amount (USD)</label>
                              <div className="relative">
                                 <DollarSign className="w-3.5 h-3.5 text-white absolute left-3 top-3.5" />
                                 <input type="number" step="0.01" min="1" value={manualAmount} onChange={e => setManualAmount(e.target.value)} required placeholder="10" className="glass-input !pl-9 !py-2.5 font-mono text-xs" />
                              </div>
                          </div>
                          <div>
                              <label className="block text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-[0.2em] whitespace-nowrap overflow-hidden text-ellipsis">Equivalent</label>
                              <div className="glass-input !py-2.5 font-mono text-xs bg-[#000] text-gray-300 flex items-center shadow-inner border border-white/5">
                                  {manualMethod === 'Local Bank Transfer' && manualAmount ? `₦${(parseFloat(manualAmount) * (bankSettings?.nairaRate || 1500)).toLocaleString()}` : (manualAmount ? `$${manualAmount}` : '0')}
                              </div>
                          </div>
                      </div>
                      <div>
                          <label className="block text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-[0.2em]">Transaction ID / Sender Name</label>
                          <input type="text" value={manualTxId} onChange={e => setManualTxId(e.target.value)} required placeholder="Enter TrxID or Phone Number..." className="glass-input !py-2.5 font-mono text-xs" />
                      </div>
                      <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-[0_5px_20px_rgba(255,255,255,0.2)] tracking-widest uppercase text-[10px] mt-2">
                          Submit Request
                      </button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // 🟢 FIXED: VAULT MODULE (SAFE RENDERING)
        // ==========================================
        function CustomerDashboardVault({ purchases, db, appId, triggerToast, user }) {
          const myPurchases = (purchases || []).filter(p => p && p.customer === user?.email);

          return (
            <div className="animate-fade-in-up w-full">
              <div className="glass-effect rounded-3xl p-6 sm:p-8 min-h-[600px] border border-white/10">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-6 border-b border-white/10 gap-4">
                    <div>
                        <h2 className="text-xl font-bold tracking-widest text-white uppercase mb-1">Purchased Accounts</h2>
                        <p className="text-[10px] font-mono text-gray-400 uppercase tracking-widest">Your Digital Assets</p>
                    </div>
                    <div className="bg-white/5 border border-white/10 px-4 py-2.5 rounded-xl flex items-center gap-2 backdrop-blur-md">
                        <Lock className="w-3.5 h-3.5 text-white"/>
                        <span className="text-xs font-mono font-bold text-white">{myPurchases.length}</span>
                    </div>
                </div>

                {myPurchases.length === 0 ? (
                  <div className="text-center py-32 flex flex-col items-center">
                    <div className="w-16 h-16 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mb-6">
                        <Key className="w-6 h-6 text-gray-400" strokeWidth={1.5} />
                    </div>
                    <p className="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Vault is empty.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 w-full">
                    {myPurchases.map((acc, idx) => {
                        if (!acc) return null;
                        return (
                            <VaultItem key={acc.id || idx} acc={acc} idx={idx} db={db} appId={appId} triggerToast={triggerToast} />
                        )
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // PROFILE MODULE
        // ==========================================
        function CustomerDashboardProfile({ user, balance, tier, userInfo, allOrders, deposits, purchases, tickets, db, appId, featureSettings, triggerToast }) {
          const [profileSubTab, setProfileSubTab] = useState('overview');
          const [ticketSubject, setTicketSubject] = useState('');
          const [ticketMessage, setTicketMessage] = useState('');

          const claimDailyBonus = async () => {
            const today = new Date().toISOString().split('T')[0];
            if (userInfo?.lastBonusDate === today) { triggerToast('You already claimed your bonus today.'); return; }
            try {
              const token = await getAuthToken();
              const res = await fetch('https://voicestore-backend.onrender.com/api/claim-daily-bonus', {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ email: user.email })
              });
              const data = await res.json();
              triggerToast(data.message);
            } catch(err) { triggerToast('Failed to get bonus.'); }
          };

          const submitTicket = async (e) => {
            e.preventDefault(); if (!ticketSubject.trim() || !ticketMessage.trim()) return;
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', 'TCK-' + Date.now()), { email: user.email, subject: ticketSubject, message: ticketMessage, status: 'Open', date: new Date().toISOString() });
              setTicketSubject(''); setTicketMessage(''); triggerToast('Ticket sent successfully.');
            } catch(err) {}
          };

          const referralCode = `REF-${(user?.email || '').split('@')[0].toUpperCase()}`;
          
          const myDeposits = (deposits || []).filter(d => d && d.email === user?.email);
          const myOrders = (allOrders || []).filter(o => o && o.customer === user?.email);
          const myPurchases = (purchases || []).filter(p => p && p.customer === user?.email);

          const unifiedHistory = [
              ...myDeposits.map(d => ({ id: d.id, type: 'Funds Added', amount: d.amount, date: d.date, status: d.status, method: d.method })),
              ...myOrders.map(o => ({ id: o.id, type: 'Bought Account', amount: o.total, date: o.date, status: o.status, method: 'Account Balance' })),
              ...myPurchases.filter(p => String(p.type).includes('Network') || String(p.type).includes('Protocol')).map(p => ({ id: p.id, type: p.type, amount: 0, date: p.date, status: 'Acquired', method: 'Account Balance' }))
          ].sort((a,b) => {
              const timeA = a.date ? new Date(a.date).getTime() : 0;
              const timeB = b.date ? new Date(b.date).getTime() : 0;
              return isNaN(timeB) || isNaN(timeA) ? 0 : timeB - timeA;
          });

          return (
            <div className="animate-fade-in-up w-full">
              <div className="flex space-x-1.5 mb-8 p-1.5 bg-white/5 backdrop-blur-md rounded-xl border border-white/10 shadow-inner max-w-fit mx-auto md:mx-0">
                  <button onClick={() => setProfileSubTab('overview')} className={`btn-animate px-5 py-2.5 rounded-lg text-[9px] uppercase tracking-widest font-bold transition-colors ${profileSubTab === 'overview' ? 'bg-white text-black shadow-md' : 'text-gray-400 hover:text-white'}`}>My Profile</button>
                  <button onClick={() => setProfileSubTab('history')} className={`btn-animate px-5 py-2.5 rounded-lg text-[9px] uppercase tracking-widest font-bold transition-colors ${profileSubTab === 'history' ? 'bg-white text-black shadow-md' : 'text-gray-400 hover:text-white'}`}>History</button>
                  <button onClick={() => setProfileSubTab('support')} className={`btn-animate px-5 py-2.5 rounded-lg text-[9px] uppercase tracking-widest font-bold transition-colors ${profileSubTab === 'support' ? 'bg-white text-black shadow-md' : 'text-gray-400 hover:text-white'}`}>Support</button>
              </div>

              {profileSubTab === 'overview' && (
                  <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 sm:gap-8 w-full animate-swoosh-in">
                      <div className="glass-effect rounded-3xl p-8 text-center xl:col-span-1 h-fit flex flex-col items-center border border-white/10">
                        <div className="w-24 h-24 bg-black/50 backdrop-blur-sm rounded-full flex items-center justify-center mb-6 border border-white/20 shadow-[0_0_20px_rgba(255,255,255,0.05)] relative">
                          <UserIcon className="w-8 h-8 text-white relative z-10" strokeWidth={1.5}/>
                        </div>
                        <h2 className="text-sm font-mono font-bold text-white mb-2 w-full truncate tracking-wide">{user.email}</h2>
                        <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest mb-10">Joined: {safeFormatDate(userInfo?.joined)}</p>
                        
                        <div className="w-full bg-black/40 p-5 rounded-xl border border-white/5 backdrop-blur-sm">
                            <div className="w-full text-left mb-3 flex justify-between items-end">
                                <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">User Level</span>
                                <span className={`text-xs font-black uppercase tracking-wider ${tier?.color || 'text-gray-400'} flex items-center gap-1.5`}>
                                    {tier && tier.icon && <tier.icon className="w-3.5 h-3.5"/>}
                                    {tier?.name || 'Loading...'}
                                </span>
                            </div>
                            
                            {tier && tier.next && (
                                <div className="w-full bg-[#111] rounded-full h-1 mb-3 overflow-hidden border border-[#222]">
                                    <div className="bg-white h-full rounded-full shadow-[0_0_10px_#fff]" style={{width: `${Math.min(100, ((userInfo?.totalSpent || 0) / tier.next) * 100)}%`}}></div>
                                </div>
                            )}
                            {tier && tier.next ? (
                                <p className="text-[8px] text-gray-400 font-mono uppercase tracking-widest w-full text-left">Spend ${Number(tier.next - (userInfo?.totalSpent || 0)).toFixed(2)} more to upgrade.</p>
                            ) : (
                                <p className="text-[8px] text-white font-mono w-full text-center uppercase tracking-widest">Max Level Reached</p>
                            )}
                        </div>
                      </div>

                      <div className="xl:col-span-2 space-y-6 sm:space-y-8 w-full">
                        <div className="grid grid-cols-2 gap-4 sm:gap-6 w-full">
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 flex flex-col justify-center items-center text-center border border-white/10">
                            <p className="text-gray-400 text-[9px] font-bold mb-3 uppercase tracking-widest">Total Spent</p>
                            <p className="text-3xl sm:text-4xl font-light font-mono text-white tracking-widest drop-shadow-md">${Number(userInfo?.totalSpent || 0).toFixed(2)}</p>
                          </div>
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 flex flex-col justify-center items-center text-center border border-white/10 bg-white/5">
                            <p className="text-white/80 text-[9px] font-bold mb-3 uppercase tracking-widest">Account Balance</p>
                            <p className="text-3xl sm:text-4xl font-bold font-mono text-white tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">${Number(balance || 0).toFixed(2)}</p>
                          </div>
                        </div>

                        {featureSettings?.dailyReward && (
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 border-l-[2px] border-l-white">
                             <div>
                               <h3 className="text-sm font-bold tracking-widest text-white flex items-center gap-2 mb-2 uppercase"><Star className="w-4 h-4"/> Daily Bonus</h3>
                               <p className="text-[11px] text-gray-400 font-light">Claim <span className="font-mono text-white font-bold">$0.50</span> free bonus every 24 hours.</p>
                             </div>
                             <button onClick={claimDailyBonus} className="btn-animate bg-white text-black px-6 py-3.5 rounded-xl text-[10px] font-bold uppercase tracking-widest w-full sm:w-auto shadow-[0_0_15px_rgba(255,255,255,0.2)]">Claim Now</button>
                          </div>
                        )}

                        {featureSettings?.referral && (
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 border border-white/10">
                             <h3 className="text-sm font-bold tracking-widest text-white mb-3 flex items-center gap-2 uppercase"><Users className="w-4 h-4 text-gray-300"/> Referral Code</h3>
                             <p className="text-xs text-gray-400 font-light mb-6">Share your code with friends to earn commission.</p>
                             <div className="bg-black/50 border border-white/10 p-2 rounded-xl flex justify-between items-center shadow-inner">
                               <span className="font-mono text-[11px] text-white font-bold px-4 break-all tracking-widest">{referralCode}</span>
                               <button onClick={() => {
                                  if (navigator.clipboard) navigator.clipboard.writeText(referralCode).then(() => triggerToast("Copied!"));
                                  else { const t = document.createElement("textarea"); t.value = referralCode; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
                               }} className="btn-animate bg-white text-black p-3 rounded-lg"><Copy className="w-4 h-4"/></button>
                             </div>
                          </div>
                        )}
                      </div>
                  </div>
              )}

              {profileSubTab === 'history' && (
                  <div className="glass-effect rounded-3xl p-6 sm:p-8 min-h-[600px] animate-swoosh-in border border-white/10">
                    <h2 className="text-xl font-bold tracking-widest uppercase text-white mb-8 pb-4 border-b border-white/10 flex items-center gap-3"><History className="w-5 h-5"/> Transaction History</h2>
                    
                    {unifiedHistory.length === 0 ? (
                      <div className="text-center py-32 text-gray-500 flex flex-col items-center">
                        <Activity className="w-12 h-12 mb-4 opacity-30" strokeWidth={1} />
                        <p className="text-[10px] font-mono uppercase tracking-[0.2em]">No history yet.</p>
                      </div>
                    ) : (
                      <div className="space-y-4 w-full">
                        {unifiedHistory.map((item, idx) => {
                            if (!item) return null;
                            const isDeposit = item.type === 'Funds Added';
                            return (
                                <div key={idx} className="bg-black/40 border border-white/5 hover:border-white/20 p-4 sm:p-5 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-colors group animate-slide-in-right backdrop-blur-md" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                    <div className="flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 border ${isDeposit ? 'bg-white text-black border-white/50' : 'bg-[#111] text-white border-[#333]'}`}>
                                            {isDeposit ? <Wallet className="w-5 h-5"/> : <ShoppingCart className="w-5 h-5"/>}
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-white uppercase tracking-wider">{item.type}</p>
                                            <p className="text-[9px] text-gray-500 font-mono mt-1.5 uppercase tracking-widest">{item.id}</p>
                                        </div>
                                    </div>
                                    <div className="flex sm:flex-col items-center sm:items-end justify-between w-full sm:w-auto mt-2 sm:mt-0 pt-3 sm:pt-0 border-t border-white/10 sm:border-0">
                                        <p className={`text-base font-mono font-bold tracking-wider ${isDeposit ? 'text-green-400' : 'text-gray-300'}`}>
                                            {isDeposit ? '+' : '-'}${Number(item.amount || 0).toFixed(2)}
                                        </p>
                                        <span className="text-[8px] text-gray-500 font-mono uppercase tracking-[0.2em] mt-1.5">
                                            {safeFormatDate(item.date)}
                                        </span>
                                    </div>
                                </div>
                            );
                        })}
                      </div>
                    )}
                  </div>
              )}

              {profileSubTab === 'support' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8 w-full animate-swoosh-in">
                      <div className="space-y-6 sm:space-y-8 w-full">
                          <div className="glass-effect rounded-3xl p-6 sm:p-8 h-fit border border-white/10">
                            <h2 className="text-lg font-bold tracking-widest text-white mb-2 flex items-center gap-2 pb-4 border-b border-white/10 uppercase"><Headset className="w-4 h-4"/> Contact Admin</h2>
                            <p className="text-[10px] text-gray-400 font-mono mb-8 mt-4 tracking-[0.2em] uppercase">Send a direct message.</p>
                            <form onSubmit={submitTicket} className="space-y-5 w-full">
                              <div>
                                <label className="block text-[9px] font-bold text-gray-400 mb-2 uppercase tracking-[0.2em]">Subject</label>
                                <input type="text" value={ticketSubject} onChange={e => setTicketSubject(e.target.value)} required placeholder="What do you need help with?" className="glass-input" />
                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-[0.2em]">Message</label>
                                <textarea value={ticketMessage} onChange={e => setTicketMessage(e.target.value)} required placeholder="Write your message here..." rows="4" className="glass-input resize-none" />
                              </div>
                              <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-[0_5px_20px_rgba(255,255,255,0.2)] tracking-widest uppercase text-xs">Send Message</button>
                            </form>
                          </div>
                      </div>

                      <div className="glass-effect rounded-3xl p-6 sm:p-8 flex flex-col w-full border border-white/10">
                         <h3 className="text-sm font-bold tracking-widest text-white mb-6 pb-4 border-b border-white/10 uppercase">My Tickets</h3>
                         <div className="space-y-4 overflow-y-auto scrollbar-hide pr-1">
                           {tickets.length === 0 ? <p className="text-center text-gray-500 font-mono text-[10px] uppercase tracking-widest py-20">No tickets found.</p> : tickets.map((t, idx) => (
                             <div key={t.id} className="bg-black/40 border border-white/10 p-5 rounded-2xl group hover:border-white/30 transition-colors relative overflow-hidden animate-slide-in-right backdrop-blur-md" style={{animationDelay: `${idx * 0.1}s`, opacity: 0, animationFillMode: 'forwards'}}>
                               <div className="absolute top-0 left-0 w-1.5 h-full bg-white/10 group-hover:bg-white transition-colors"></div>
                               <div className="flex justify-between items-start mb-4 pl-3">
                                 <h4 className="font-bold text-gray-200 text-xs uppercase tracking-wider break-words w-[70%]">{t.subject}</h4>
                                 <span className={`text-[8px] px-2 py-1 rounded border uppercase tracking-[0.2em] font-bold ${t.status === 'Open' ? 'bg-red-900/20 text-red-400 border-red-900/50' : 'bg-green-900/20 text-green-400 border-green-900/50'}`}>{t.status}</span>
                               </div>
                               <div className="bg-[#050505] p-3 rounded-lg mb-3 shadow-inner ml-3">
                                 <p className="text-[11px] text-gray-400 font-light leading-relaxed break-words">{t.message}</p>
                               </div>
                               <p className="text-[8px] text-gray-500 font-mono flex items-center gap-1.5 uppercase tracking-widest ml-3"><Clock className="w-2.5 h-2.5"/> {safeFormatDate(t.date)}</p>
                             </div>
                           ))}
                         </div>
                      </div>
                  </div>
              )}
            </div>
          );
        }

        // ==========================================
        // CART MODAL
        // ==========================================
        function CartModal({ cart, setCart, setShowCart, balance, user, promoSettings, triggerToast, addNotification, db, appId }) {
            const [isCheckingOut, setIsCheckingOut] = useState(false);
            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);
            const discountAmount = promoSettings?.isActive ? (totalAmount * (promoSettings.discount / 100)) : 0;
            const finalAmount = totalAmount - discountAmount;

            const handleCheckout = async () => {
                if (balance < finalAmount) { triggerToast("Insufficient balance. Add funds."); return; }
                setIsCheckingOut(true);
                let serverWakeTimer = setTimeout(() => { triggerToast("Please wait..."); }, 4000);
                try {
                    const token = await getAuthToken();
                    const response = await fetch('https://voicestore-backend.onrender.com/api/checkout', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, cart: cart })
                    });
                    clearTimeout(serverWakeTimer);
                    if (!response.ok) throw new Error("Network error");
                    const result = await response.json();
                    if (result.success) {
                        triggerToast(`Successfully purchased ${cart.length} item(s).`);
                        addNotification("Purchase Success", `You bought ${cart.length} item(s).`);
                        setCart([]); setShowCart(false);
                    } else triggerToast("Error: " + result.message);
                } catch(e) { clearTimeout(serverWakeTimer); triggerToast("Purchase failed. Try again."); } 
                finally { setIsCheckingOut(false); }
            };

            return (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-[#000]/80 backdrop-blur-sm animate-fade-in-up">
                    <div className="glass-effect shadow-[0_20px_50px_rgba(0,0,0,0.8)] rounded-3xl w-full max-w-md p-6 sm:p-8 animate-zoom-fade border border-white/20">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                            <h3 className="text-sm font-bold tracking-widest text-white flex items-center gap-2 uppercase"><ShoppingCart className="w-4 h-4"/> Your Cart</h3>
                            <button onClick={() => setShowCart(false)} className="btn-animate p-2 bg-black/50 hover:bg-white/10 rounded-full text-gray-400 transition-colors border border-white/10"><X className="w-3.5 h-3.5" /></button>
                        </div>
                        {cart.length === 0 ? (
                            <div className="text-center py-16 text-gray-500 flex flex-col items-center">
                                <ShoppingCart className="w-12 h-12 mb-4 opacity-20" strokeWidth={1} />
                                <p className="font-mono text-[10px] uppercase tracking-widest">Cart is empty.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="max-h-60 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-4 bg-black/40 border border-white/10 rounded-2xl group hover:border-white/30 transition-colors animate-slide-in-right shadow-inner" style={{animationDelay: `${idx * 0.05}s`, opacity: 0, animationFillMode: 'forwards'}}>
                                            <div className="flex flex-col">
                                                <span className="text-xs font-bold text-white uppercase tracking-wider">
                                                    {item.name}
                                                </span>
                                                {item.selectedState && item.selectedState !== 'Random' && (
                                                    <span className="text-[9px] text-gray-400 mt-1 font-mono uppercase bg-[#111] w-fit px-2 py-0.5 rounded border border-[#222]">State: {item.selectedState}</span>
                                                )}
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="text-sm font-mono font-bold text-white">${item.price.toFixed(2)}</span>
                                                <button onClick={() => setCart(cart.filter((_, i) => i !== idx))} className="btn-animate p-2 bg-red-900/20 text-red-500 hover:bg-red-900/50 rounded-lg transition-colors border border-red-900/30"><Trash2 className="w-3.5 h-3.5"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="border-t border-white/10 pt-5 space-y-3">
                                    <div className="flex justify-between text-[10px] text-gray-400 font-mono uppercase tracking-widest"><span>Subtotal:</span><span>${totalAmount.toFixed(2)}</span></div>
                                    {promoSettings?.isActive && discountAmount > 0 && <div className="flex justify-between text-[10px] text-green-400 font-mono uppercase tracking-widest"><span>Discount ({promoSettings.discount}%):</span><span>-${discountAmount.toFixed(2)}</span></div>}
                                    <div className="flex justify-between text-xl font-bold font-mono text-white pt-4 border-t border-white/10"><span>Total:</span><span>${finalAmount.toFixed(2)}</span></div>
                                </div>
                                <button onClick={handleCheckout} disabled={isCheckingOut || balance < finalAmount} className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-[0_5px_20px_rgba(255,255,255,0.2)] tracking-widest uppercase text-xs mt-6 !py-4">
                                    {isCheckingOut ? 'Processing...' : (balance < finalAmount ? 'Not Enough Balance' : 'Confirm Purchase')}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // ADMIN DASHBOARD
        // ==========================================
        function AdminDashboard({ inventory, orders, deposits, categories, usersDB, db, appId, promoSettings, globalNotice, tickets, featureSettings, bankSettings, cryptoSettings, customPayments, smsSettings, activeChats, auth, user, triggerToast, activeTab, setActiveTab }) {
          const [uploadCategory, setUploadCategory] = useState('new');
          const [uploadText, setUploadText] = useState('');
          const [customerSearch, setCustomerSearch] = useState('');

          const [promoInput, setPromoInput] = useState('');
          const [discountInput, setDiscountInput] = useState(0);
          const [promoActive, setPromoActive] = useState(false);
          const [noticeInput, setNoticeInput] = useState('');
          const [nairaRateInput, setNairaRateInput] = useState(1500);
          
          const [flutterwaveKeyInput, setFlutterwaveKeyInput] = useState('');
          const [flutterwaveActiveInput, setFlutterwaveActiveInput] = useState(false);
          
          const [dailyRewardActive, setDailyRewardActive] = useState(false);
          const [referralActive, setReferralActive] = useState(false);

          const [smsMarkupInput, setSmsMarkupInput] = useState(1.00);
          const [smsActiveInput, setSmsActiveInput] = useState(true);
          
          const [cryptoMethodsList, setCryptoMethodsList] = useState([]);
          
          // 🟢 ADD NEW DYNAMIC CRYPTO FORM (FIXED) 🟢
          const [newCryptoInput, setNewCryptoInput] = useState({ name: '', network: '', address: '' });
          
          const [bankNameInput, setBankNameInput] = useState('Parallex');
          const [bankAccountNameInput, setBankAccountNameInput] = useState('Samuel Osita Emmanuel');
          const [bankAccountNumberInput, setBankAccountNumberInput] = useState('1120927346');

          const [editUserModal, setEditUserModal] = useState({ show: false, email: '', password: '', balance: 0, totalSpent: 0 });
          
          const [manageStockModal, setManageStockModal] = useState({ show: false, categoryId: null });
          const [newProductModal, setNewProductModal] = useState(false);
          const [newProduct, setNewProduct] = useState({ id: '', name: '', description: '', price: 5.00 });

          const [newCustomPayment, setNewCustomPayment] = useState({ name: '', details: '', instruction: '' });

          const [selectedChatUser, setSelectedChatUser] = useState(null);
          const [adminChatMessage, setAdminChatMessage] = useState('');
          const [adminChatMessages, setAdminChatMessages] = useState([]);
          const adminMessagesEndRef = useRef(null);

          const handleAddProduct = async (e) => {
              e.preventDefault();
              if (!newProduct.id || !newProduct.name) return;
              
              const safeNewProduct = {
                  id: newProduct.id.toLowerCase().replace(/[^a-z0-9]/g, '_'),
                  name: newProduct.name,
                  description: newProduct.description,
                  price: Number(newProduct.price),
                  color: 'text-white'
              };

              const updatedCategories = [...categories, safeNewProduct];
              
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), { list: updatedCategories });
                  triggerToast('New card added successfully.');
                  setNewProductModal(false);
                  setNewProduct({ id: '', name: '', description: '', price: 5.00 });
              } catch (err) { triggerToast('Failed to add card.'); }
          };

          const handleRemoveProduct = async (productId) => {
              if (!window.confirm("Are you sure you want to permanently remove this card?")) return;
              const updatedCategories = categories.filter(c => c.id !== productId);
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Products'), { list: updatedCategories });
                  triggerToast('Card removed.');
              } catch (err) { triggerToast('Failed to remove.'); }
          };

          const handleAddCustomPayment = async (e) => {
              e.preventDefault();
              if (!newCustomPayment.name || !newCustomPayment.details) return triggerToast("Fill all required fields.");
              const newItem = { id: Date.now(), name: newCustomPayment.name, details: newCustomPayment.details, instruction: newCustomPayment.instruction };
              const updatedList = [...(customPayments || []), newItem];
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CustomPayments'), { list: updatedList });
                  triggerToast('Payment Method Added.');
                  setNewCustomPayment({ name: '', details: '', instruction: '' });
              } catch (e) { triggerToast('Error adding method.'); }
          };

          const handleRemoveCustomPayment = async (id) => {
              const updatedList = (customPayments || []).filter(p => p.id !== id);
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CustomPayments'), { list: updatedList });
                  triggerToast('Payment Method Removed.');
              } catch (e) { triggerToast('Error removing method.'); }
          };

          // 🟢 HANDLE DYNAMIC CRYPTO METHODS 🟢
          const handleAddCrypto = async (e) => {
              e.preventDefault();
              if (!newCryptoInput.name || !newCryptoInput.address) return triggerToast("Fill required crypto fields.");
              
              const networkVal = newCryptoInput.network || "Any Network";
              const newItem = { id: Date.now(), name: newCryptoInput.name, network: networkVal, address: newCryptoInput.address };
              const updatedList = [...(cryptoMethodsList || []), newItem];
              
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CryptoMethods'), { list: updatedList });
                  triggerToast('Crypto Method Added.');
                  setNewCryptoInput({ name: '', network: '', address: '' }); // Clear form
              } catch (e) { triggerToast('Error adding crypto.'); }
          };

          const handleRemoveCrypto = async (id) => {
              const updatedList = (cryptoMethodsList || []).filter(p => p.id !== id);
              try {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'CryptoMethods'), { list: updatedList });
                  triggerToast('Crypto Method Removed.');
              } catch (e) { triggerToast('Error removing crypto.'); }
          };

          const handleDeleteAccount = async (categoryId, accountIndex) => {
            if (!window.confirm("Delete this account?")) return;
            try {
              const newInv = { ...inventory };
              newInv[categoryId].splice(accountIndex, 1);
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), newInv);
              triggerToast('Account deleted.');
            } catch (err) { triggerToast('Failed to delete.'); }
          };

          useEffect(() => {
            if (promoSettings) { setPromoInput(promoSettings.code || ''); setDiscountInput(promoSettings.discount || 0); setPromoActive(promoSettings.isActive || false); }
            if (globalNotice !== undefined) setNoticeInput(globalNotice);
            if (featureSettings) { setDailyRewardActive(featureSettings.dailyReward || false); setReferralActive(featureSettings.referral || false); }
            if (bankSettings) { 
                setNairaRateInput(bankSettings.nairaRate || 1500); 
                setFlutterwaveKeyInput(bankSettings.flutterwaveKey || '');
                setFlutterwaveActiveInput(bankSettings.flutterwaveActive || false);
                setBankNameInput(bankSettings.bankName || 'Parallex');
                setBankAccountNameInput(bankSettings.accountName || 'Samuel Osita Emmanuel');
                setBankAccountNumberInput(bankSettings.accountNumber || '1120927346');
            }
            if (cryptoSettings) {
                setCryptoMethodsList(cryptoSettings);
            }
            if (smsSettings) {
                setSmsMarkupInput(smsSettings.markup !== undefined ? smsSettings.markup : 1.00);
                setSmsActiveInput(smsSettings.active ?? true);
            }
          }, [promoSettings, globalNotice, featureSettings, bankSettings, cryptoSettings, smsSettings]);

          // Fetch messages for selected user in Admin
          useEffect(() => {
              if (!selectedChatUser) return;
              
              const q = query(
                  collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', selectedChatUser, 'messages'),
                  orderBy('timestamp', 'asc')
              );
              
              const unsubscribe = onSnapshot(q, (snapshot) => {
                  const msgs = [];
                  snapshot.forEach((doc) => {
                      msgs.push({ id: doc.id, ...doc.data() });
                  });
                  setAdminChatMessages(msgs);
                  
                  updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', selectedChatUser), {
                      unreadByAdmin: false
                  }).catch(e => {});

                  setTimeout(() => {
                      adminMessagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
                  }, 100);
              });
              
              return () => unsubscribe();
          }, [selectedChatUser, db, appId]);

          const sendAdminMessage = async (e) => {
              e.preventDefault();
              if (!adminChatMessage.trim() || !selectedChatUser) return;
              
              const msgText = adminChatMessage;
              setAdminChatMessage(''); 
              
              try {
                  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'Store_Chats', selectedChatUser, 'messages'), {
                      text: msgText,
                      sender: 'admin',
                      timestamp: serverTimestamp(),
                      email: 'Admin'
                  });
                  
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_ActiveChats', selectedChatUser), {
                      lastMessage: msgText,
                      lastMessageTime: serverTimestamp(),
                      unreadByAdmin: false 
                  }, { merge: true });
                  
              } catch(err) {}
          };

          const startTicketChat = (userEmail) => {
              if (userEmail) {
                  setSelectedChatUser(userEmail);
              }
          };

          const pendingDeposits = deposits.filter(d => d.status === 'Pending' || d.status === 'Verifying...' || d.status === 'Pending Review' || d.status === 'Awaiting Payment');
          const totalSales = orders.filter(o => o.status === 'Completed').reduce((sum, order) => sum + Number(order.total || 0), 0);
          
          const filteredUsers = Object.keys(usersDB).filter(email => email.toLowerCase().includes(customerSearch.toLowerCase()));

          const handleUploadAccounts = async (e) => {
            e.preventDefault(); if (!uploadText.trim()) return;
            const rawText = uploadText.trim(); let validAccounts = [];
            
            if (uploadCategory === 'textplus' || rawText.includes('Email\n') || rawText.includes('Email\r\n')) {
                validAccounts = rawText.split(/(?=^Email\s*\n)/gm).filter(b => b.trim().length > 5).map(b => b.trim());
            } else if (rawText.includes('💌 EMAIL:')) {
                validAccounts = rawText.split(/(?=💌 EMAIL:)/g).filter(b => b.trim().length > 5).map(b => b.trim());
            } else {
                validAccounts = rawText.split(/\n\s*\n/).map(a => a.trim()).filter(a => a.length > 5);
                if(validAccounts.length === 0) validAccounts = rawText.split(/\n/).map(a => a.trim()).filter(a => a.length > 5);
            }

            if (validAccounts.length === 0) { triggerToast("Format error."); return; }

            try {
              const newInv = { ...inventory };
              if (!newInv[uploadCategory]) newInv[uploadCategory] = [];
              newInv[uploadCategory] = [...newInv[uploadCategory], ...validAccounts];
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Inventory', 'Stock'), newInv);
              setUploadText(''); triggerToast(`Added ${validAccounts.length} accounts.`);
            } catch (err) { triggerToast("Upload failed."); }
          };

          const submitEditUser = async (e) => {
            e.preventDefault();
            try {
              const token = await getAuthToken();
              const res = await fetch('https://voicestore-backend.onrender.com/api/admin/update-user', {
                  method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body: JSON.stringify({ userEmail: editUserModal.email, newBalance: editUserModal.balance, newTotalSpent: editUserModal.totalSpent, newPassword: editUserModal.password })
              });
              if(res.ok) { triggerToast('User saved.'); setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 }); } 
              else { triggerToast('Update failed.'); }
            } catch (err) { triggerToast('Network error.'); }
          };

          const sendResetLinkToUser = async (userEmail) => {
              try { await sendPasswordResetEmail(auth, userEmail); triggerToast(`Link sent to ${userEmail}`); } 
              catch (err) { triggerToast('Failed to send.'); }
          };

          const handleManualApprove = async (depId) => {
            const dep = deposits.find(d => d.id === depId);
            if(!dep) return;
            try {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Deposits', depId), { status: 'Approved' });
              const currentBal = Number(usersDB[dep.email]?.balance || 0);
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Users', dep.email), { balance: currentBal + Number(dep.amount || 0) });
              triggerToast("Approved.");
            } catch (err) { triggerToast("Failed."); }
          };

          const handleResolveTicket = async (ticketId) => {
            try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Tickets', ticketId), { status: 'Resolved' }); triggerToast('Ticket closed.'); } 
            catch(err) { triggerToast('Failed to close.'); }
          };

          const handleSaveSettings = async (e) => {
            e.preventDefault();
            try {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'PromoCode'), { code: String(promoInput).toUpperCase(), discount: parseFloat(discountInput), isActive: promoActive });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Notice'), { text: noticeInput });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Features'), { dailyReward: dailyRewardActive, referral: referralActive });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'SMS'), { markup: parseFloat(smsMarkupInput), active: smsActiveInput });
              
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'Store_Settings', 'Bank'), { 
                  bankName: bankNameInput, accountName: bankAccountNameInput, accountNumber: bankAccountNumberInput,
                  nairaRate: parseFloat(nairaRateInput) || 1500, flutterwaveKey: flutterwaveKeyInput, flutterwaveActive: flutterwaveActiveInput
              });
              
              triggerToast("Settings saved.");
            } catch (error) { triggerToast("Error saving."); }
          };

          return (
            <>
              {editUserModal.show && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-[#000]/90 backdrop-blur-sm animate-zoom-fade">
                  <div className="glass-effect w-full max-w-md p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/20">
                     <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                         <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white flex items-center gap-2"><Edit className="w-4 h-4 text-white"/> Edit User</h3>
                         <button onClick={() => setEditUserModal({ show: false, email: '', password: '', balance: 0, totalSpent: 0 })} className="btn-animate p-2 bg-[#000] rounded-full text-gray-500 hover:text-white border border-white/10"><X className="w-3.5 h-3.5" /></button>
                     </div>
                     <p className="text-[10px] text-gray-400 font-mono mb-6 bg-[#000] border border-white/10 p-3 rounded-lg truncate shadow-inner tracking-widest">{editUserModal.email}</p>
                     
                     <form onSubmit={submitEditUser} className="space-y-5">
                        <div>
                           <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Password</label>
                           <input type="text" value={editUserModal.password} onChange={e => setEditUserModal({...editUserModal, password: e.target.value})} className="glass-input text-xs" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Balance ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.balance} onChange={e => setEditUserModal({...editUserModal, balance: e.target.value})} className="glass-input" />
                            </div>
                            <div>
                               <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Total Spent ($)</label>
                               <input type="number" step="0.01" required value={editUserModal.totalSpent} onChange={e => setEditUserModal({...editUserModal, totalSpent: e.target.value})} className="glass-input" />
                            </div>
                        </div>
                        <div className="pt-6 mt-4 border-t border-white/10">
                          <button type="submit" className="btn-animate w-full bg-white text-black font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 tracking-widest uppercase text-xs">Save Changes</button>
                        </div>
                     </form>
                  </div>
                </div>
              )}

              {/* 🟢 NEW PRODUCT MODAL 🟢 */}
              {newProductModal && (
                  <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-[#000]/90 backdrop-blur-sm animate-zoom-fade">
                    <div className="glass-effect w-full max-w-md p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/20">
                       <div className="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
                           <h3 className="text-sm font-bold uppercase tracking-[0.2em] text-white flex items-center gap-2"><Plus className="w-4 h-4"/> Create New Card</h3>
                           <button onClick={() => setNewProductModal(false)} className="btn-animate p-2 bg-[#000] rounded-full text-gray-500 hover:text-white border border-white/10"><X className="w-3.5 h-3.5" /></button>
                       </div>
                       
                       <form onSubmit={handleAddProduct} className="space-y-4">
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Card ID (e.g. facebook_acc)</label>
                             <input type="text" required value={newProduct.id} onChange={e => setNewProduct({...newProduct, id: e.target.value})} className="glass-input text-xs" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Display Name</label>
                             <input type="text" required value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} className="glass-input text-xs" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Description</label>
                             <input type="text" required value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})} className="glass-input text-xs" />
                          </div>
                          <div>
                             <label className="block text-[9px] font-bold text-gray-500 mb-2 uppercase tracking-[0.3em]">Price ($)</label>
                             <input type="number" step="0.01" required value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} className="glass-input text-xs font-mono" />
                          </div>
                          <div className="pt-4 mt-2 border-t border-white/10">
