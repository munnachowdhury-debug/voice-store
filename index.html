        const VaultItem = ({ acc, idx, triggerToast }) => {
            const [totpCode, setTotpCode] = useState('');
            const [timeLeft, setTimeLeft] = useState(30);
            const [twoFaSecret, setTwoFaSecret] = useState(null);

            useEffect(() => {
                try {
                    const rawData = String(acc?.data || '');
                    const match = rawData.match(/🔐 2FA INFO:\s*\n?([a-zA-Z0-9\s]+)/i);
                    if (match && match[1]) setTwoFaSecret(match[1].replace(/\s+/g, '').toUpperCase());
                } catch(e) {}
            }, [acc]);

            useEffect(() => {
                if (!twoFaSecret) return;
                const updateTotp = () => {
                    if (typeof window.OTPAuth !== 'undefined') {
                        try {
                            let totp = new window.OTPAuth.TOTP({ algorithm: 'SHA1', digits: 6, period: 30, secret: window.OTPAuth.Secret.fromBase32(twoFaSecret) });
                            setTotpCode(totp.generate());
                            setTimeLeft(30 - (Math.floor(Date.now() / 1000) % 30));
                        } catch(e) {}
                    }
                };
                updateTotp();
                const interval = setInterval(updateTotp, 1000);
                return () => clearInterval(interval);
            }, [twoFaSecret]);

                        </button>
                    </div>
                </div>
            );

                  <div className="glass-effect rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                    {authMethod !== 'admin' && (
                        <div className="grid grid-cols-2 gap-2 glass-panel p-1 rounded-xl mb-8 border border-white/5">
                             <button type="button" onClick={() => { setAuthMethod('login'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'login' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Login</button>
                             <button type="button" onClick={() => { setAuthMethod('signup'); setAuthError(''); setAuthSuccessMsg(''); }} className={`btn-animate flex items-center justify-center py-3 rounded-lg text-xs font-bold uppercase tracking-widest ${authMethod === 'signup' ? 'bg-white text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Sign Up</button>
                        </div>
                    )}
                    {authMethod === 'admin' && <div className="text-center mb-8 pb-4 border-b border-white/10"><span className="text-[10px] font-bold text-brand-primary uppercase tracking-[0.3em] flex items-center justify-center gap-2"><ShieldCheck className="w-4 h-4"/> Admin Portal</span></div>}
                    
                    <form onSubmit={handleAuthSubmit} className="space-y-5">
                      {authError && <div className="text-red-400 text-[11px] font-bold glass-panel border-red-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><AlertTriangle className="w-5 h-5 shrink-0"/>{authError}</div>}
                      {authSuccessMsg && <div className="text-green-400 text-[11px] font-bold glass-panel border-green-500/30 p-4 rounded-xl flex items-center gap-3 leading-relaxed"><CheckCircle className="w-5 h-5 shrink-0"/>{authSuccessMsg}</div>}
                      
                      <div className="space-y-2">
                        <label className="text-[9px] font-bold text-gray-400 pl-1 uppercase tracking-widest">Email Address</label>
                        <input type="email" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="name@example.com" required className="glass-input allow-select" />
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center px-1">
                           <label className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                           {(authMethod === 'login' || authMethod === 'admin') && <button type="button" onClick={handleForgotPassword} className="text-[9px] font-bold text-brand-primary hover:text-white transition-colors uppercase tracking-widest">Forgot?</button>}
                        </div>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="••••••••" required className="glass-input allow-select" />
                      </div>
                      <div className="pt-6">
                        <button type="submit" disabled={isLoading} className="btn-animate w-full glass-effect hover:bg-white text-white hover:text-black border border-white/20 font-bold py-4 rounded-2xl text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-[0_5px_20px_rgba(255,255,255,0.2)]">
                            {isLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : (authMethod === 'signup' ? 'Create Account' : authMethod === 'login' ? 'Access Terminal' : 'Admin Login')}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            );
          }

          const currentUserBalance = user.role === 'customer' ? (usersDB[user.email]?.balance || 0) : 0;
          const currentUserTier = user.role === 'customer' ? getTier(usersDB[user.email]?.totalSpent || 0) : null;

          return (
            <div className="min-h-screen w-full relative overflow-x-hidden font-sans pb-24 flex flex-col bg-transparent text-white">
              <FloatingLogos />
              <MessageNotification msg={incomingMsg} onClose={() => setIncomingMsg(null)} />
              
              {toastData.show && createPortal(
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] w-[90%] sm:w-auto max-w-sm animate-fade-in-up">
                  <div className="glass-effect p-3.5 rounded-2xl shadow-xl flex items-center gap-3 border border-white/20 bg-[#030712]/90">
                    <CheckCircle className="w-4 h-4 text-brand-primary shrink-0" />
                    <span className="font-bold text-[10px] sm:text-xs tracking-widest text-white uppercase">{toastData.msg}</span>
                  </div>
                </div>, document.body
              )}

              <header className="sticky top-0 z-40 w-full glass-effect rounded-none border-t-0 border-x-0 border-b border-white/10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                  <div className="flex items-center gap-3 sm:gap-4">
                      <div className="w-10 h-10 rounded-xl glass-panel flex items-center justify-center border border-white/20">
                        <EliteLogo className="w-7 h-7" />
                      </div>
                      <span className="text-xl font-light tracking-[0.25em] text-white hidden sm:block uppercase">Verify<span className="font-bold text-brand-primary">Hub</span> <span className="text-[10px] text-yellow-500 font-bold ml-1 tracking-[0.3em]">ELITE</span></span>
                  </div>
                  <div className="flex items-center gap-3 sm:gap-4">
                    {user.role === 'customer' && (
                        <button onClick={() => setShowCart(true)} className="btn-animate relative p-3 rounded-xl glass-panel text-white hover:bg-white/10 transition-colors border border-white/10">
                            <ShoppingCart className="w-4 h-4" strokeWidth={1.5}/>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">{cart.length}</span>}
                        </button>
                    )}
                    {user.role === 'customer' && (
                        <div className="glass-panel px-4 py-2.5 rounded-xl flex items-center gap-2 border border-white/10 cursor-default">
                            <Wallet className="w-4 h-4 text-brand-primary opacity-90" />
                            <span className="font-mono font-bold text-xs sm:text-sm tracking-wider text-white">${Number(currentUserBalance).toFixed(2)}</span>
                        </div>
                    )}
                    <button onClick={handleLogout} className="btn-animate p-3 glass-panel text-white hover:text-red-400 transition-colors border border-white/10"><LogOut className="w-4 h-4" strokeWidth={1.5}/></button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 mt-8 relative z-10 w-full flex-grow flex flex-col items-center">
                {globalNotice && (
                  <div className="w-full mb-6 glass-panel border-l-4 border-l-brand-primary p-4 rounded-2xl flex items-start sm:items-center gap-4">
                     <Megaphone className="w-5 h-5 text-brand-primary shrink-0 mt-0.5 sm:mt-0" />
                     <p className="text-xs font-medium text-gray-200 leading-relaxed tracking-wide">{globalNotice}</p>
                  </div>
                )}

                <div className="w-full relative z-30 mb-8">
                  <div className="glass-effect rounded-[24px] p-1.5 sm:p-2 grid grid-cols-5 gap-1 w-full border border-white/10 mx-auto max-w-5xl">
                    {(user.role === 'admin' ? ADMIN_TABS : CUSTOMER_TABS).map(tab => (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`btn-animate relative flex flex-col items-center justify-center py-3 sm:py-3.5 px-0.5 sm:px-2 rounded-xl min-w-0 group ${activeTab === tab.id ? 'bg-white shadow-[0_4px_15px_rgba(255,255,255,0.2)]' : 'hover:bg-white/10'}`}>
                          <div className="relative z-10 flex flex-col items-center justify-center w-full">
                              <tab.icon className={`w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-200 ${activeTab === tab.id ? 'scale-110 mb-1 text-black' : 'group-hover:scale-110 group-hover:-translate-y-0.5 mb-1 text-gray-400 group-hover:text-white'}`} strokeWidth={activeTab === tab.id ? 2 : 1.5} /> 
                              <span className={`text-[7.5px] sm:text-[9px] min-[400px]:text-[10px] leading-tight mt-0.5 uppercase tracking-wider text-center w-full whitespace-normal break-words px-0.5 ${activeTab === tab.id ? 'font-bold text-black' : 'font-medium text-gray-400 group-hover:text-white'}`}>
                                  {tab.label}
                              </span>
                          </div>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="w-full relative tab-transition-enter" key={activeTab}>
                    <ErrorBoundary>
                        {user.role === 'admin' ? (
                          <AdminDashboard inventory={inventory} orders={allOrders} deposits={deposits} categories={categories} usersDB={usersDB} purchases={purchases} tickets={tickets} triggerToast={triggerToast} promoSettings={promoSettings} featureSettings={featureSettings} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} smsSettings={smsSettings} activeChats={activeChats} activeTab={activeTab} />
                        ) : (
                          <>
                              {activeTab === 'sms' && <CustomerDashboardSMS user={user} balance={currentUserBalance} triggerToast={triggerToast} smsSettings={smsSettings} />}
                              {activeTab === 'store' && <CustomerDashboardStore inventory={inventory} categories={categories} cart={cart} setCart={setCart} triggerToast={triggerToast} />}
                              {activeTab === 'add_funds' && <CustomerDashboardFunds deposits={deposits} user={user} triggerToast={triggerToast} addNotification={addNotification} bankSettings={bankSettings} cryptoSettings={cryptoSettings} customPayments={customPayments} />}
                              {activeTab === 'my_accounts' && <CustomerDashboardVault user={user} purchases={purchases} triggerToast={triggerToast} />}
                              {activeTab === 'profile' && <CustomerDashboardProfile user={user} balance={currentUserBalance} tier={currentUserTier} userInfo={usersDB[user.email]} allOrders={allOrders} deposits={deposits} purchases={purchases} tickets={tickets.filter(t => t && t.email === user.email)} featureSettings={featureSettings} triggerToast={triggerToast} />}
                          </>
                        )}
                    </ErrorBoundary>
                </div>
              </main>

              {showCart && user.role === 'customer' && <CartModal cart={cart} setCart={setCart} setShowCart={setShowCart} balance={currentUserBalance} user={user} promoSettings={promoSettings} triggerToast={triggerToast} addNotification={addNotification} />}
              
              {user && user.role === 'customer' && <LiveChatWidget user={user} setIncomingMsg={setIncomingMsg} />}
            </div>
          );
        }

        function LiveChatWidget({ user, setIncomingMsg }) {
            const [isOpen, setIsOpen] = useState(false);
            const [message, setMessage] = useState('');
            const [chatMessages, setChatMessages] = useState([]);
            const [unreadCount, setUnreadCount] = useState(0);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                const fetchChat = async () => {
                    const { data } = await supabase.from('store_chats').select('*').eq('user_email', user.email).order('timestamp', { ascending: true });
                    if (data) {
                        const newMsgs = data.map(m => ({ id: m.id, ...m.data, timestamp: m.timestamp }));
                        if(newMsgs.length > chatMessages.length && !isOpen) {
                            const lastMsg = newMsgs[newMsgs.length - 1];
                            if(lastMsg.sender === 'admin') {
                                setIncomingMsg(lastMsg.text);
                                setUnreadCount(prev => prev + 1);
                            }
                        }
                        setChatMessages(newMsgs);
                    }
                };
                fetchChat();
                const intId = setInterval(fetchChat, 4000);
                return () => clearInterval(intId);
            }, [isOpen, user.email, setIncomingMsg, chatMessages.length]);

            useEffect(() => { if (isOpen) { setUnreadCount(0); setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100); } }, [isOpen, chatMessages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim()) return;
                const msgText = message;
                setMessage(''); 
                try {
                    await supabase.from('store_chats').insert({ user_email: user.email, data: { text: msgText, sender: 'user', email: user.email } });
                    await supabase.from('store_active_chats').upsert({ id: user.email, data: { lastMessage: msgText, userEmail: user.email, unreadByAdmin: true }, last_message_time: new Date().toISOString() });
                } catch(err) {}
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="btn-animate fixed bottom-6 right-6 z-[150] w-14 h-14 bg-white rounded-full shadow-[0_4px_15px_rgba(255,255,255,0.3)] flex items-center justify-center text-black">
                        {isOpen ? <X className="w-6 h-6" /> : <MessageSquare className="w-6 h-6" />}
                        {!isOpen && unreadCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-brand-primary text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-pulse shadow-lg">
                                {unreadCount}
                            </span>
                        )}
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 z-[150] w-[340px] h-[480px] glass-effect rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] flex flex-col overflow-hidden origin-bottom-right animate-fade-in-up">
                            <div className="bg-[rgba(255,255,255,0.05)] border-b border-white/10 p-5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                   <div className="w-2.5 h-2.5 bg-brand-primary rounded-full animate-pulse"></div>
                                   <h3 className="text-white font-bold text-[11px] tracking-widest uppercase">Admin Support</h3>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-white transition-colors"><X className="w-4 h-4"/></button>
                            </div>
                            <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-transparent">
                                {chatMessages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40">
                                        <Headset className="w-12 h-12 mb-4 text-white" strokeWidth={1.5} />
                                        <p className="text-[10px] text-gray-300 font-mono text-center uppercase tracking-widest">Encrypted Channel Open</p>
                                    </div>
                                ) : (
                                    chatMessages.map((msg, i) => (
                                        <div key={msg.id} className={`flex flex-col animate-swoosh-in ${msg.sender === 'user' ? 'items-end' : 'items-start'}`} style={{animationDelay: `${i * 0.03}s`}}>
                                            <div className={`px-4 py-3 rounded-2xl max-w-[85%] text-[12px] font-medium leading-relaxed shadow-lg allow-select ${msg.sender === 'user' ? 'bg-white text-black rounded-tr-sm' : 'glass-panel text-white rounded-tl-sm'}`}>
                                                {msg.text}
                                            </div>
                                            <span className="text-[8px] text-gray-500 mt-1.5 font-mono tracking-wider">
                                                {msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...'}
                                            </span>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMessage} className="bg-[rgba(0,0,0,0.5)] border-t border-white/10 p-4 flex gap-3 items-center">
                                <input type="text" value={message} onChange={e => setMessage(e.target.value)} placeholder="Type a message..." className="glass-input allow-select !py-3"/>
                                <button type="submit" disabled={!message.trim()} className="btn-animate bg-white text-black p-3.5 rounded-xl disabled:opacity-50"><Send className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        }

        function CustomerDashboardSMS({ user, balance, triggerToast, smsSettings }) {
          const [isSmsLoading, setIsSmsLoading] = useState(false);
          const [selectedSmsService, setSelectedSmsService] = useState(''); 
          const [availableServices, setAvailableServices] = useState([]); 
          const [isAppDropdownOpen, setIsAppDropdownOpen] = useState(false);
          const [appSearch, setAppSearch] = useState('');
          const [isFetchingServices, setIsFetchingServices] = useState(false);
          const [smsCountry, setSmsCountry] = useState('USA'); 
          
          const [priceTiers, setPriceTiers] = useState([]);
          const [selectedTier, setSelectedTier] = useState(null);
          const [isTiersLoading, setIsTiersLoading] = useState(false);

          const [confirmAction, setConfirmAction] = useState({ show: false, type: '', orderId: null, price: 0 });
          const [showSmsWarning, setShowSmsWarning] = useState(false);

          const ordersContainerRef = useRef(null);
          const [activeOrders, setActiveOrders] = useState(() => {
              try { const saved = localStorage.getItem(`smsOrders_${user?.email}`); if (saved) { const parsed = JSON.parse(saved); if(Array.isArray(parsed)) return parsed.filter(o => o && o.status === 'ACTIVE'); } } catch(e) {} return [];
          });

          useEffect(() => { if (user?.email) localStorage.setItem(`smsOrders_${user.email}`, JSON.stringify(activeOrders)); }, [activeOrders, user]);

          const smsActive = smsSettings?.active;
          useEffect(() => {
              if (smsActive) {
                  setIsFetchingServices(true);
                  const controller = new AbortController();
                  const timeoutId = setTimeout(() => controller.abort(), 15000);

                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getPrices?country=${smsCountry}`, { signal: controller.signal })
                  .then(r => r.json()).then(json => { 
                      clearTimeout(timeoutId);
                      const srvs = json?.success && Array.isArray(json.data) ? json.data : [];
                      setAvailableServices(srvs); 
                      setIsFetchingServices(false); 
                  }).catch(() => { 
                      clearTimeout(timeoutId);
                      setIsFetchingServices(false); 
                      setAvailableServices([]); 
                  });

                  return () => { clearTimeout(timeoutId); controller.abort(); };
              }
          }, [smsActive, smsCountry]);

          useEffect(() => {
              if (selectedSmsService && smsCountry) {
                  setIsTiersLoading(true);
                  fetch(`https://voicestore-backend.onrender.com/api/grizzly/getServiceTiers?country=${smsCountry}&service=${selectedSmsService}`)
                  .then(res => res.json()).then(data => { if (data?.success && Array.isArray(data?.tiers) && data.tiers.length > 0) { setPriceTiers(data.tiers); setSelectedTier(data.tiers[0]); } else { setPriceTiers([]); setSelectedTier(null); } setIsTiersLoading(false); }).catch(() => { setPriceTiers([]); setSelectedTier(null); setIsTiersLoading(false); });
              }
          }, [selectedSmsService, smsCountry]);

          const filteredApps = Array.isArray(availableServices) ? availableServices.filter(app => (app?.name || '').toLowerCase().includes((appSearch || '').toLowerCase())) : [];

          const currentService = availableServices.find(s => s?.code === selectedSmsService) || null;
          const fallbackPrice = currentService?.finalPrice ? parseFloat(currentService.finalPrice) : 0;
          const finalBuyPrice = selectedTier?.priceWithMarkup ? parseFloat(selectedTier.priceWithMarkup) : fallbackPrice;
          const exactMaxPrice = selectedTier?.originalPrice ? parseFloat(selectedTier.originalPrice) : null;

          const buySmsNumber = async () => {
              if (!currentService) return;
              if (activeOrders.length > 0) { triggerToast("Please complete your current order first."); return; }
              if (balance < finalBuyPrice) { triggerToast("Insufficient balance."); return; }
              
              setIsSmsLoading(true);
              try {
                  const token = await getAuthToken(); 
                  const deductRes = await fetch('https://voicestore-backend.onrender.com/api/sms-deduct', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ email: user.email, price: finalBuyPrice })
                  });
                  
                  if (!deductRes.ok) { triggerToast(`Server Error ${deductRes.status}: Deduction failed.`); setIsSmsLoading(false); return; }
                  
                  const deductData = await deductRes.json();
                  if (!deductData.success) { triggerToast(deductData.message || "Balance deduction failed."); setIsSmsLoading(false); return; }

                  const res = await fetch('https://voicestore-backend.onrender.com/api/juicy/getNumber', {
                      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                      body: JSON.stringify({ serviceId: currentService.code, countryId: smsCountry, maxPrice: exactMaxPrice }) 
                  });
                  const data = await res.json();
                  
                  if (data?.success && data?.phone) {
                      let finalOrderPrice = finalBuyPrice;
                      if (data.exactCost !== undefined && data.exactCost !== null) {
                          const markup = parseFloat(smsSettings?.markup || 1.00);
                          const actualTotalCost = parseFloat(data.exactCost) + markup;
                          const diff = parseFloat((finalBuyPrice - actualTotalCost).toFixed(2));
                          if (diff > 0) {
                              fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: diff }) }).catch(()=>{});
                              finalOrderPrice = actualTotalCost; 
                          }
                      }
                      const cleanName = (currentService.name || '').split(' [')[0];
                      const newOrder = { id: data.orderId, phone: data.phone, service: cleanName, countryId: smsCountry, price: finalOrderPrice, status: 'ACTIVE', codes: [], expiresAt: Date.now() + 240 * 1000, isCancelling: false, isNew: true };
                      setActiveOrders(prev => [newOrder, ...prev]); 
                      triggerToast("Number assigned!");
                      
                      setShowSmsWarning(true);

                      setTimeout(() => {
                          const elements = document.querySelectorAll('.order-card-anim');
                          if(elements.length > 0) elements[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }, 200);

                  } else {
                      await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: finalBuyPrice }) });
                      triggerToast(data?.message || "Failed to get number.");
                  }
              } catch (e) { triggerToast("Network Error."); } finally { setIsSmsLoading(false); }
          };

          const performSkip = async (orderId, priceToRefund, isAuto = false) => {
              try {
                  const token = await getAuthToken();
                  const skipRes = await fetch(`https://voicestore-backend.onrender.com/api/juicy/skip`, { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`}, body: JSON.stringify({orderId}) }); 
                  const skipData = await skipRes.json();
                  
                  if (!skipData.success) { 
                      if (!isAuto) triggerToast(skipData.message); 
                      if (String(skipData.message).includes('received')) { setActiveOrders(prev => prev.map(o => o.id === orderId ? {...o, isCancelling: false} : o)); }
                      return; 
                  }
                  
                  await fetch('https://voicestore-backend.onrender.com/api/sms-refund', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, price: priceToRefund }) });
                  
                  if(!isAuto) triggerToast(`Skipped. $${priceToRefund.toFixed(2)} refunded.`); 
                  else triggerToast(`Time expired. Auto-refunded.`);
                  
                  setActiveOrders(prev => prev.filter(o => o.id !== orderId));
              } catch (e) {
                  if(!isAuto) triggerToast("Network Error.");
                  setActiveOrders(prev => prev.map(o => o.id === orderId ? {...o, isCancelling: false} : o));
              } 
          };

          const executeConfirmAction = () => {
              if(confirmAction.type === 'skip') performSkip(confirmAction.orderId, confirmAction.price);
              setConfirmAction({ show: false, type: '', orderId: null, price: 0 });
          };

          useEffect(() => {
              if(activeOrders.length === 0) return;
              const interval = setInterval(() => {
                  activeOrders.forEach(async (order) => {
                      if (order.codes.length > 0) return; 
                      if (Date.now() >= order.expiresAt) {
                          if (!order.isCancelling) {
                              setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, isCancelling: true} : o));
                              performSkip(order.id, order.price, true);
                          }
                          return;
                      }
                      try {
                          const res = await fetch(`https://voicestore-backend.onrender.com/api/juicy/getStatus?orderId=${order.id}`);
                          const data = await res.json();
                          if (data.success && data.status === 'OK' && data.code) {
                              setActiveOrders(prev => prev.map(o => {
                                  if (o.id === order.id && !o.codes.includes(data.code)) {
                                      triggerToast(`New SMS Received!`);
                                      getAuthToken().then(token => { fetch('https://voicestore-backend.onrender.com/api/sms-save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ email: user.email, type: `Live SMS (${o.service})`, data: `Phone: ${o.phone}\nSMS Code: ${data.code}` }) }); });
                                      return { ...o, codes: [...o.codes, data.code], lastMsg: 'SMS Received' };
                                  } return o;
                              }));
                          } else if (String(data.status).includes('CANCEL')) { setActiveOrders(prev => prev.filter(o => o.id !== order.id));
                          } else { setActiveOrders(prev => prev.map(o => o.id === order.id ? {...o, lastMsg: data.status} : o)); }
                      } catch(e) {}
                  });
              }, 5000); 
              return () => clearInterval(interval);
          }, [activeOrders, user]);

          const copyText = (text) => {
             if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => triggerToast("Copied!"));
             else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); triggerToast("Copied!"); }
          };

          const formatPhoneDisplay = (phone) => { return `+${String(phone).replace(/\D/g, '')}`; };

          if(!smsSettings?.active) return <div className="glass-effect rounded-3xl w-full text-center py-32 text-gray-500 font-mono text-sm uppercase tracking-widest"><Smartphone className="w-12 h-12 mx-auto mb-4 opacity-30" strokeWidth={1.5}/> Service Offline.</div>;

          return (
            <div className="w-full max-w-3xl mx-auto space-y-6 sm:space-y-8 relative animate-matrix-in">

                {confirmAction.show && createPortal(

                {isAppDropdownOpen && createPortal(
                   <div className="fixed inset-0 z-[99999] bg-[rgba(3,7,18,0.95)] backdrop-blur-2xl flex flex-col animate-pop-in overflow-hidden">

                       </div>

                <div className={uiCard + " p-6 sm:p-8"}>

                        <div className="flex items-center gap-2 glass-panel px-3 py-1.5 rounded-full border-white/10">

                           <span className="text-[9px] text-gray-300 font-mono uppercase tracking-widest hidden sm:block pt-0.5">Status: Live</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 relative z-10 mb-8">

                        <div className="glass-panel p-4 rounded-2xl hover:border-brand-primary/30 transition-colors">

                            <div className="relative w-full">
                                <select 
                                    value={selectedTier?.originalPrice ? String(selectedTier.originalPrice) : ''}

                                        <option value="" className="text-xs bg-[#121212] text-gray-500">...</option>

                                            <option key={idx} value={String(tier.originalPrice)} className="bg-[#121212] text-gray-200">${Number(tier.priceWithMarkup || 0).toFixed(2)}</option>
                                        ))

                                </select>
                                <DollarSign className="w-4 h-4 text-gray-400 absolute left-3.5 top-4 pointer-events-none"/>
                                <ChevronDown className="w-4 h-4 text-gray-600 absolute right-4 top-4 pointer-events-none"/>
                            </div>
                        </div>
                    </div>

                    <div className="glass-panel p-5 sm:p-6 rounded-3xl mb-8 relative transition-all">
                       <label className="block text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-[0.2em] ml-1">Select Application</label>
                       <div className="relative w-full">
                           <div onClick={() => setIsAppDropdownOpen(!isAppDropdownOpen)} className={uiInput + " h-14 pl-12 pr-10 flex items-center justify-between cursor-pointer hover:border-brand-primary/50 bg-[rgba(0,0,0,0.5)]"}>
                               <span className="truncate text-white font-bold text-[13px] tracking-wide">{isFetchingServices ? 'Loading Apps...' : (currentService ? `${currentService.name}` : (availableServices.length > 0 ? 'Select App' : 'No services found'))}</span>
                               {isFetchingServices ? <RefreshCw className="w-4 h-4 text-brand-primary absolute left-4 animate-spin"/> : <Smartphone className="w-4 h-4 text-brand-primary absolute left-4"/>}
                               <ChevronDown className={`w-4 h-4 text-gray-400 absolute right-4 transition-transform ${isAppDropdownOpen ? 'rotate-180' : ''}`}/>
                           </div>
                       </div>
                    </div>

                    {selectedSmsService && (

                            {activeOrders.length > 0 ? <span className="flex items-center gap-2"><StopCircle className="w-4 h-4"/> Finish Order First</span> : isSmsLoading ? <span className="flex items-center gap-2"><RefreshCw className="w-4 h-4 animate-spin"/> Processing...</span> : 'Get Number'}
                        </button>

                <div ref={ordersContainerRef} className="w-full max-w-3xl mx-auto">

                                    <OrderProgressBar expiresAt={order.expiresAt} />

                                <div className="flex items-center gap-2.5 mb-8 glass-panel px-5 py-2.5 rounded-full border-white/20 relative z-10">

                                    <p className="text-white font-bold uppercase tracking-[0.3em] text-[10px] pt-0.5">{order.service}</p>
                                </div>

                                <div className="flex items-center gap-4 w-full max-w-md mb-10 relative z-10">
                                    <div className="text-3xl sm:text-5xl font-mono font-bold text-white bg-[rgba(0,0,0,0.5)] px-6 py-6 rounded-2xl border border-white/10 flex-grow text-center whitespace-nowrap overflow-hidden text-ellipsis tracking-wider drop-shadow-md allow-select">
                                        +{String(order.phone).replace(/\D/g, '')}
                                    </div>
                                    <button onClick={() => copyNumberOnly(order.phone)} className="btn-animate p-6 bg-white hover:bg-gray-200 text-black rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.2)] shrink-0">
                                        <Copy className="w-6 h-6"/>
                                    </button>
                                </div>
                                
                                {order.codes.length === 0 ? (
                                    <div className="w-full max-w-md relative z-10">
                                        <p className="text-gray-400 font-mono text-[10px] uppercase tracking-widest mb-4 flex justify-center items-center gap-2"><RefreshCw className="w-3 h-3 animate-spin text-white"/> {order.lastMsg === 'WAITING' || !order.lastMsg ? 'Waiting for SMS...' : `Status: ${order.lastMsg}`}</p>
                                        <div className="flex justify-between items-center bg-[rgba(0,0,0,0.5)] p-4 rounded-2xl border border-white/10">
                                            <div className="flex items-center gap-3 pl-2">
                                                <Clock className="w-4 h-4 text-gray-400 hidden sm:block"/>
                                                <OrderTimerDisplay expiresAt={order.expiresAt} />
                                            </div>
                                            
                                            <button onClick={() => setConfirmAction({show: true, type: 'skip', orderId: order.id, price: order.price})} className="btn-animate bg-red-900/20 hover:bg-red-900/40 border border-red-900/50 text-red-400 px-6 py-3 rounded-xl text-[10px] uppercase tracking-widest font-bold flex items-center gap-2"><Ban className="w-3.5 h-3.5"/> Skip</button>
                                        </div>
                                    </div>
                                ) : (

                                                    <p className="text-sm text-white font-sans font-medium tracking-normal leading-relaxed text-left break-words drop-shadow-md allow-select">{c}</p>
                                                    <button onClick={() => copyText(c)} className="btn-animate w-full py-3.5 bg-brand-primary text-black hover:bg-white rounded-xl flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest font-bold shadow-[0_0_15px_rgba(6,182,212,0.3)] shrink-0">
                                                        <Copy className="w-4 h-4"/> Copy Full Message
                                                    </button>
                                                </div>
                                            );
                                        })}
                                        <button onClick={() => setActiveOrders([])} className="btn-animate w-full glass-panel hover:bg-white/20 text-white font-bold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2 uppercase tracking-widest mt-8 !text-xs">Close Order</button>
                                    </div>
                                )}
